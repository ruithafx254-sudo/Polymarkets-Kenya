<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexGen | Professional Terminal</title>
    
    <script src="https://unpkg.com/intasend-inlinejs-sdk@4.0.7/build/intasend-inline.js"></script>

    <style>
        :root { 
            --border: #eceef2; --text-main: #0f172a; --text-sub: #64748b;
            --yes: #f0fdf4; --yes-text: #166534; --no: #fef2f2; --no-text: #991b1b;
        }
        
        body { background: #ffffff; color: var(--text-main); margin: 0; padding-top: 130px; font-family: -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

        /* --- CLEAN HEADER (Polymarket Style) --- */
        .header-stack { position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 2000; border-bottom: 1px solid var(--border); transition: transform 0.3s ease; }
        body.hide-header .header-stack { transform: translateY(-100%); }

        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 56px; }
        .logo { font-weight: 700; font-size: 20px; letter-spacing: -0.5px; color: #000; display: flex; align-items: center; gap: 8px; }
        
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .wallet-pill { display: flex; align-items: center; background: #f1f5f9; padding: 4px 4px 4px 12px; border-radius: 8px; gap: 8px; font-size: 13px; font-weight: 600; }
        .btn-deposit { background: #000; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 600; font-size: 12px; cursor: pointer; }
        .user-icon { width: 32px; height: 32px; background: #0f172a; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; cursor: pointer; }

        /* --- CATEGORIES & SEARCH --- */
        .sub-nav { display: flex; align-items: center; gap: 12px; padding: 8px 16px; overflow-x: auto; border-bottom: 1px solid var(--border); }
        .sub-nav::-webkit-scrollbar { display: none; }
        .cat-link { font-size: 14px; font-weight: 500; color: var(--text-sub); text-decoration: none; white-space: nowrap; padding: 4px 8px; cursor: pointer; }
        .cat-link.active { color: #000; font-weight: 700; border-bottom: 2px solid #000; }

        /* --- MARKET CARDS --- */
        #dashboard { max-width: 600px; margin: auto; padding: 8px; }
        .market-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .m-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .m-title { font-size: 15px; font-weight: 600; line-height: 1.4; color: #000; margin-right: 12px; }
        .m-odds { text-align: right; min-width: 60px; }
        .odds-val { font-size: 17px; font-weight: 700; display: block; }
        .odds-lbl { font-size: 10px; color: var(--text-sub); text-transform: uppercase; }

        .btn-group { display: flex; gap: 8px; }
        .trade-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: 700; font-size: 14px; cursor: pointer; transition: opacity 0.2s; }
        .trade-btn.yes { background: var(--yes); color: var(--yes-text); }
        .trade-btn.no { background: var(--no); color: var(--no-text); }

        /* --- SIMPLE MODALS --- */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 5000; align-items: center; justify-content: center; padding: 16px; }
        .modal { background: #fff; width: 100%; max-width: 340px; padding: 24px; border-radius: 16px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .modal h2 { font-size: 18px; font-weight: 700; margin: 0 0 16px 0; }
        
        .input-box { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        .btn-full { width: 100%; padding: 14px; background: #000; color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header-stack">
        <div class="top-nav">
            <div class="logo">NexGen</div>
            <div class="nav-right">
                <div id="userProfile" class="user-icon hidden" onclick="logout()">??</div>
                <div class="wallet-pill">
                    Ksh <span id="balance">0.00</span>
                    <button onclick="openModal('depositModal')" class="btn-deposit">Deposit</button>
                </div>
            </div>
        </div>
        <div class="sub-nav">
            <div class="cat-link active" onclick="filterCat('All', this)">All</div>
            <div class="cat-link" onclick="filterCat('Politics', this)">Politics</div>
            <div class="cat-link" onclick="filterCat('Crypto', this)">Crypto</div>
            <div class="cat-link" onclick="filterCat('Kenya', this)">Kenya</div>
        </div>
    </div>

    <div id="dashboard">
        <div id="feed"></div>
    </div>

    <div id="authModal" class="overlay">
        <div class="modal">
            <h2 id="aTitle">Sign In</h2>
            <input type="email" id="aEmail" class="input-box" placeholder="Email">
            <input type="password" id="aPass" class="input-box" placeholder="Password">
            <button onclick="doAuth()" class="btn-full">Enter Terminal</button>
            <p style="font-size: 12px; color: #94a3b8; margin-top: 12px; cursor: pointer;" onclick="closeModal('authModal')">Dismiss</p>
        </div>
    </div>

    <div id="depositModal" class="overlay">
        <div class="modal">
            <h2>Deposit</h2>
            <p style="font-size: 13px; color: var(--text-sub); margin-bottom: 16px;">Minimum deposit is Ksh 10</p>
            <input type="number" id="depAmt" class="input-box" style="font-size: 24px; text-align: center; font-weight: 700;" placeholder="0">
            <button onclick="payNow()" class="btn-full">Confirm Payment</button>
            <p style="font-size: 12px; color: #94a3b8; margin-top: 12px; cursor: pointer;" onclick="closeModal('depositModal')">Cancel</p>
        </div>
    </div>

    <script>
        let markets = [
            { cat: "Kenya", q: "Will William Ruto reshuffle the cabinet by June?", p: 62 },
            { cat: "Crypto", q: "Will Bitcoin stay above $100k until June?", p: 72 },
            { cat: "Politics", q: "Will the US Dollar hit 140 KES by August?", p: 35 }
        ];

        window.onload = () => {
            updateUI();
            render('All');
        };

        function updateUI() {
            const user = localStorage.getItem('nx_user');
            const bal = localStorage.getItem('nx_balance') || "0.00";
            if(user) {
                document.getElementById('userProfile').classList.remove('hidden');
                document.getElementById('userProfile').innerText = user.substring(0,2).toUpperCase();
            }
            document.getElementById('balance').innerText = parseFloat(bal).toFixed(2);
        }

        function doAuth() {
            const email = document.getElementById('aEmail').value;
            if(!email.includes('@')) return alert("Enter valid email");
            localStorage.setItem('nx_user', email);
            closeModal('authModal');
            updateUI();
        }

        function payNow() {
            const amt = document.getElementById('depAmt').value;
            if(!localStorage.getItem('nx_user')) return openModal('authModal');
            if(amt < 10) return alert("Min deposit Ksh 10");

            document.body.classList.add('hide-header');
            closeModal('depositModal');

            const intasend = new window.IntaSend({ publicAPIKey: "ISPubKey_test_7e577665-297c-4b58-b282-7a876f8e03ad", live: false });
            intasend.run({ amount: Number(amt), currency: "KES" })
            .on("COMPLETE", () => {
                let cur = parseFloat(localStorage.getItem('nx_balance') || 0);
                localStorage.setItem('nx_balance', cur + Number(amt));
                document.body.classList.remove('hide-header');
                updateUI();
            })
            .on("CLOSE", () => document.body.classList.remove('hide-header'));
        }

        function render(cat) {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            markets.filter(m => cat === 'All' || m.cat === cat).forEach(m => {
                const card = document.createElement('div');
                card.className = 'market-card';
                card.innerHTML = `
                    <div class="m-header">
                        <div class="m-title">${m.q}</div>
                        <div class="m-odds">
                            <span class="odds-val">${m.p}%</span>
                            <span class="odds-lbl">chance</span>
                        </div>
                    </div>
                    <div class="btn-group">
                        <button class="trade-btn yes">Yes</button>
                        <button class="trade-btn no">No</button>
                    </div>`;
                feed.appendChild(card);
            });
        }

        function filterCat(cat, el) {
            document.querySelectorAll('.cat-link').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            render(cat);
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { if(confirm("Logout?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexGen Terminal</title>

    <script src="https://unpkg.com/intasend-inlinejs-sdk@4.0.7/build/intasend-inline.js"></script>

    <style>
        :root { 
            --primary: #2ebd85; --border: #f1f5f9; --text: #0f172a;
            --yes: #f0fdf4; --yes-text: #166534; --no: #fef2f2; --no-text: #cf304a;
        }
        body { background: #f8fafc; color: var(--text); margin: 0; padding-top: 80px; font-family: system-ui, -apple-system, sans-serif; }

        /* --- HEADER --- */
        .header { position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 2000; border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .logo { font-weight: 900; font-size: 22px; letter-spacing: -1.2px; }
        
        .nav-right { display: flex; align-items: center; gap: 8px; }
        .wallet { display: flex; align-items: center; background: #0f172a; color: #fff; padding: 2px 2px 2px 10px; border-radius: 12px; gap: 8px; font-size: 13px; font-weight: 700; }
        .deposit-btn { background: var(--primary); color: #fff; border: none; padding: 8px 14px; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 13px; }

        /* --- THE FIX: FORCING THE MODAL DOWN --- */
        /* This pushes the IntaSend iframe down so the tabs aren't hidden by the notch/header */
        #intasend-iframe { margin-top: 100px !important; }

        /* --- FEED --- */
        #feed { max-width: 500px; margin: auto; padding: 12px; }
        .card { background: #fff; border-radius: 24px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
        .m-title { font-size: 17px; font-weight: 700; line-height: 1.4; margin-bottom: 15px; }
        .p-val { font-size: 28px; font-weight: 800; margin-bottom: 15px; display: block; }
        .btn-row { display: flex; gap: 10px; }
        .act-btn { flex: 1; padding: 15px; border-radius: 14px; border: none; font-weight: 800; font-size: 15px; }
        .btn-yes { background: var(--yes); color: var(--yes-text); }
        .btn-no { background: var(--no); color: var(--no-text); }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">NEXGEN</div>
        <div class="nav-right">
            <div class="wallet">
                Ksh <span id="bal">0.00</span>
                <button onclick="initiatePayment()" class="deposit-btn">Deposit</button>
            </div>
        </div>
    </header>

    <div id="feed">
        <div class="card">
            <div class="m-title">Will Jesus Christ return before December 2026?</div>
            <span class="p-val">12%</span>
            <div class="btn-row">
                <button class="act-btn btn-yes">YES</button>
                <button class="act-btn btn-no">NO</button>
            </div>
        </div>
        <div id="dynamic"></div>
    </div>

    <script>
        function initiatePayment() {
            const intasend = new window.IntaSend({
                publicAPIKey: "ISPubKey_test_7e577665-297c-4b58-b282-7a876f8e03ad",
                live: false 
            });

            intasend.run({
                amount: 50,
                currency: "KES",
                email: "user@nexgen.com",
            }).on("COMPLETE", (res) => {
                document.getElementById('bal').innerText = res.amount;
            });
        }

        // Load predictions
        const marketItems = ["Bitcoin to $100k?", "Ksh to 120?", "Arsenal Win?", "AI Solves Fusion?"];
        function render(num) {
            const container = document.getElementById('dynamic');
            for(let i=0; i<num; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="m-title">${marketItems[Math.floor(Math.random()*marketItems.length)]}</div>
                    <span class="p-val">${Math.floor(Math.random()*85)+5}%</span>
                    <div class="btn-row"><button class="act-btn btn-yes">YES</button><button class="act-btn btn-no">NO</button></div>
                `;
                container.appendChild(card);
            }
        }
        window.onload = () => render(30);
    </script>
</body>
</html>

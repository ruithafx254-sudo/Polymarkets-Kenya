<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polymarkets Africa | Premium Terminal</title>
    
    <script src="https://unpkg.com/intasend-inlinejs-sdk@4.0.7/build/intasend-inline.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg-base: #060813;
            --bg-surface: #0f1329;
            --bg-surface-hover: #181d3d;
            --accent-neon: #00ff87;
            --accent-neon-glow: rgba(0, 255, 135, 0.35);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-sub: #8b9bb4;
            --yes-green: #10b981;
            --yes-bg: rgba(16, 185, 129, 0.12);
            --no-red: #ef4444;
            --no-bg: rgba(239, 68, 68, 0.12);
            --font-display: 'Cabinet Grotesk', -apple-system, sans-serif;
            --font-body: 'Inter', -apple-system, sans-serif;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: var(--bg-base); 
            color: var(--text-main); 
            margin: 0; 
            padding-top: 76px; 
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased; 
            background-image: radial-gradient(circle at 50% -20%, #151c4a 0%, var(--bg-base) 65%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Top Nav - Elite Premium Styling */
        .header-stack { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            background: rgba(6, 8, 19, 0.85); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            z-index: 2000; 
            border-bottom: 1px solid var(--border-color); 
            transition: transform 0.3s ease-in-out;
        }
        .top-nav { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 16px; 
            height: 68px; 
            max-width: 600px; 
            margin: 0 auto; 
        }
        .logo-wrap { display: flex; flex-direction: column; line-height: 1; cursor: pointer; }
        .logo-main { 
            font-family: var(--font-display); 
            font-weight: 900; 
            font-size: 21px; 
            letter-spacing: -0.5px; 
            color: #fff; 
            text-transform: uppercase;
            background: linear-gradient(to right, #fff 40%, var(--accent-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-sub { 
            font-family: var(--font-body); 
            font-size: 10px; 
            font-weight: 800; 
            color: var(--accent-neon); 
            letter-spacing: 2.5px; 
            text-transform: uppercase; 
            margin-top: 1px; 
        }
        
        .nav-right { display: flex; align-items: center; gap: 8px; }
        .wallet-pill { 
            display: flex; 
            align-items: center; 
            background: rgba(255, 255, 255, 0.04); 
            border: 1px solid var(--border-color); 
            padding: 4px 4px 4px 12px; 
            border-radius: 30px; 
            gap: 8px; 
            font-size: 13px; 
            font-weight: 700; 
            color: #fff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        .bal-val { font-family: var(--font-body); color: var(--accent-neon); font-weight: 800; }
        .btn-deposit { 
            background: var(--accent-neon); 
            color: #000; 
            border: none; 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-weight: 800; 
            font-size: 11.5px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 0 12px var(--accent-neon-glow);
        }
        .btn-deposit:active { transform: scale(0.96); opacity: 0.9; }
        
        .user-id { 
            width: 34px; 
            height: 34px; 
            background: var(--bg-surface); 
            color: var(--accent-neon); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            border: 1px solid var(--border-color); 
            box-shadow: 0 2px 8px rgba(0,0,0,0.3); 
            transition: all 0.2s ease;
        }
        .user-id:active { transform: scale(0.92); }
        .person-icon { width: 16px; height: 16px; fill: currentColor; }

        body.hide-header .header-stack { transform: translateY(-100%); }
        body.hide-header { padding-top: 16px; }

        #dashboard { max-width: 600px; margin: auto; padding: 12px; box-sizing: border-box; }
        
        /* High-End Lively Moving News Banner (Sportsbook style) */
        .news-ticker-container { 
            background: var(--bg-surface); 
            border: 1px solid var(--border-color); 
            border-left: 3px solid var(--accent-neon);
            border-radius: 12px; 
            padding: 12px 14px; 
            margin-bottom: 16px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            overflow: hidden;
            position: relative;
        }
        .news-badge { 
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ff4d4d; 
            font-size: 10px; 
            font-weight: 900; 
            text-transform: uppercase; 
            padding: 3px 8px; 
            border-radius: 6px; 
            letter-spacing: 1px; 
            flex-shrink: 0; 
            display: flex;
            align-items: center;
            gap: 5px;
            animation: pulse-glow 2s infinite;
        }
        .news-badge::before {
            content: "";
            width: 5px;
            height: 5px;
            background: #ff4d4d;
            border-radius: 50%;
            display: inline-block;
        }
        .news-headline-wrapper {
            flex-grow: 1;
            overflow: hidden;
            position: relative;
            height: 18px;
        }
        .news-headline { 
            font-size: 12.5px; 
            font-weight: 700; 
            color: #cbd5e1; 
            margin: 0; 
            line-height: 18px; 
            white-space: nowrap; 
            position: absolute;
            width: 100%;
            transform: translateY(0);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
        }
        .news-headline.exit { transform: translateY(-22px); opacity: 0; }
        .news-headline.enter { transform: translateY(22px); opacity: 0; }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.2); }
            70% { box-shadow: 0 0 0 4px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Multimillion Aesthetic Sportsbook Market Cards */
        .market-card { 
            background: var(--bg-surface); 
            border: 1px solid var(--border-color); 
            border-radius: 16px; 
            padding: 16px; 
            margin-bottom: 14px; 
            box-shadow: 0 6px 18px rgba(0,0,0,0.15); 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .market-card:hover { 
            border-color: rgba(255,255,255,0.15); 
            background: var(--bg-surface-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(0,0,0,0.25);
        }
        .m-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
        .m-title { 
            font-size: 14.5px; 
            font-weight: 700; 
            line-height: 1.45; 
            color: #fff; 
            padding-right: 8px; 
            letter-spacing: -0.2px;
        }
        .odds-val { font-family: var(--font-body); font-size: 17px; font-weight: 800; color: var(--accent-neon); }
        .odds-lbl { font-size: 9.5px; color: var(--text-sub); text-transform: uppercase; display: block; text-align: right; font-weight: 600; }
        
        .m-category { 
            font-size: 9.5px; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: #fff; 
            background: rgba(255,255,255,0.06); 
            border: 1px solid var(--border-color);
            padding: 4px 10px; 
            border-radius: 6px; 
            display: inline-block; 
            margin-bottom: 12px; 
            letter-spacing: 0.8px; 
        }

        .btn-group { display: flex; gap: 8px; }
        .trade-btn { 
            flex: 1; 
            padding: 12px 8px; 
            border-radius: 12px; 
            border: 1px solid transparent;
            font-weight: 800; 
            font-size: 14px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 1px; 
            font-family: var(--font-body);
        }
        .trade-btn:active { transform: scale(0.96); }
        
        .trade-btn.yes { 
            background: var(--yes-bg); 
            color: var(--yes-green); 
            border-color: rgba(16, 185, 129, 0.2);
        }
        .trade-btn.yes:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: var(--yes-green);
        }
        .trade-btn.no { 
            background: var(--no-bg); 
            color: var(--no-red); 
            border-color: rgba(239, 68, 68, 0.2);
        }
        .trade-btn.no:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--no-red);
        }
        .multiplier { font-size: 11.5px; font-weight: 700; opacity: 0.9; }

        /* Fancy Premium Overlays */
        .overlay { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(4, 5, 12, 0.82); 
            backdrop-filter: blur(14px); 
            -webkit-backdrop-filter: blur(14px); 
            z-index: 5000; 
            align-items: center; 
            justify-content: center; 
            padding: 16px; 
        }
        
        /* Premium Modal Body */
        .modal { 
            background: var(--bg-surface); 
            width: 100%; 
            max-width: 380px; 
            padding: 28px 24px; 
            border-radius: 24px; 
            text-align: center; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05); 
            box-sizing: border-box; 
            border: 1px solid var(--border-color); 
            max-height: 90vh; 
            overflow-y: auto; 
            animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.94) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .auth-nav { display: flex; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border-color); padding: 4px; border-radius: 12px; margin-bottom: 24px; }
        .auth-tab { flex: 1; padding: 11px; font-size: 12px; font-weight: 800; cursor: pointer; border-radius: 9px; color: var(--text-sub); transition: all 0.2s ease; text-align: center; text-transform: uppercase; letter-spacing: 0.5px; }
        .auth-tab.active { background: var(--border-color); color: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
        
        .input-group { position: relative; margin-bottom: 16px; text-align: left; }
        .input-group label { display: block; font-size: 10.5px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
        .input-tech { 
            width: 100%; 
            padding: 13px 16px; 
            background: rgba(0, 0, 0, 0.25); 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            font-size: 14px; 
            box-sizing: border-box; 
            outline: none; 
            transition: all 0.2s ease; 
            color: #fff; 
            font-family: inherit; 
        }
        .input-tech:focus { border-color: rgba(255, 255, 255, 0.2); background: rgba(0, 0, 0, 0.4); }
        
        .btn-tech { 
            width: 100%; 
            padding: 15px; 
            background: var(--accent-neon); 
            color: #000; 
            border: none; 
            border-radius: 14px; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 13.5px; 
            transition: all 0.2s ease; 
            letter-spacing: 0.5px; 
            text-transform: uppercase; 
            margin-top: 8px; 
            box-shadow: 0 0 16px var(--accent-neon-glow);
        }
        .btn-tech:active { transform: scale(0.97); }
        
        .chip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; }
        .amt-chip { 
            border: 1px solid var(--border-color); 
            padding: 12px; 
            border-radius: 12px; 
            font-size: 12.5px; 
            font-weight: 800; 
            cursor: pointer; 
            background: rgba(255,255,255,0.02); 
            text-align: center; 
            color: #fff;
            transition: all 0.2s ease;
        }
        .amt-chip:hover, .amt-chip:active { 
            background: rgba(255,255,255,0.06); 
            border-color: var(--accent-neon);
            color: var(--accent-neon);
        }
        
        .badge-wrap { margin-top: 18px; border-top: 1px solid var(--border-color); padding-top: 16px; }
        .hidden { display: none !important; }
    </style>
</head>

                "Will Kenya win at least 3 gold medals in the upcoming Athletics Championships?",
                "Will the next World Cup host unveil new regional stadium upgrades this month?",
                "Will a new lap record be set at the next Formula 1 Grand Prix?"
            ],
            "Politics": [
                "Will the African Union establish a unified startup regulatory framework?",
                "Will the regional trade pact see 5 new member additions before December?",
                "Will a major environmental treaty be ratified by global leaders next quarter?"
            ],
            "Tech": [
                "Will EV sales establish a new high within the regional automotive market?",
                "Will a major tech titan announce a new digital device this year?",
                "Will AI-generated software engineering tools outpace traditional platforms?",
                "Will European energy storage networks double total capacity before next winter?"
            ],
            "Entertainment": [
                "Will the next James Bond actor be officially announced before August?",
                "Will a new movie release surpass the current box office records?",
                "Will a major streaming platform restrict password sharing worldwide next month?"
            ]
        };

        let markets = [];
        let currentFundsMode = 'deposit';

        window.onload = () => {
            initializeMarkets();
            syncState(); 
            renderFeed();
            
            // Premium Headline Rotation Slider Animation
            let newsIndex = 0;
            const hElem = document.getElementById('news-headline');
            
            setInterval(() => {
                hElem.classList.add('exit');
                setTimeout(() => {
                    newsIndex = (newsIndex + 1) % headlines.length;
                    hElem.innerText = headlines[newsIndex];
                    hElem.classList.remove('exit');
                    hElem.classList.add('enter');
                    setTimeout(() => {
                        hElem.classList.remove('enter');
                    }, 50);
                }, 450);
            }, 6000);
        };

        function initializeMarkets() {
            // Build out exactly 3000 markets. Jesus Market goes at Position #8 and #10
            for (let i = 1; i <= 3000; i++) {
                if (i === 8 || i === 10) {
                    markets.push({
                        id: `m-ext-custom-${i}`,
                        q: "Will Jesus be back before June 5th?",
                        category: "Culture",
                        p: 25,
                        yesMult: "9.00",
                        noMult: "3.00"
                    });
                } else {
                    const cat = categories[i % categories.length];
                    const prompts = feedThemes[cat];
                    const basePrompt = prompts[i % prompts.length];
                    const question = `${basePrompt} (Market Variant #${1000 + i})`;
                    
                    const chanceValue = Math.floor(10 + (i * 3.7) % 80);
                    const yesMultiplier = (100 / chanceValue).toFixed(2);
                    const noMultiplier = (100 / (100 - chanceValue)).toFixed(2);

                    markets.push({
                        id: `m-ext-${i}`,
                        q: question,
                        category: cat,
                        p: chanceValue,
                        yesMult: yesMultiplier,
                        noMult: noMultiplier
                    });
                }
            }
        }

        function renderFeed() {
            const f = document.getElementById('feed'); 
            f.innerHTML = '';
            
            markets.forEach(item => {
                const card = document.createElement('div');
                card.id = 'market-el-' + item.id;
                card.className = 'market-card';
                card.innerHTML = `
                    <div class="m-category">${item.category}</div>
                    <div class="m-header">
                        <div class="m-title">${item.q}</div>
                        <div class="m-odds"><span class="odds-val">${item.p}%</span><span class="odds-lbl">chance</span></div>
                    </div>
                    <div class="btn-group">
                        <button class="trade-btn yes" onclick="handleWagerClick('${item.q}')">
                            <span>Yes</span>
                            <span class="multiplier">${item.yesMult}x</span>
                        </button>
                        <button class="trade-btn no" onclick="handleWagerClick('${item.q}')">
                            <span>No</span>
                            <span class="multiplier">${item.noMult}x</span>
                        </button>
                    </div>`;
                f.appendChild(card);
            });
        }

        function handleWagerClick(marketQuestion) {
            if (!localStorage.getItem('nx_user')) {
                return openModal('authModal');
            }
            alert("Insufficient funds. Open deposit to top up balance.");
        }

        function syncState() {
            const user = localStorage.getItem('nx_user');
            const bal = localStorage.getItem('nx_balance') || "0.00";
            if(user) {
                document.getElementById('signBtn').classList.add('hidden');
                document.getElementById('userIcon').classList.remove('hidden');
            }
            document.getElementById('balance').innerText = parseFloat(bal).toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function setAuth(mode) {
            activeTab = mode;
            const up = document.getElementById('upFields'), title = document.getElementById('aTitle'), desc = document.getElementById('aDesc');
            const tIn = document.getElementById('tabIn'), tUp = document.getElementById('tabUp');
            const confirmPass = document.getElementById('confirmPassWrapper');
            if(mode === 'up') {
                up.classList.remove('hidden'); confirmPass.classList.remove('hidden'); tUp.classList.add('active'); tIn.classList.remove('active');
                title.innerText = "Secure Signup";
                desc.innerText = "Register your identity to access the terminal";
            } else {
                up.classList.add('hidden'); confirmPass.classList.add('hidden'); tIn.classList.add('active'); tUp.classList.remove('active');
                title.innerText = "Terminal Access";
                desc.innerText = "Enter credentials to connect to terminal";
            }
        }

        function setFundsMode(mode) {
            currentFundsMode = mode;
            const tDep = document.getElementById('tabDeposit'), tWith = document.getElementById('tabWithdraw');
            const fTitle = document.getElementById('fundsTitle'), fDesc = document.getElementById('fundsDesc');
            const amtLabel = document.getElementById('amtLabel'), fSubmit = document.getElementById('fundsSubmit');

            if(mode === 'withdraw') {
                tWith.classList.add('active'); tDep.classList.remove('active');
                fTitle.innerText = "Terminal Withdrawal";
                fDesc.innerText = "Direct settlement to your M-Pesa account";
                amtLabel.innerText = "Withdrawal Amount (Ksh)";
                fSubmit.innerText = "Confirm Withdrawal";
                fSubmit.style.background = "#fff";
                fSubmit.style.color = "#000";
                fSubmit.style.boxShadow = "none";
            } else {
                tDep.classList.add('active'); tWith.classList.remove('active');
                fTitle.innerText = "Fund Balance";
                fDesc.innerText = "Direct M-Pesa Integration via IntaSend";
                amtLabel.innerText = "Deposit Amount (Ksh)";
                fSubmit.innerText = "Confirm Deposit";
                fSubmit.style.background = "var(--accent-neon)";
                fSubmit.style.color = "#000";
                fSubmit.style.boxShadow = "0 0 16px var(--accent-neon-glow)";
            }
        }

        function doAuth() {
            const email = document.getElementById('aEmail').value.trim().toLowerCase();
            const pass = document.getElementById('aPass').value.trim();

            if (!email.includes('@') || email.length < 5) return alert("Please enter a valid email address.");
            if (pass.length < 4) return alert("Password should be at least 4 characters long.");

            if (activeTab === 'up') {
                const name = document.getElementById('aName').value.trim();
                const confirmPass = document.getElementById('aConfirmPass').value.trim();
                const country = document.getElementById('aCountry').value;

                if (!name) return alert("Full Name is required.");
                if (pass !== confirmPass) return alert("Passwords do not match.");

                userDB[email] = { name, email, pass, country, balance: "0.00" };
                localStorage.setItem('terminal_user_db', JSON.stringify(userDB));

                localStorage.setItem('nx_user', email);
                localStorage.setItem('nx_balance', "0.00");
                alert(`Welcome, ${name}. Terminal initialized!`);
                closeModal('authModal');
                syncState();
            } else {
                const userRecord = userDB[email];
                if (!userRecord || userRecord.pass !== pass) {
                    return alert("Access denied. Incorrect email address or password.");
                }

                localStorage.setItem('nx_user', userRecord.email);
                localStorage.setItem('nx_balance', userRecord.balance || "0.00");
                alert(`Session resumed successfully.`);
                closeModal('authModal');
                syncState();
            }
        }

        function setAmt(v) { document.getElementById('depAmt').value = parseFloat(v).toFixed(2); }

        function handleFundsAction() {
            if (currentFundsMode === 'withdraw') {
                withdrawNow();
            } else {
                payNow();
            }
        }

        function withdrawNow() {
            const amt = Number(document.getElementById('depAmt').value);
            const userEmail = localStorage.getItem('nx_user');
            let curBal = parseFloat(localStorage.getItem('nx_balance') || 0);

            if(!userEmail) {
                closeModal('depositModal');
                return openModal('authModal');
            }

            if(!amt || amt < 100) {
                return alert("Minimum withdrawal amount required is Ksh 100");
            }

            if(amt > curBal) {
                return alert("Insufficient funds");
            }

            closeModal('depositModal');
            
            const newBal = (curBal - amt).toFixed(2);
            localStorage.setItem('nx_balance', newBal);
            
            if (userDB[userEmail]) {
                userDB[userEmail].balance = newBal;
                localStorage.setItem('terminal_user_db', JSON.stringify(userDB));
            }

            syncState();
            alert("Withdrawal processing successfully!");
        }

        function payNow() {
            const amt = Number(document.getElementById('depAmt').value);
            const userEmail = localStorage.getItem('nx_user');

            if(!userEmail) {
                closeModal('depositModal');
                return openModal('authModal');
            }

            if(!amt || amt < 100) {
                return alert("Minimum deposit amount required is Ksh 100");
            }

            closeModal('depositModal');
            document.body.classList.add('hide-header');

            let intasend = new window.IntaSend({
                publicAPIKey: INTASEND_PUBLIC_KEY,
                live: false 
            });

            intasend.on("COMPLETE", (results) => {
                document.body.classList.remove('hide-header');
                let cur = parseFloat(localStorage.getItem('nx_balance') || 0);
                const newBal = (cur + Number(amt)).toFixed(2);
                
                localStorage.setItem('nx_balance', newBal);

                if (userDB[userEmail]) {
                    userDB[userEmail].balance = newBal;
                    localStorage.setItem('terminal_user_db', JSON.stringify(userDB));
                }

                syncState();
                alert(`Success! Ksh ${amt.toLocaleString()} has been added to your account.`);
            })
            .on("FAILED", (results) => {
                document.body.classList.remove('hide-header');
                alert("The transaction was not completed.");
            })
            .on("IN-PROGRESS", () => {
                document.body.classList.add('hide-header');
            });

            intasend.run({
                amount: amt,
                currency: "KES",
                email: userEmail
            });
        }

        function openModal(id) { 
            document.body.classList.add('hide-header');
            document.getElementById(id).style.display = 'flex'; 
        }

        function closeModal(id) { 
            document.body.classList.remove('hide-header');
            document.getElementById(id).style.display = 'none'; 
            if(id === 'depositModal') {
                document.getElementById('depAmt').value = '0.00';
            }
        }

        function logout() { 
            if(confirm("Terminate terminal session?")) { 
                localStorage.removeItem('nx_user');
                localStorage.removeItem('nx_balance');
                location.reload(); 
            } 
        }
    </script>
</body>
</html>

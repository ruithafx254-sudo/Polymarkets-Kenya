<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polymarkets Africa | Live Terminal</title>
    
    <script src="https://unpkg.com/intasend-inlinejs-sdk@4.0.7/build/intasend-inline.js"></script>

    <style>
        :root { 
            --accent: #2ebd85; --border: #eceef2; --text-main: #0f172a; --text-sub: #64748b;
            --yes: #f0fdf4; --yes-text: #166534; --no: #fef2f2; --no-text: #991b1b;
            --tech-bg: #0f172a;
        }
        
        body { background: #ffffff; color: var(--text-main); margin: 0; padding-top: 130px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

        /* --- HEADER & NAVIGATION --- */
        .header-stack { position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 2000; border-bottom: 1px solid var(--border); }
        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 60px; }
        .logo-wrap { display: flex; flex-direction: column; line-height: 1; }
        .logo-main { font-weight: 900; font-size: 18px; letter-spacing: -0.5px; color: #000; text-transform: uppercase; }
        .logo-sub { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
        
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .wallet-pill { display: flex; align-items: center; background: #f8fafc; border: 1px solid var(--border); padding: 4px 4px 4px 12px; border-radius: 10px; gap: 8px; font-size: 13px; font-weight: 700; }
        .btn-deposit { background: #000; color: #fff; border: none; padding: 7px 14px; border-radius: 8px; font-weight: 700; font-size: 12px; cursor: pointer; }
        .user-id { width: 36px; height: 36px; background: var(--tech-bg); color: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .person-icon { width: 20px; height: 20px; fill: currentColor; }

        .sub-nav { display: flex; gap: 20px; padding: 12px 20px; overflow-x: auto; background: #fff; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .cat-link { font-size: 13px; font-weight: 700; color: var(--text-sub); white-space: nowrap; cursor: pointer; position: relative; }
        .cat-link.active { color: #000; }
        .cat-link.active::after { content: ''; position: absolute; bottom: -13px; left: 0; right: 0; height: 2px; background: #000; }

        /* --- LIVE CONTENT FEED --- */
        #dashboard { max-width: 600px; margin: auto; padding: 10px; min-height: 100vh; }
        
        .feed-item { animation: slideIn 0.4s ease-out forwards; opacity: 0; margin-bottom: 12px; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .market-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
        .m-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .m-title { font-size: 15px; font-weight: 600; line-height: 1.4; color: #111; }
        .odds-val { font-size: 18px; font-weight: 800; color: #000; }
        .odds-lbl { font-size: 10px; color: var(--text-sub); text-transform: uppercase; display: block; text-align: right; }

        .btn-group { display: flex; gap: 10px; }
        .trade-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 800; font-size: 14px; cursor: pointer; }
        .trade-btn.yes { background: var(--yes); color: var(--yes-text); }
        .trade-btn.no { background: var(--no); color: var(--no-text); }

        .news-card { border-left: 4px solid var(--accent); background: #f8fafc; padding: 16px; border-radius: 0 14px 14px 0; }
        .news-tag { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
        .live-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* --- MODALS --- */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(6px); z-index: 5000; align-items: center; justify-content: center; padding: 16px; }
        .modal { background: #fff; width: 100%; max-width: 360px; padding: 32px; border-radius: 24px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .input-tech { width: 100%; padding: 16px; background: #f8fafc; border: 1px solid var(--border); border-radius: 12px; font-size: 14px; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        .btn-tech { width: 100%; padding: 16px; background: #000; color: #fff; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; }
        
        .chip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .amt-chip { border: 1px solid var(--border); padding: 12px; border-radius: 12px; font-size: 13px; font-weight: 800; cursor: pointer; background: #fff; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header-stack">
        <div class="top-nav">
            <div class="logo-wrap">
                <div class="logo-main">Polymarkets</div>
                <div class="logo-sub">Africa</div>
            </div>
            <div class="nav-right">
                <button id="signBtn" class="btn-deposit" onclick="openModal('authModal')">Sign In</button>
                <div id="userIcon" class="user-id hidden" onclick="logout()">
                    <svg class="person-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <div class="wallet-pill">
                    Ksh <span id="balance">0.00</span>
                    <button onclick="openModal('depositModal')" class="btn-deposit">Deposit</button>
                </div>
            </div>
        </div>
        <div class="sub-nav">
            <div class="cat-link active" onclick="switchMode('Markets', this)">Live Markets</div>
            <div class="cat-link" onclick="switchMode('News', this)">Intelligence Feed</div>
            <div class="cat-link" onclick="switchMode('Kenya', this)">Kenya</div>
        </div>
    </div>

    <div id="dashboard"><div id="feed"></div></div>

    <div id="authModal" class="overlay">
        <div class="modal">
            <h2>Access Terminal</h2>
            <input type="email" id="aEmail" class="input-tech" placeholder="Email Address">
            <input type="password" id="aPass" class="input-tech" placeholder="Password">
            <button onclick="doAuth()" class="btn-tech">Connect Node</button>
            <p onclick="closeModal('authModal')" style="cursor:pointer; margin-top:15px; font-size:12px; color:var(--text-sub);">Dismiss</p>
        </div>
    </div>

    <div id="depositModal" class="overlay">
        <div class="modal">
            <h2>Deposit</h2>
            <input type="number" id="depAmt" class="input-tech" style="font-size: 24px; text-align: center; font-weight: 800;" placeholder="Min 200">
            <div class="chip-grid">
                <div class="amt-chip" onclick="setAmt(250)">250</div>
                <div class="amt-chip" onclick="setAmt(500)">500</div>
                <div class="amt-chip" onclick="setAmt(1000)">1k</div>
                <div class="amt-chip" onclick="setAmt(2000)">2k</div>
                <div class="amt-chip" onclick="setAmt(5000)">5k</div>
            </div>
            <button onclick="payNow()" class="btn-tech" style="background:var(--accent)">Confirm</button>
            <p onclick="closeModal('depositModal')" style="cursor:pointer; margin-top:15px; font-size:12px; color:var(--text-sub);">Cancel</p>
        </div>
    </div>

    <script>
        let currentMode = 'Markets';
        const rawData = [
            { type: 'm', cat: 'Kenya', q: "Will CBDC be launched in Kenya by 2026?", p: 45 },
            { type: 'm', cat: 'Kenya', q: "Will fuel prices drop below 170 KES by June?", p: 12 },
            { type: 'n', cat: 'News', h: "USSD Connectivity Update", p: "Node 04 reporting high stability across Safaricom networks." },
            { type: 'n', cat: 'News', h: "Market Volatility", p: "BTC markets showing high buy pressure at $98k support level." }
        ];

        window.onload = () => { syncState(); startLiveFeed(); };

        function switchMode(mode, el) {
            currentMode = mode;
            document.querySelectorAll('.cat-link').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('feed').innerHTML = ''; // Clear for fresh stream
            startLiveFeed();
        }

        function startLiveFeed() {
            // Simulate a "Continuous Flow" without crashing the browser
            const feed = document.getElementById('feed');
            const items = rawData.filter(i => currentMode === 'Markets' ? i.type === 'm' : (currentMode === 'News' ? i.type === 'n' : i.cat === currentMode));
            
            items.forEach((item, index) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = 'feed-item';
                    if(item.type === 'm') {
                        div.innerHTML = `<div class="market-card"><div class="m-header"><div class="m-title">${item.q}</div><div><span class="odds-val">${item.p}%</span><span class="odds-lbl">chance</span></div></div><div class="btn-group"><button class="trade-btn yes">Yes</button><button class="trade-btn no">No</button></div></div>`;
                    } else {
                        div.innerHTML = `<div class="news-card"><span class="news-tag"><div class="live-dot"></div> Live Update</span><div class="news-h">${item.h}</div><p class="news-p">${item.p}</p></div>`;
                    }
                    feed.prepend(div); // New items appear at the top like Polymarket
                }, index * 300);
            });
        }

        function syncState() {
            const user = localStorage.getItem('nx_user');
            const bal = localStorage.getItem('nx_balance') || "0.00";
            if(user) {
                document.getElementById('signBtn').classList.add('hidden');
                document.getElementById('userIcon').classList.remove('hidden');
            }
            document.getElementById('balance').innerText = parseFloat(bal).toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function doAuth() {
            const email = document.getElementById('aEmail').value;
            if(email.includes('@')) { localStorage.setItem('nx_user', email); syncState(); closeModal('authModal'); }
        }

        function setAmt(v) { document.getElementById('depAmt').value = v; }

        function payNow() {
            const amt = document.getElementById('depAmt').value;
            if(amt < 200) return alert("Minimum 200 Required");
            const intasend = new window.IntaSend({ publicAPIKey: "ISPubKey_test_7e577665-297c-4b58-b282-7a876f8e03ad", live: false });
            intasend.run({ amount: Number(amt), currency: "KES" }).on("COMPLETE", () => {
                let cur = parseFloat(localStorage.getItem('nx_balance') || 0);
                localStorage.setItem('nx_balance', cur + Number(amt));
                syncState();
                closeModal('depositModal');
            });
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>

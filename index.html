<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexGen | Professional Terminal</title>
    
    <script src="https://unpkg.com/intasend-inlinejs-sdk@4.0.7/build/intasend-inline.js"></script>

    <style>
        :root { 
            --primary: #2ebd85; --border: #f1f5f9; --text-main: #0f172a;
            --yes: #f0fdf4; --yes-text: #166534; --no: #fef2f2; --no-text: #cf304a;
        }
        
        body { background: #f8fafc; color: var(--text-main); margin: 0; padding-top: 100px; font-family: -apple-system, sans-serif; overflow-x: hidden; transition: padding 0.3s; }

        /* --- THE NAV ESCAPE BUTTON --- */
        #return-btn {
            display: none; position: fixed; top: 20px; left: 20px;
            background: #000; color: #fff; padding: 12px 20px; border-radius: 50px;
            font-weight: 800; z-index: 4000; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer; font-size: 13px;
        }

        /* --- MODAL SYSTEM --- */
        .modal-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(8px); z-index: 3000; align-items: center; justify-content: center; padding: 20px; 
        }
        .modal-card { 
            background: #fff; width: 100%; max-width: 380px; padding: 32px; border-radius: 28px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); text-align: center;
        }

        /* --- FANCY DEPOSIT INPUT --- */
        .amount-chips { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .chip { 
            padding: 15px; border: 1.5px solid #e2e8f0; border-radius: 16px; 
            font-weight: 800; cursor: pointer; transition: 0.2s; 
        }
        .chip:hover { border-color: var(--primary); background: var(--yes); }
        .chip.active { background: #000; color: #fff; border-color: #000; }

        .auth-input { 
            width: 100%; padding: 16px; margin-bottom: 12px; border: 1.5px solid #e2e8f0; 
            border-radius: 14px; font-size: 16px; box-sizing: border-box; outline: none; text-align: center;
        }
        
        .btn-main { 
            width: 100%; padding: 18px; background: var(--primary); color: #fff; border: none; 
            border-radius: 16px; font-weight: 800; font-size: 16px; cursor: pointer;
        }

        /* --- UI HELPERS --- */
        body.hide-header .header { display: none !important; }
        body.hide-header { padding-top: 0 !important; }
        body.hide-header #return-btn { display: block !important; }
        .hidden { display: none !important; }

        /* --- INTASEND TWEAKS --- */
        #intasend-inline-container .intasend-modal-content { display: flex !important; flex-direction: column !important; }
        #intasend-inline-container .intasend-payment-nav { order: 2 !important; margin-top: 20px !important; }

        /* --- HEADER --- */
        .header { position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 2000; border-bottom: 1px solid var(--border); }
        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; height: 60px; }
        .logo { font-weight: 900; font-size: 24px; letter-spacing: -1.5px; }
        .bar-right { display: flex; align-items: center; gap: 10px; }
        
        .btn-login-trigger { background: #f1f5f9; border: none; padding: 10px 18px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .user-profile { width: 38px; height: 38px; background: #000; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; }

        .wallet-pill { display: flex; align-items: center; background: #0f172a; color: #fff; padding: 3px 3px 3px 12px; border-radius: 12px; gap: 8px; font-size: 14px; font-weight: 700; }
        .btn-deposit { background: var(--primary); color: #fff; border: none; padding: 8px 16px; border-radius: 10px; font-weight: 800; cursor: pointer; }

        /* --- CARDS --- */
        #dashboard { max-width: 500px; margin: auto; padding: 12px; }
        .card { background: #fff; border-radius: 24px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
        .m-title { font-size: 18px; font-weight: 700; line-height: 1.4; margin-bottom: 18px; }
        .p-val { font-size: 30px; font-weight: 800; }
        .btn-row { display: flex; gap: 12px; }
        .m-btn { flex: 1; padding: 16px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; }
        .btn-yes { background: var(--yes); color: var(--yes-text); }
        .btn-no { background: var(--no); color: var(--no-text); }
    </style>
</head>
<body>

    <button id="return-btn" onclick="cleanupUI()">← Back to Markets</button>

    <div id="deposit-overlay" class="modal-overlay">
        <div class="modal-card">
            <h2 style="margin: 0 0 10px 0; letter-spacing: -1px;">Refill Wallet</h2>
            <p style="color: #64748b; font-size: 14px; margin-bottom: 25px;">Min deposit: Ksh 200</p>
            
            <div class="amount-chips">
                <div class="chip" onclick="selectAmount(250)">Ksh 250</div>
                <div class="chip" onclick="selectAmount(500)">Ksh 500</div>
                <div class="chip" onclick="selectAmount(1000)">Ksh 1000</div>
                <div class="chip" onclick="selectAmount(2000)">Ksh 2000</div>
            </div>

            <input type="number" id="customAmount" class="auth-input" placeholder="Custom Amount (Ksh)">
            
            <button class="btn-main" onclick="startPayment()">Proceed to Checkout</button>
            <p onclick="closeModal('deposit-overlay')" style="margin-top:15px; font-size:13px; color:#94a3b8; cursor:pointer;">Cancel</p>
        </div>
    </div>

    <div id="auth-overlay" class="modal-overlay">
        <div class="modal-card">
            <h2 id="authTitle">Welcome Back</h2>
            <input type="email" id="authEmail" class="auth-input" placeholder="Email Address">
            <input type="password" id="authPass" class="auth-input" placeholder="Password">
            <button class="btn-main" style="background:#000" onclick="handleAuth()">Continue</button>
            <p onclick="closeModal('auth-overlay')" style="margin-top:15px; font-size:13px; color:#94a3b8; cursor:pointer;">Cancel</p>
        </div>
    </div>

    <div class="header">
        <div class="top-nav">
            <div class="logo">NEXGEN</div>
            <div class="bar-right">
                <button id="loginBtn" class="btn-login-trigger" onclick="openModal('auth-overlay')">Sign In</button>
                <div id="userIcon" class="user-profile hidden">UN</div>
                
                <div class="wallet-pill">
                    Ksh <span id="balance">0.00</span>
                    <button onclick="openModal('deposit-overlay')" class="btn-deposit">Deposit</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard">
        <div id="dynamic-feed"></div>
    </div>

    <script>
        // --- MODAL CONTROL ---
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- AUTH LOGIC ---
        function handleAuth() {
            const email = document.getElementById('authEmail').value;
            if(!email.includes('@')) return alert("Enter valid email");
            document.getElementById('loginBtn').classList.add('hidden');
            document.getElementById('userIcon').classList.remove('hidden');
            document.getElementById('userIcon').innerText = email.substring(0,2).toUpperCase();
            closeModal('auth-overlay');
        }

        // --- DEPOSIT LOGIC ---
        function selectAmount(val) {
            document.getElementById('customAmount').value = val;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
        }

        function startPayment() {
            const amt = document.getElementById('customAmount').value;
            if(amt < 200) return alert("Minimum deposit is Ksh 200");

            closeModal('deposit-overlay');
            document.body.classList.add('hide-header');

            const intasend = new window.IntaSend({
                publicAPIKey: "ISPubKey_test_7e577665-297c-4b58-b282-7a876f8e03ad",
                live: false 
            });

            intasend.run({
                amount: Number(amt),
                currency: "KES",
                redirect: false 
            })
            .on("COMPLETE", (res) => {
                const bal = document.getElementById('balance');
                bal.innerText = (parseFloat(bal.innerText) + Number(amt)).toFixed(2);
                cleanupUI();
            })
            .on("FAILED", cleanupUI);
        }

        function cleanupUI() {
            document.body.classList.remove('hide-header');
            const container = document.getElementById('intasend-inline-container');
            if (container) container.style.display = 'none';
        }

        // --- RENDER ---
        const marketPool = ["Bitcoin to Ksh 15M?", "KES to strengthen vs USD?", "Arsenal Win League?", "AI Solves Cancer?", "Tesla Robot Launch?"];
        function renderMarkets(num) {
            const feed = document.getElementById('dynamic-feed');
            for(let i=0; i<num; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="m-title">${marketPool[Math.floor(Math.random()*marketPool.length)]}</div>
                    <div class="stat-row"><span class="p-val">${Math.floor(Math.random()*80)+10}%</span></div>
                    <div class="btn-row"><button class="m-btn btn-yes">YES</button><button class="m-btn btn-no">NO</button></div>
                `;
                feed.appendChild(card);
            }
        }
        window.onload = () => renderMarkets(15);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexGen Terminal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --primary: #2ebd85; --border: #e5e7eb; --text-main: #111827;
            --yes-bg: #f0fdf4; --yes-text: #2ebd85; --no-bg: #fef2f2; --no-text: #df4b5e;
        }

        body { 
            background: #ffffff; color: var(--text-main); margin: 0; 
            padding-top: 140px; font-family: -apple-system, system-ui, sans-serif; 
            -webkit-font-smoothing: antialiased;
        }

        /* --- LOCKED HEADER DESIGN (UNTOUCHED) --- */
        .header-fixed {
            position: fixed; top: 0; left: 0; right: 0;
            background: #fff; z-index: 2000; border-bottom: 1px solid var(--border);
        }
        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
        .logo { font-weight: 900; font-size: 24px; letter-spacing: -1.5px; color: #000; }
        .user-controls { display: flex; align-items: center; gap: 8px; }
        .btn-auth { 
            font-size: 13px; font-weight: 700; background: #f3f4f6; border: none; 
            padding: 8px 14px; border-radius: 8px; cursor: pointer; color: #374151;
        }
        .btn-dep { 
            background: var(--primary); color: #fff; border: none; 
            padding: 8px 16px; border-radius: 8px; font-weight: 800; cursor: pointer; 
        }
        .cat-bar { display: flex; overflow-x: auto; padding: 10px 16px; gap: 20px; scrollbar-width: none; border-top: 1px solid #f9fafb; }
        .cat-item { font-size: 14px; font-weight: 700; color: #6b7280; cursor: pointer; white-space: nowrap; padding-bottom: 8px; }
        .cat-item.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        /* --- POLYMARKET CARDS --- */
        #dashboard { max-width: 500px; margin: auto; padding: 12px; }
        .card { background: #fff; border-radius: 20px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
        .m-title { font-size: 17px; font-weight: 700; line-height: 1.3; margin-bottom: 16px; color: #111; }
        .stats-grid { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 18px; }
        .p-val { font-size: 26px; font-weight: 800; color: #000; display: block; line-height: 1; }
        .p-lbl { font-size: 11px; color: #6b7280; font-weight: 700; text-transform: uppercase; margin-top: 4px; display: block;}
        .btn-row { display: flex; gap: 10px; }
        .m-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 800; font-size: 16px; }
        .btn-yes { background: var(--yes-bg); color: var(--yes-text); }
        .btn-no { background: var(--no-bg); color: var(--no-text); }
        .m-footer { display: flex; justify-content: space-between; margin-top: 16px; font-size: 12px; color: #9ca3af; font-weight: 600; border-top: 1px solid #f9fafb; padding-top: 12px; }
        .multiplier { font-size: 12px; opacity: 0.8; margin-left: 4px; }
    </style>
</head>
<body>

    <div class="header-fixed">
        <div class="top-nav">
            <div class="logo">NEXGEN</div>
            <div class="user-controls">
                <button class="btn-auth">Sign In</button>
                <button class="btn-auth">Sign Up</button>
                <div style="font-weight: 800; font-size: 14px; margin-left: 5px;">Ksh <span id="balance">0</span></div>
                <button class="btn-dep">Deposit</button>
            </div>
        </div>
        <div class="cat-bar">
            <div class="cat-item active">All</div>
            <div class="cat-item">Politics</div>
            <div class="cat-item">Crypto</div>
            <div class="cat-item">Kenya</div>
            <div class="cat-item">Global</div>
        </div>
    </div>

    <div id="dashboard">
        <div id="feed"></div>
    </div>

    <script>
        // 1. Generate 1,000 markets instantly
        const baseMarkets = [
            { t: "Will Jesus come back before June 2026?", p: "12", v: "$4.2M", l: "CHANCE", odds: {y: "x9", n: "x3"} },
            { t: "James Comey sentenced to Prison in 2026?", p: "9", v: "$169K", l: "CHANCE" },
            { t: "BTC Price: Up or Down in next 5m?", p: "51", v: "LIVE", l: "UP" },
            { t: "Kenya Central Bank to raise rates in May?", p: "44", v: "Ksh 8M", l: "CHANCE" }
        ];

        // Fill remaining to 1000 for "Instant Infinite Scroll" feel
        const topics = ["World War 3", "AI Sentience", "Mars Landing", "Gold Price", "TikTok Ban", "M-Pesa Global"];
        const fullMarkets = [...baseMarkets];
        for(let i=0; i<996; i++) {
            fullMarkets.push({
                t: `${topics[i % topics.length]} prediction #${i+1}?`,
                p: Math.floor(Math.random() * 99),
                v: `$${Math.floor(Math.random() * 900)}K`,
                l: "CHANCE"
            });
        }

        // 2. Render everything instantly
        const feed = document.getElementById('feed');
        feed.innerHTML = fullMarkets.map(m => `
            <div class="card">
                <div class="m-title">${m.t}</div>
                <div class="stats-grid">
                    <div>
                        <span class="p-val">${m.p}%</span>
                        <span class="p-lbl">${m.l}</span>
                    </div>
                    <div style="font-size: 12px; font-weight: 700; color: #94a3b8;">VOL: ${m.v}</div>
                </div>
                <div class="btn-row">
                    <button class="m-btn btn-yes">Yes <span class="multiplier">${m.odds ? m.odds.y : ''}</span></button>
                    <button class="m-btn btn-no">No <span class="multiplier">${m.odds ? m.odds.n : ''}</span></button>
                </div>
                <div class="m-footer">
                    <div style="color:var(--no-text)">● LIVE</div>
                    <div>Standard Market</div>
                </div>
            </div>
        `).join('');

        const supabase = window.supabase.createClient('URL', 'KEY');
    </script>
</body>
</html>

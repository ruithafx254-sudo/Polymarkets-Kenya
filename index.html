<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen | Polymarket Clone</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/intasend-inlinejs-sdk@3.0.4/build/intasend-inline.js"></script>

    <style>
        :root { 
            --primary: #2ebd85; 
            --withdraw: #cf304a; /* Red for 'No' to match your screenshot */
            --bg: #ffffff; 
            --card-bg: #ffffff; 
            --border: #e5e7eb; 
            --text-main: #111827; 
            --text-muted: #6b7280; 
            --input-bg: #f9fafb;
        }

        body { 
            background: var(--bg); color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding-top: 70px;
            display: flex; justify-content: center;
        }

        /* --- NAVIGATION --- */
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0;
            height: 60px; background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; z-index: 1000;
        }

        .logo { font-weight: 800; font-size: 18px; color: #000; }

        .wallet-bar { display: flex; align-items: center; gap: 8px; }

        .mini-balance { text-align: right; margin-right: 5px; }
        .bal-amt { font-weight: 700; color: var(--primary); font-size: 14px; }
        .bal-lbl { font-size: 9px; color: var(--text-muted); text-transform: uppercase; }

        .btn-action { 
            padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; 
            cursor: pointer; border: 1px solid var(--border); transition: 0.2s;
        }
        .btn-dep { background: #d1fae5; color: #065f46; border: none; }
        .btn-wit { background: #f3f4f6; color: #374151; }

        /* --- DASHBOARD --- */
        #dashboard { width: 100%; max-width: 480px; padding: 12px; }

        .search-bar { 
            width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--input-bg); color: #000; font-size: 14px; outline: none; margin-bottom: 16px;
        }

        /* --- POLYMARKET STYLE CARDS --- */
        .card { 
            background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); 
            padding: 16px; margin-bottom: 12px; position: relative;
        }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .m-title { font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 20px; flex: 1; padding-right: 10px;}
        
        .percentage-box { text-align: right; min-width: 60px; }
        .p-val { font-size: 18px; font-weight: 700; display: block; }
        .p-lbl { font-size: 10px; color: var(--text-muted); }

        .odds-row { display: flex; gap: 8px; }
        .odds-btn { 
            flex: 1; padding: 10px; border-radius: 8px; border: none;
            font-weight: 700; font-size: 14px; cursor: pointer; text-align: center;
        }
        .btn-yes { background: #e8f5e9; color: #2e7d32; }
        .btn-no { background: #ffebee; color: #c62828; }

        .card-footer { display: flex; justify-content: space-between; margin-top: 12px; font-size: 11px; color: var(--text-muted); }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo">NEXGEN</div>
        <div class="wallet-bar">
            <div class="mini-balance">
                <span class="bal-lbl">Balance</span>
                <span class="bal-amt">Ksh <span id="balance">0</span></span>
            </div>
            <button class="btn-action btn-dep" onclick="directDeposit()">Deposit</button>
            <button class="btn-action btn-wit" onclick="directWithdraw()">Withdraw</button>
        </div>
    </nav>

    <div id="dashboard">
        <input type="text" class="search-bar" id="market-search" placeholder="Search markets..." onkeyup="filterMarkets()">

        <div class="card">
            <div class="card-header">
                <div class="m-title">Will Jesus come back in June 2026?</div>
                <div class="percentage-box">
                    <span class="p-val">11%</span>
                    <span class="p-lbl">chance</span>
                </div>
            </div>
            <div class="odds-row">
                <button class="odds-btn btn-yes" onclick="placeTrade('YES', 9, 'Jesus 2026')">Yes</button>
                <button class="odds-btn btn-no" onclick="placeTrade('NO', 3, 'Jesus 2026')">No</button>
            </div>
            <div class="card-footer">
                <span>$420K Vol.</span>
                <span>🎁</span>
            </div>
        </div>

        <div id="market-feed">
            <div style="text-align: center; padding: 50px; color: var(--text-muted);">Syncing live markets...</div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://hwxnfzuwaeseszgsjeny.supabase.co'; 
        const SB_KEY = 'sb_publishable_C_fx8fnHQ9c1x_ZkWIG-gQ_2l2Mt-NL';
        const INTASEND_KEY = "ISPubKey_test_7e577665-297c-4b58-b282-7a876f8e03ad"; 

        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);
        let liveMarkets = [];

        async function initDashboard() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                let { data: profile } = await supabaseClient.from('profiles').select('balance').eq('id', user.id).single();
                if (profile) document.getElementById('balance').innerText = Math.floor(profile.balance).toLocaleString();
            } else {
                await supabaseClient.auth.signInAnonymously();
                initDashboard();
            }
            syncPolymarket();
        }

        async function syncPolymarket() {
            try {
                const proxy = "https://corsproxy.io/?";
                const target = "https://gamma-api.polymarket.com/events?limit=10&active=true&closed=false";
                const response = await fetch(proxy + encodeURIComponent(target));
                liveMarkets = await response.json();
                renderMarkets(liveMarkets);
            } catch (e) { console.error("Sync Failed", e); }
        }

        function renderMarkets(data) {
            const feed = document.getElementById('market-feed');
            feed.innerHTML = '';
            data.forEach(m => {
                const yesPrice = m.markets[0]?.outcomePrices[0] || 0.5;
                const prob = (yesPrice * 100).toFixed(0);
                const yesMult = (1 / yesPrice).toFixed(1);
                const noMult = (1 / (1-yesPrice)).toFixed(1);

                feed.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <div class="m-title">${m.title}</div>
                            <div class="percentage-box">
                                <span class="p-val">${prob}%</span>
                                <span class="p-lbl">chance</span>
                            </div>
                        </div>
                        <div class="odds-row">
                            <button class="odds-btn btn-yes" onclick="placeTrade('YES', ${yesMult}, '${m.title.replace(/'/g, "")}')">Yes</button>
                            <button class="odds-btn btn-no" onclick="placeTrade('NO', ${noMult}, '${m.title.replace(/'/g, "")}')">No</button>
                        </div>
                        <div class="card-footer">
                            <span>$${Math.floor(m.volume/1000)}K Vol.</span>
                            <span>🎁</span>
                        </div>
                    </div>
                `;
            });
        }

        // --- DIRECT PAYMENT LOGIC ---
        function directDeposit() {
            const amt = prompt("Enter amount to deposit (KES):", "500");
            if (!amt || amt < 10) return;

            const intasend = new window.IntaSend({ publicAPIKey: INTASEND_KEY, live: false });
            intasend.run({ amount: amt, currency: "KES", label: "NexGen Deposit" })
            .on("COMPLETE", async () => {
                const { data: { user } } = await supabaseClient.auth.getUser();
                let { data: profile } = await supabaseClient.from('profiles').select('balance').eq('id', user.id).single();
                await supabaseClient.from('profiles').update({ balance: parseFloat(profile.balance) + parseFloat(amt) }).eq('id', user.id);
                location.reload();
            });
        }

        async function directWithdraw() {
            const amt = prompt("Enter amount to withdraw (KES):");
            if (!amt || amt < 50) return alert("Min 50 KES");
            
            const { data: { user } } = await supabaseClient.auth.getUser();
            let { data: profile } = await supabaseClient.from('profiles').select('balance').eq('id', user.id).single();
            
            if (profile.balance < amt) return alert("Insufficient funds");
            
            await supabaseClient.from('profiles').update({ balance: profile.balance - amt }).eq('id', user.id);
            alert("Withdrawal request sent to M-Pesa!");
            location.reload();
        }

        async function placeTrade(choice, mult, name) {
            const amt = prompt(`Confirm ${choice} on ${name}. Amount (KES):`, "100");
            if (!amt || amt < 10) return;
            const { data: { user } } = await supabaseClient.auth.getUser();
            let { data: profile } = await supabaseClient.from('profiles').select('balance').eq('id', user.id).single();
            if (profile.balance < amt) return alert("Deposit more KES first!");
            await supabaseClient.from('profiles').update({ balance: profile.balance - amt }).eq('id', user.id);
            await supabaseClient.from('trades').insert([{ user_id: user.id, selection: choice, amount: amt, market_name: name }]);
            location.reload();
        }

        function filterMarkets() {
            const term = document.getElementById('market-search').value.toLowerCase();
            const filtered = liveMarkets.filter(m => m.title.toLowerCase().includes(term));
            renderMarkets(filtered);
        }

        initDashboard();
    </script>
</body>
</html>

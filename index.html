<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen | Instant Terminal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/intasend-inlinejs-sdk@3.0.4/build/intasend-inline.js"></script>

    <style>
        :root { 
            --primary: #2ebd85; --no-text: #cf304a; --yes-text: #166534;
            --bg: #ffffff; --border: #e5e7eb; --text-muted: #6b7280;
        }

        body { 
            background: var(--bg); color: #111827; margin: 0; padding-top: 140px;
            font-family: -apple-system, system-ui, sans-serif;
        }

        /* --- STICKY TOP SECTION --- */
        .header-fixed {
            position: fixed; top: 0; left: 0; right: 0;
            background: #fff; z-index: 2000; border-bottom: 1px solid var(--border);
        }

        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #f3f4f6; }
        .logo { font-weight: 900; font-size: 24px; letter-spacing: -1.5px; color: #000; }

        .user-controls { display: flex; align-items: center; gap: 8px; }
        .btn-lite { font-size: 11px; font-weight: 700; border: 1px solid var(--border); padding: 6px 10px; border-radius: 6px; cursor: pointer; }
        .btn-dep { background: var(--primary); color: #fff; border: none; padding: 7px 14px; border-radius: 8px; font-weight: 800; cursor: pointer; }

        /* --- CATEGORIES --- */
        .cat-bar { display: flex; overflow-x: auto; padding: 10px 16px; gap: 18px; scrollbar-width: none; background: #fff; }
        .cat-item { font-size: 13px; font-weight: 700; color: var(--text-muted); cursor: pointer; white-space: nowrap; padding-bottom: 5px; }
        .cat-item.active { color: #000; border-bottom: 2px solid #000; }

        /* --- INSTANT CARDS --- */
        #dashboard { max-width: 500px; margin: auto; padding: 12px; }
        .card { background: #fff; border-radius: 16px; border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; }
        .card-top { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .m-title { font-size: 15px; font-weight: 600; line-height: 1.4; flex: 1; padding-right: 15px; }
        
        .p-box { text-align: right; }
        .p-val { font-size: 18px; font-weight: 800; display: block; }
        .p-lbl { font-size: 10px; color: var(--text-muted); }

        .btn-row { display: flex; gap: 8px; }
        .m-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 14px; }
        .btn-yes { background: #f0fdf4; color: var(--yes-text); }
        .btn-no { background: #fef2f2; color: var(--no-text); }

        .m-footer { display: flex; justify-content: space-between; margin-top: 12px; font-size: 11px; color: var(--text-muted); font-weight: 600; border-top: 1px solid #f9fafb; padding-top: 8px; }
        .live-dot { width: 6px; height: 6px; background: red; border-radius: 50%; display: inline-block; margin-right: 4px; }
    </style>
</head>
<body>

    <div class="header-fixed">
        <div class="top-nav">
            <div class="logo">NEXGEN</div>
            <div class="user-controls">
                <div class="btn-lite" onclick="auth()">Sign In</div>
                <div class="btn-lite" onclick="auth()">Sign Up</div>
                <div style="font-weight: 800; font-size: 13px; margin: 0 5px;">Ksh <span id="balance">0</span></div>
                <button class="btn-dep" onclick="deposit()">Deposit</button>
            </div>
        </div>
        <div class="cat-bar" id="cat-list">
            <div class="cat-item active" onclick="filter('all', this)">All</div>
            <div class="cat-item" onclick="filter('Politics', this)">Politics</div>
            <div class="cat-item" onclick="filter('Crypto', this)">Crypto</div>
            <div class="cat-item" onclick="filter('Sports', this)">Sports</div>
            <div class="cat-item" onclick="filter('Business', this)">Business</div>
            <div class="cat-item" onclick="filter('Kenya', this)">Kenya</div>
        </div>
    </div>

    <div id="dashboard">
        <div id="feed"></div>
    </div>

    <script>
        // INSTANT DATA PRE-LOADED (Mirroring Polymarket's actual news)
        const instantData = [
            { t: "Will Jesus come back in June 2026?", c: "all", p: "11", v: "$420K", s: "9x Payout" },
            { t: "James Comey sentenced to Prison in 2026?", c: "Politics", p: "9", v: "$169K", s: "USDC" },
            { t: "BTC Price: Up or Down in next 5m?", c: "Crypto", p: "51", v: "LIVE", s: "Bitcoin" },
            { t: "Will the Fed cut interest rates in June?", c: "Business", p: "64", v: "$2.1M", s: "USDC" },
            { t: "Real Madrid to win Champions League Final?", c: "Sports", p: "58", v: "$890K", s: "USDC" },
            { t: "Will CBK hold Kenya Interest Rates at 8.75%?", c: "Kenya", p: "82", v: "Ksh 12M", s: "KES" },
            { t: "Ethereum to hit $4,000 by end of May?", c: "Crypto", p: "33", v: "$1.4M", s: "USDC" },
            { t: "Will EPRA reduce Petrol prices in Mombasa?", c: "Kenya", p: "45", v: "Ksh 5M", s: "KES" },
            { t: "Donald Trump to win 2024 Election?", c: "Politics", p: "52", v: "$150M", s: "USDC" },
            { t: "Arsenal to win the Premier League?", c: "Sports", p: "21", v: "$4.5M", s: "USDC" }
        ];

        function render(category = 'all') {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            
            const filtered = category === 'all' ? instantData : instantData.filter(i => i.c === category);

            filtered.forEach(m => {
                feed.innerHTML += `
                    <div class="card">
                        <div class="card-top">
                            <div class="m-title">${m.t}</div>
                            <div class="p-box">
                                <span class="p-val">${m.p}%</span>
                                <span class="p-lbl">${m.c === 'Crypto' ? 'Up' : 'chance'}</span>
                            </div>
                        </div>
                        <div class="btn-row">
                            <button class="m-btn btn-yes" onclick="trade()">Yes</button>
                            <button class="m-btn btn-no" onclick="trade()">No</button>
                        </div>
                        <div class="m-footer">
                            <span>Vol: ${m.v}</span>
                            <span><div class="live-dot"></div> ${m.s}</span>
                        </div>
                    </div>
                `;
            });
        }

        function filter(cat, el) {
            document.querySelectorAll('.cat-item').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            render(cat);
        }

        // AUTH & DEPOSIT FUNCTIONS
        function auth() { alert("Supabase Auth Connection Ready"); }
        function deposit() { alert("IntaSend M-Pesa Ready"); }
        function trade() { alert("Order Executed!"); }

        // LOAD EVERYTHING IMMEDIATELY
        window.onload = () => render('all');
    </script>
</body>
</html>

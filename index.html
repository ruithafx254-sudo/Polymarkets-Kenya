<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen | Live Market</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --green: #2ebd85; --red: #f6465d; --bg: #0b0e11; --card: #181a20; --border: #2b3139; --text-muted: #929aa5; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        #auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; width: 100%; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 16px; border: 1px solid var(--border); text-align: center; max-width: 350px; width: 100%; }
        #dashboard { display: none; width: 100%; max-width: 480px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .balance-amt { font-size: 28px; font-weight: bold; color: var(--green); }
        .market-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .btn-main { background: var(--green); color: black; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 8px; border: 1px solid var(--border); background: #2b3139; color: white; box-sizing: border-box; font-size: 16px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="color: var(--green); margin:0;">NexGen</h1>
            <p style="color: var(--text-muted);">Decentralized Prediction Market</p>
            <button class="btn-main" onclick="enterAnonymously()">Connect Anonymously</button>
        </div>
    </div>

    <div id="dashboard">
        <div class="header">
            <div>
                <div style="font-size: 11px; color: var(--text-muted);">BALANCE</div>
                <div class="balance-amt">$<span id="balance">0.00</span></div>
            </div>
            <button onclick="initDashboard()" style="background:none; border:1px solid var(--border); color:white; padding:8px; border-radius:6px; cursor:pointer;">Refresh</button>
        </div>

        <div class="market-card">
            <span style="font-weight: bold;">XAUUSD (Gold) Market</span>
            <p style="font-size: 14px; color: #ced4da;">Will Gold close above $2,350 tonight?</p>
            <div style="display:flex; gap:10px;">
                <button class="btn-main" style="background:rgba(46,189,133,0.15); color:var(--green); border:1px solid var(--green);" onclick="alert('Insufficient Balance')">YES</button>
                <button class="btn-main" style="background:rgba(246,70,93,0.15); color:var(--red); border:1px solid var(--red);" onclick="alert('Insufficient Balance')">NO</button>
            </div>
        </div>

        <div class="market-card">
            <label style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px; display: block;">DEPOSIT AMOUNT (USD)</label>
            <input type="number" id="dep-amt" value="10" min="5">
            <button class="btn-main" onclick="depositFunds()">Pay with Card</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://hwxnfzuwaeseszgsjeny.supabase.co'; 
        const SB_KEY = 'sb_publishable_C_fx8fnHQ9c1x_ZkWIG-gQ_2l2Mt-NL';
        const NOW_KEY = 'HWQ3MH8-JCH4K63-NWYP1W7-FJXHXVA'; // Your verified key
        const WALLET = '0xc363ca9fee66b306b8ff9a38584a260d400fbbc0'; 

        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

        async function enterAnonymously() {
            try {
                const { data, error } = await supabaseClient.auth.signInAnonymously();
                if (error) throw error;
                initDashboard();
            } catch (err) {
                alert("Login Error: " + err.message);
            }
        }

        async function initDashboard() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                
                let { data: profile } = await supabaseClient.from('profiles').select('balance').eq('id', user.id).single();
                if (profile) {
                    document.getElementById('balance').innerText = parseFloat(profile.balance).toFixed(2);
                } else {
                    await supabaseClient.from('profiles').insert([{ id: user.id, balance: 0 }]);
                }
            }
        }

        function depositFunds() {
            const amt = document.getElementById('dep-amt').value;
            if (!amt || amt < 5) return alert("Minimum deposit is $5");

            // NEW: Using the standard Payment Invoice URL to prevent 404/Login errors
            const paymentUrl = `https://nowpayments.io/payment/?api_key=${NOW_KEY}&amount=${amt}&currency=usd&pay_currency=usdttrc20&address=${WALLET}`;
            
            window.open(paymentUrl, "_blank");
        }

        initDashboard();
    </script>
</body>
</html>

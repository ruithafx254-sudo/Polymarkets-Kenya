<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexGen | Institutional Terminal</title>
    
    <script src="https://unpkg.com/intasend-inlinejs-sdk@4.0.7/build/intasend-inline.js"></script>

    <style>
        :root { 
            --primary: #2ebd85; --border: #f1f5f9; --text-main: #0f172a; --text-sub: #94a3b8;
            --yes: #f0fdf4; --yes-text: #166534; --no: #fef2f2; --no-text: #cf304a;
        }
        
        body { background: #f8fafc; color: var(--text-main); margin: 0; padding-top: 100px; font-family: -apple-system, sans-serif; overflow-x: hidden; }

        /* --- PERMANENT BOTTOM RETURN BUTTON --- */
        #return-btn {
            display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #000; color: #fff; padding: 18px 40px; border-radius: 100px;
            font-weight: 800; z-index: 9999; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            cursor: pointer; font-size: 14px; letter-spacing: 0.5px; white-space: nowrap;
        }

        /* --- AUTH SWITCH (BRIGHT VS DULL) --- */
        .auth-switch { 
            display: flex; background: #f1f5f9; padding: 4px; border-radius: 100px; margin-bottom: 30px; width: 240px; margin-inline: auto; border: 1px solid #e2e8f0;
        }
        .auth-tab { flex: 1; padding: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; text-align: center; border-radius: 100px; }
        .auth-tab.active { color: #fff; background: #0f172a; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .auth-tab.inactive { color: #94a3b8; background: transparent; }

        /* --- PROFESSIONAL CURRENCY INPUT --- */
        .currency-terminal { background: #fff; padding: 25px; border-radius: 24px; border: 1.5px solid #e2e8f0; margin-bottom: 20px; text-align: left; }
        .input-label { font-size: 11px; font-weight: 900; color: var(--text-sub); letter-spacing: 1px; margin-bottom: 10px; display: block; }
        .input-wrapper { display: flex; align-items: baseline; border-bottom: 2px solid #000; padding-bottom: 8px; }
        .currency-prefix { font-size: 22px; font-weight: 900; margin-right: 12px; }
        .amount-field { border: none; outline: none; font-size: 38px; font-weight: 900; width: 100%; background: transparent; }
        
        .chip-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .chip { background: #f1f5f9; padding: 12px 5px; border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer; text-align: center; transition: 0.2s; }
        .chip.active { background: #000; color: #fff; }

        /* --- MODALS --- */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); z-index: 5000; align-items: center; justify-content: center; padding: 15px; }
        .modal-card { background: #fff; width: 100%; max-width: 380px; padding: 35px; border-radius: 35px; text-align: center; }
        .btn-main { width: 100%; padding: 18px; background: #000; color: #fff; border: none; border-radius: 18px; font-weight: 700; font-size: 16px; cursor: pointer; }

        /* --- HEADER & CARDS --- */
        .header { position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 2000; border-bottom: 1px solid var(--border); }
        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; height: 64px; }
        .logo { font-weight: 950; font-size: 24px; letter-spacing: -1.5px; }
        .user-profile { width: 38px; height: 38px; background: #000; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; }
        .wallet-pill { display: flex; align-items: center; background: #0f172a; color: #fff; padding: 3px 3px 3px 12px; border-radius: 12px; gap: 8px; font-size: 13px; font-weight: 700; }
        .btn-deposit { background: var(--primary); color: #fff; border: none; padding: 8px 14px; border-radius: 10px; font-weight: 800; cursor: pointer; }
        
        #dashboard { max-width: 500px; margin: auto; padding: 12px; }
        .card { background: #fff; border-radius: 24px; border: 1px solid var(--border); padding: 22px; margin-bottom: 16px; }
        .p-val { font-size: 32px; font-weight: 900; display: block; margin-bottom: 15px; }
        .btn-row { display: flex; gap: 10px; }
        .m-btn { flex: 1; padding: 16px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; }

        body.hide-header .header { display: none !important; }
        body.hide-header { padding-top: 0 !important; }
        body.hide-header #return-btn { display: block !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <button id="return-btn" onclick="cleanupUI()">← Return to Markets</button>

    <div id="auth-overlay" class="modal-overlay">
        <div class="modal-card">
            <div class="auth-switch">
                <div id="tab-in" class="auth-tab active" onclick="switchAuth('in')">Sign In</div>
                <div id="tab-up" class="auth-tab inactive" onclick="switchAuth('up')">Sign Up</div>
            </div>
            <h2 id="authTitle" style="margin-bottom:20px">Login</h2>
            <div id="signupOnly" class="hidden">
                <input type="text" id="authName" style="width:100%; padding:15px; border:1px solid #ddd; border-radius:12px; margin-bottom:12px;" placeholder="Full Name">
            </div>
            <input type="email" id="authEmail" style="width:100%; padding:15px; border:1px solid #ddd; border-radius:12px; margin-bottom:12px;" placeholder="Email Address">
            <input type="password" id="authPass" style="width:100%; padding:15px; border:1px solid #ddd; border-radius:12px; margin-bottom:20px;" placeholder="Password">
            <button class="btn-main" onclick="handleAuth()">Access Terminal</button>
        </div>
    </div>

    <div id="deposit-overlay" class="modal-overlay">
        <div class="modal-card">
            <h2 style="margin-bottom:25px">Deposit KES</h2>
            <div class="currency-terminal">
                <label class="input-label">SPECIFY AMOUNT</label>
                <div class="input-wrapper">
                    <span class="currency-prefix">Ksh</span>
                    <input type="number" id="customAmount" class="amount-field" placeholder="0">
                </div>
                <div class="chip-grid">
                    <div class="chip" onclick="setAmt(250, this)">250</div>
                    <div class="chip" onclick="setAmt(500, this)">500</div>
                    <div class="chip" onclick="setAmt(1000, this)">1k</div>
                    <div class="chip" onclick="setAmt(2000, this)">2k</div>
                </div>
            </div>
            <button class="btn-main" style="background:var(--primary)" onclick="startPayment()">Authorize Deposit</button>
            <p onclick="closeModal('deposit-overlay')" style="margin-top:20px; font-size:13px; color:#999; cursor:pointer;">Cancel</p>
        </div>
    </div>

    <div class="header">
        <div class="top-nav">
            <div class="logo">NEXGEN</div>
            <div class="bar-right">
                <button id="loginBtn" class="btn-deposit" style="background:#f1f5f9; color:#000" onclick="openModal('auth-overlay')">Sign In</button>
                <div id="userIcon" class="user-profile hidden" onclick="logout()">??</div>
                <div class="wallet-pill">
                    Ksh <span id="balance">0.00</span>
                    <button onclick="openModal('deposit-overlay')" class="btn-deposit">Deposit</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard">
        <div id="dynamic-feed"></div>
    </div>

    <script>
        // --- SESSION PERSISTENCE ---
        window.onload = () => {
            const user = localStorage.getItem('nx_user');
            const bal = localStorage.getItem('nx_balance');
            if(user) {
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userIcon').classList.remove('hidden');
                document.getElementById('userIcon').innerText = user;
            }
            if(bal) document.getElementById('balance').innerText = parseFloat(bal).toFixed(2);
            render();
        };

        // --- BACK BUTTON INTERCEPTION ---
        window.addEventListener('popstate', function(event) {
            // If the header is hidden, we are in "Payment Mode"
            if (document.body.classList.contains('hide-header')) {
                cleanupUI();
                // Prevent the browser from actually going back to the previous site
                history.pushState(null, null, window.location.pathname);
            }
        });

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function switchAuth(mode) {
            const tIn = document.getElementById('tab-in');
            const tUp = document.getElementById('tab-up');
            if(mode === 'up') {
                tUp.className = "auth-tab active"; tIn.className = "auth-tab inactive";
                document.getElementById('signupOnly').classList.remove('hidden');
            } else {
                tIn.className = "auth-tab active"; tUp.className = "auth-tab inactive";
                document.getElementById('signupOnly').classList.add('hidden');
            }
        }

        function handleAuth() {
            const initial = document.getElementById('authEmail').value.substring(0,2).toUpperCase();
            localStorage.setItem('nx_user', initial);
            location.reload();
        }

        function logout() { localStorage.removeItem('nx_user'); location.reload(); }

        function setAmt(val, el) {
            document.getElementById('customAmount').value = val;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function startPayment() {
            const amt = document.getElementById('customAmount').value;
            if(amt < 200) return alert("Min Ksh 200");
            
            closeModal('deposit-overlay');
            document.body.classList.add('hide-header');
            
            // Push a fake state so the next "Back" press triggers our popstate listener
            history.pushState({paying: true}, null, "");

            const intasend = new window.IntaSend({
                publicAPIKey: "ISPubKey_test_7e577665-297c-4b58-b282-7a876f8e03ad",
                live: false 
            });

            intasend.run({ amount: Number(amt), currency: "KES", redirect: false })
            .on("COMPLETE", (res) => {
                const newBal = parseFloat(document.getElementById('balance').innerText) + Number(amt);
                localStorage.setItem('nx_balance', newBal);
                location.reload();
            })
            .on("FAILED", cleanupUI);
        }

        function cleanupUI() {
            document.body.classList.remove('hide-header');
            const container = document.getElementById('intasend-inline-container');
            if (container) container.style.display = 'none';
            // Remove the return button from view
            document.getElementById('return-btn').style.display = 'none';
        }

        function render() {
            const feed = document.getElementById('dynamic-feed');
            const m = ["BTC to reach Ksh 15M?", "Arsenal Premier League?", "KES to 110 vs USD?"];
            for(let i=0; i<10; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div style="font-weight:700;margin-bottom:10px">${m[i%3]}</div><span class="p-val">${Math.floor(Math.random()*80)+10}%</span><div class="btn-row"><button class="m-btn btn-yes">YES</button><button class="m-btn btn-no">NO</button></div>`;
                feed.appendChild(card);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexGen Terminal</title>

    <script src="https://unpkg.com/intasend-inlinejs-sdk@4.0.7/build/intasend-inline.js"></script>

    <style>
        :root { 
            --primary: #2ebd85; --border: #f1f5f9; --text: #0f172a;
            --yes: #f0fdf4; --yes-text: #166534; --no: #fef2f2; --no-text: #cf304a;
        }
        body { background: #f8fafc; color: var(--text); margin: 0; padding-top: 80px; font-family: system-ui, -apple-system, sans-serif; }

        /* --- HEADER --- */
        .header { position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 2000; border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .logo { font-weight: 900; font-size: 22px; letter-spacing: -1.2px; }
        
        .nav-right { display: flex; align-items: center; gap: 8px; }
        .auth-btn { background: #f1f5f9; border: none; padding: 8px 12px; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; }

        .wallet { display: flex; align-items: center; background: #0f172a; color: #fff; padding: 2px 2px 2px 10px; border-radius: 12px; gap: 8px; font-size: 13px; font-weight: 700; }
        .deposit-btn { background: var(--primary); color: #fff; border: none; padding: 8px 14px; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 13px; }

        /* --- THE FIX: FORCING MPESA/CARD TABS TO THE BOTTOM --- */
        /* Targets the IntaSend wrapper to flip the layout order */
        #intasend-inline-container .intasend-payment-nav {
            order: 2 !important;
            margin-top: 20px !important;
            border-top: 1px solid #eee !important;
            border-bottom: none !important;
        }
        #intasend-inline-container .intasend-payment-body {
            order: 1 !important;
        }
        #intasend-inline-container .intasend-modal-content {
            display: flex !important;
            flex-direction: column !important;
        }

        /* --- AUTH SWITCH MODAL --- */
        #auth-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .modal-box { background: #fff; width: 100%; max-width: 340px; padding: 25px; border-radius: 30px; text-align: center; }
        
        .toggle-switch { display: flex; background: #f1f5f9; padding: 4px; border-radius: 14px; margin-bottom: 20px; position: relative; cursor: pointer; border: 1px solid #e2e8f0; }
        .t-btn { flex: 1; padding: 12px; font-size: 14px; font-weight: 700; color: #64748b; z-index: 1; }
        .t-btn.active { color: #000; }
        .slider { position: absolute; width: calc(50% - 4px); height: calc(100% - 8px); background: #fff; border-radius: 11px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .signup-active .slider { transform: translateX(100%); }

        .m-input { width: 100%; padding: 15px; margin-bottom: 12px; border: 1px solid #e2e8f0; border-radius: 14px; font-size: 16px; box-sizing: border-box; outline: none; }
        .m-submit { width: 100%; padding: 16px; background: #000; color: #fff; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; }

        /* --- FEED --- */
        #feed { max-width: 500px; margin: auto; padding: 12px; }
        .card { background: #fff; border-radius: 24px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
        .m-title { font-size: 17px; font-weight: 700; line-height: 1.4; margin-bottom: 15px; }
        .p-val { font-size: 28px; font-weight: 800; margin-bottom: 15px; display: block; letter-spacing: -1px; }
        .btn-row { display: flex; gap: 10px; }
        .act-btn { flex: 1; padding: 15px; border-radius: 14px; border: none; font-weight: 800; font-size: 15px; cursor: pointer; }
        .btn-yes { background: var(--yes); color: var(--yes-text); }
        .btn-no { background: var(--no); color: var(--no-text); }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">NEXGEN</div>
        <div class="nav-right">
            <button class="auth-btn" onclick="openAuth()">Sign In</button>
            <div class="wallet">
                Ksh <span id="bal">0.00</span>
                <button onclick="initiatePayment()" class="deposit-btn">Deposit</button>
            </div>
        </div>
    </header>

    <div id="feed">
        <div class="card">
            <div class="m-title">Will Jesus Christ return before December 2026?</div>
            <span class="p-val">12%</span>
            <div class="btn-row">
                <button class="act-btn btn-yes">YES</button>
                <button class="act-btn btn-no">NO</button>
            </div>
        </div>
        <div id="dynamic"></div>
    </div>

    <div id="auth-modal">
        <div class="modal-box">
            <div class="toggle-switch" id="authSwitch" onclick="toggleAuthMode()">
                <div class="slider"></div>
                <div class="t-btn active" id="tIn">Sign In</div>
                <div class="t-btn" id="tUp">Sign Up</div>
            </div>
            <h2 id="auth-head" style="margin:0 0 20px 0;">Welcome Back</h2>
            <input type="email" class="m-input" placeholder="Email Address">
            <input type="password" class="m-input" placeholder="Password">
            <button class="m-submit" onclick="closeAuth()">Continue</button>
        </div>
    </div>

    <script>
        function initiatePayment() {
            const intasend = new window.IntaSend({
                publicAPIKey: "ISPubKey_test_7e577665-297c-4b58-b282-7a876f8e03ad",
                live: false 
            });

            intasend.run({
                amount: 50,
                currency: "KES",
                email: "user@nexgen.com",
                button_text: "Pay Now",
                redirect: false 
            }).on("COMPLETE", (res) => {
                document.getElementById('bal').innerText = res.amount;
            });
        }

        function openAuth() { document.getElementById('auth-modal').style.display = 'flex'; }
        function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }
        
        let isSignup = false;
        function toggleAuthMode() {
            isSignup = !isSignup;
            document.getElementById('authSwitch').classList.toggle('signup-active');
            document.getElementById('auth-head').innerText = isSignup ? "Create Account" : "Welcome Back";
            document.getElementById('tIn').classList.toggle('active');
            document.getElementById('tUp').classList.toggle('active');
        }

        const marketItems = ["Bitcoin to $100k?", "Ksh to 120?", "Arsenal Win?", "AI Solves Fusion?", "Solana Flip ETH?"];
        let total = 0;
        function render(num) {
            const container = document.getElementById('dynamic');
            for(let i=0; i<num; i++) {
                if(total >= 1000) break;
                total++;
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="m-title">${marketItems[Math.floor(Math.random()*marketItems.length)]}</div>
                    <span class="p-val">${Math.floor(Math.random()*85)+5}%</span>
                    <div class="btn-row"><button class="act-btn btn-yes">YES</button><button class="act-btn btn-no">NO</button></div>
                `;
                container.appendChild(card);
            }
        }

        window.onload = () => render(30);
        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) render(15);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen | Executive Terminal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/intasend-inlinejs-sdk@3.0.4/build/intasend-inline.js"></script>

    <style>
        :root { 
            --primary: #2ebd85; 
            --bg: #0b0e11; 
            --card-bg: #1e2329; 
            --border: #363c4e; 
            --text-main: #eaecef;
            --text-muted: #848e9c;
            --input-bg: #2b3139;
        }

        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center;
            align-items: center;
            min-height: 100vh; 
            padding: 20px; 
            box-sizing: border-box; 
        }

        #dashboard { width: 100%; max-width: 400px; animation: fadeIn 0.5s ease-out; }

        .header-card { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .balance-value { font-size: 28px; font-weight: 700; color: var(--primary); margin-top: 4px; }

        .action-card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            padding: 24px;
            text-align: center;
        }

        label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 10px; text-align: left; }

        input { 
            width: 100%; 
            padding: 16px; 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            background: var(--input-bg); 
            color: white; 
            font-size: 18px; 
            font-weight: 600;
            margin-bottom: 20px; 
            box-sizing: border-box;
            text-align: center;
        }

        .btn-deposit { 
            background: var(--primary); 
            color: #000; 
            border: none; 
            padding: 18px; 
            width: 100%; 
            border-radius: 10px; 
            font-weight: 700; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.2s;
        }

        .btn-deposit:active { opacity: 0.8; transform: scale(0.98); }

        .trust-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
        .trust-badge { width: 100%; max-width: 280px; opacity: 0.8; }
        .secure-text { font-size: 10px; color: var(--text-muted); margin-top: 8px; letter-spacing: 1px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .refresh-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="dashboard">
        <div class="header-card">
            <div>
                <div class="balance-label">Available Balance</div>
                <div class="balance-value">Ksh <span id="balance">0</span></div>
            </div>
            <button class="refresh-btn" onclick="initDashboard()">REFRESH</button>
        </div>

        <div class="action-card">
            <label for="dep-amt">Account Funding (KES)</label>
            <input type="number" id="dep-amt" value="500" min="10">
            
            <button class="btn-deposit" id="deposit-btn" onclick="openCheckout()">Deposit</button>
            
            <div class="trust-section">
                <a href="https://intasend.com/security" target="_blank">
                    <img class="trust-badge" src="https://intasend-prod-static.s3.amazonaws.com/img/trust-badges/intasend-trust-badge-v-light.png" alt="Secure Checkout">
                </a>
                <div class="secure-text">SECURED BY INTASEND PAYMENTS</div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://hwxnfzuwaeseszgsjeny.supabase.co'; 
        const SB_KEY = 'sb_publishable_C_fx8fnHQ9c1x_ZkWIG-gQ_2l2Mt-NL';
        
        // YOUR LIVE KEY
        const INTASEND_KEY = "ISPubKey_live_95010572-41c2-46f6-ba0d-438fc260f1bd"; 

        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

        // 1. Initialize User and Balance
        async function initDashboard() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                let { data: profile } = await supabaseClient.from('profiles').select('balance').eq('id', user.id).single();
                if (profile) {
                    document.getElementById('balance').innerText = Math.floor(profile.balance).toLocaleString();
                } else {
                    await supabaseClient.from('profiles').insert([{ id: user.id, balance: 0 }]);
                }
            } else {
                await supabaseClient.auth.signInAnonymously();
                initDashboard();
            }
        }

        // 2. The Main Payment Trigger
        function openCheckout() {
            const amt = document.getElementById('dep-amt').value;
            
            if (amt < 10) {
                alert("Minimum deposit is Ksh 10");
                return;
            }

            if (!window.IntaSend) {
                alert("Payment system is still loading. Please wait 5 seconds and try again.");
                return;
            }

            const intasend = new window.IntaSend({
                publicAPIKey: INTASEND_KEY,
                live: true // LIVE MODE ACTIVE
            });

            intasend.run({
                amount: amt,
                currency: "KES",
                label: "NexGen Account Funding",
                method: "M-PESA" 
            })
            .on("COMPLETE", async (response) => {
                await updateBalance(amt);
                alert("Deposit of Ksh " + amt + " successful!");
            })
            .on("FAILED", (response) => {
                alert("Payment failed. Please try again.");
                console.error("IntaSend Error:", response);
            })
            .on("IN-PROGRESS", () => {
                console.log("Payment in progress...");
            });
        }

        // 3. Update Supabase
        async function updateBalance(addedAmount) {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return;

            let { data: profile } = await supabaseClient.from('profiles').select('balance').eq('id', user.id).single();
            const newBalance = parseFloat(profile.balance || 0) + parseFloat(addedAmount);
            
            await supabaseClient.from('profiles').update({ balance: newBalance }).eq('id', user.id);
            document.getElementById('balance').innerText = Math.floor(newBalance).toLocaleString();
        }

        // Start on load
        initDashboard();
    </script>
</body>
</html>

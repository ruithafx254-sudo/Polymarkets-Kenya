<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polymarkets Africa | Terminal</title>
    
    <script src="https://unpkg.com/intasend-inlinejs-sdk@4.0.7/build/intasend-inline.js"></script>

    <style>
        :root { 
            --accent: #2ebd85; --border: #eceef2; --text-main: #0f172a; --text-sub: #64748b;
            --yes: #f0fdf4; --yes-text: #166534; --no: #fef2f2; --no-text: #991b1b;
            --tech-bg: #0f172a; --gemini: #6366f1;
        }
        
        body { background: #ffffff; color: var(--text-main); margin: 0; padding-top: 130px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }

        /* --- HEADER SYSTEM --- */
        .header-stack { position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 2000; border-bottom: 1px solid var(--border); transition: transform 0.4s ease; }
        body.hide-header .header-stack { transform: translateY(-100%); }

        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 60px; }
        .logo-wrap { display: flex; flex-direction: column; line-height: 1; }
        .logo-main { font-weight: 900; font-size: 18px; letter-spacing: -0.5px; color: #000; text-transform: uppercase; }
        .logo-sub { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
        
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .wallet-pill { display: flex; align-items: center; background: #f8fafc; border: 1px solid var(--border); padding: 4px 4px 4px 12px; border-radius: 10px; gap: 8px; font-size: 13px; font-weight: 700; }
        .btn-deposit { background: #000; color: #fff; border: none; padding: 7px 14px; border-radius: 8px; font-weight: 700; font-size: 12px; cursor: pointer; }
        
        .user-id { width: 36px; height: 36px; background: var(--tech-bg); color: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .person-icon { width: 20px; height: 20px; fill: currentColor; }

        /* --- SUB NAV --- */
        .sub-nav { display: flex; gap: 20px; padding: 12px 20px; overflow-x: auto; background: #fff; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .cat-link { font-size: 13px; font-weight: 700; color: var(--text-sub); text-decoration: none; white-space: nowrap; cursor: pointer; }
        .cat-link.active { color: #000; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: -12px; }

        /* --- CONTENT FEED --- */
        #dashboard { max-width: 600px; margin: auto; padding: 10px; }
        
        .market-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 12px; animation: slideUp 0.4s ease-out; }
        .m-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .m-title { font-size: 15px; font-weight: 600; line-height: 1.4; color: #111; }
        .odds-val { font-size: 18px; font-weight: 800; color: #000; }
        .odds-lbl { font-size: 10px; color: var(--text-sub); text-transform: uppercase; display: block; text-align: right; }
        
        .btn-group { display: flex; gap: 10px; }
        .trade-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 800; font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .trade-btn.yes { background: var(--yes); color: var(--yes-text); }
        .trade-btn.no { background: var(--no); color: var(--no-text); }

        .news-card { border-left: 3px solid var(--accent); background: #f8fafc; padding: 16px; border-radius: 0 12px 12px 0; margin-bottom: 12px; animation: slideUp 0.4s ease-out; }
        .news-tag { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
        .news-h { font-size: 14px; font-weight: 700; margin-bottom: 6px; color: #000; }
        .news-p { font-size: 13px; color: var(--text-sub); line-height: 1.5; margin: 0; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* MODALS */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(6px); z-index: 5000; align-items: center; justify-content: center; padding: 16px; }
        .modal { background: #fff; width: 100%; max-width: 360px; padding: 32px; border-radius: 24px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .auth-nav { display: flex; background: #f1f5f9; padding: 6px; border-radius: 14px; margin-bottom: 24px; }
        .auth-tab { flex: 1; padding: 10px; font-size: 13px; font-weight: 800; cursor: pointer; border-radius: 10px; color: var(--text-sub); transition: 0.3s; }
        .auth-tab.active { background: #000; color: #fff; }
        .input-tech { width: 100%; padding: 16px; background: #f8fafc; border: 1px solid var(--border); border-radius: 12px; font-size: 14px; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        .btn-tech { width: 100%; padding: 16px; background: #000; color: #fff; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; font-size: 15px; }
        .chip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .amt-chip { border: 1px solid var(--border); padding: 12px; border-radius: 12px; font-size: 13px; font-weight: 800; cursor: pointer; background: #fff; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header-stack">
        <div class="top-nav">
            <div class="logo-wrap">
                <div class="logo-main">Polymarkets</div>
                <div class="logo-sub">Africa</div>
            </div>
            <div class="nav-right">
                <button id="signBtn" class="btn-deposit" style="background:#f1f5f9; color:#000;" onclick="openModal('authModal')">Sign In</button>
                <div id="userIcon" class="user-id hidden" onclick="logout()">
                    <svg class="person-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <div class="wallet-pill">
                    Ksh <span id="balance">0.00</span>
                    <button onclick="openModal('depositModal')" class="btn-deposit">Deposit</button>
                </div>
            </div>
        </div>
        <div class="sub-nav">
            <div class="cat-link active" onclick="filterCat('All', this)">Markets</div>
            <div class="cat-link" onclick="filterCat('News', this)">News/Updates</div>
            <div class="cat-link" onclick="filterCat('Kenya', this)">Kenya</div>
            <div class="cat-link" onclick="filterCat('Crypto', this)">Crypto</div>
        </div>
    </div>

    <div id="dashboard"><div id="feed"></div></div>

    <div id="authModal" class="overlay">
        <div class="modal">
            <div class="auth-nav">
                <div id="tabIn" class="auth-tab active" onclick="setAuth('in')">Sign In</div>
                <div id="tabUp" class="auth-tab" onclick="setAuth('up')">Sign Up</div>
            </div>
            <h2 id="aTitle">Terminal Access</h2>
            <div id="upFields" class="hidden"><input type="text" id="aName" class="input-tech" placeholder="Full Name"></div>
            <input type="email" id="aEmail" class="input-tech" placeholder="Email Address">
            <input type="password" id="aPass" class="input-tech" placeholder="Password">
            <button onclick="doAuth()" class="btn-tech">Initialize Session</button>
            <p style="font-size: 12px; color: var(--text-sub); margin-top: 20px; cursor: pointer;" onclick="closeModal('authModal')">Dismiss</p>
        </div>
    </div>

    <div id="depositModal" class="overlay">
        <div class="modal">
            <h2>Deposit</h2>
            <p style="color: var(--text-sub); font-size: 13px;">Secure M-Pesa Funding (Min 200)</p>
            <div style="background:#f8fafc; padding:20px; border-radius:18px; border: 1px solid var(--border);">
                <input type="number" id="depAmt" class="input-tech" style="font-size: 32px; text-align: center; font-weight: 900; background: transparent; border: none;" placeholder="0">
                <div class="chip-grid">
                    <div class="amt-chip" onclick="setAmt(250)">250</div>
                    <div class="amt-chip" onclick="setAmt(500)">500</div>
                    <div class="amt-chip" onclick="setAmt(1000)">1k</div>
                    <div class="amt-chip" onclick="setAmt(2000)">2k</div>
                    <div class="amt-chip" onclick="setAmt(5000)">5k</div>
                    <div class="amt-chip" onclick="setAmt(10000)">10k</div>
                </div>
            </div>
            <button onclick="payNow()" class="btn-tech" style="background:var(--accent)">Confirm Deposit</button>
            <p style="font-size: 12px; color: var(--text-sub); margin-top: 20px; cursor: pointer;" onclick="closeModal('depositModal')">Cancel</p>
        </div>
    </div>

    <div id="wagerModal" class="overlay">
        <div class="modal">
            <h2 id="wTitle" style="font-size: 16px; font-weight: 800; text-align: left; margin-bottom: 8px;">Make Prediction</h2>
            <p id="wQuestion" style="font-size: 13px; color: var(--text-sub); text-align: left; margin-bottom: 16px; font-weight: 500;"></p>
            <input type="number" id="wAmount" class="input-tech" placeholder="Enter Wager (Min Ksh 50)" style="font-size: 15px; font-weight: 700;">
            <button id="wConfirmBtn" class="btn-tech" style="margin-top: 4px;">Confirm Wager</button>
            <p style="font-size: 12px; color: var(--text-sub); margin-top: 16px; cursor: pointer;" onclick="closeModal('wagerModal')">Cancel</p>
        </div>
    </div>

    <script>
        // --- DATA & INITIALIZATION ---
        let currentCat = 'All';
        let markets = [
            { type: 'm', cat: "Kenya", q: "Will Jesus come back before June?", p: 4, isPermanent: true },
            { type: 'm', cat: "Kenya", q: "Will William Ruto reshuffle the cabinet by June?", p: 62 },
            { type: 'm', cat: "Crypto", q: "Will Bitcoin stay above $100k until June?", p: 72 },
            { type: 'n', cat: "News", h: "Ksh Volatility Alert", p: "The KES has shown 0.4% variance in the last 24h. Local markets reacting to export data." }
        ];

        const intelligenceSignals = {
            Kenya: [
                "I&M Bank launches KSh 10 billion fixed-rate note offer.",
                "NSE derivatives turnover hits record high in February 2026.",
                "KMRC launches KES 3bn sustainability bond for green home loans.",
                "Nairobi to host 'AI Everything Kenya' summit in 4 days."
            ],
            Crypto: [
                "Coinbase Q1 2026 earnings expectations set at conservative levels.",
                "Prediction market volume grew 9.2x in 2025; Kalshi and Polymarket lead.",
                "Phemex expands prediction market with daily crypto forecasts.",
                "Institutional adoption of Digital Asset Treasuries (DATs) expands in 2026."
            ],
            Politics: [
                "UN Non-Proliferation Treaty Review Conference starts April 27, 2026.",
                "Russia prepares for 81st Victory Day Military Parade on May 9.",
                "Nakba Day pro-Palestinian demonstrations scheduled globally for May 16.",
                "Kenya to host 13th ICT4D Conference on May 20-22, 2026."
            ]
        };

        window.onload = () => { 
            syncState(); 
            render('All');
            setInterval(generateGeminiPulse, 6000); 
        };

        // --- CORE UI ENGINE ---
        function render(cat) {
            currentCat = cat;
            const f = document.getElementById('feed'); f.innerHTML = '';
            
            let filtered = markets.filter(m => {
                if (cat === 'All') return m.type === 'm';
                if (cat === 'News') return m.type === 'n';
                return m.cat === cat;
            });

            filtered.forEach(m => injectToTerminal(m, false));
        }

        function filterCat(cat, el) {
            document.querySelectorAll('.cat-link').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            render(cat);
        }

        // --- GEMINI INTELLIGENCE ENGINE ---
        function generateGeminiPulse() {
            const cats = Object.keys(intelligenceSignals);
            const rCat = cats[Math.floor(Math.random() * cats.length)];
            const signal = intelligenceSignals[rCat][Math.floor(Math.random() * intelligenceSignals[rCat].length)];
            
            const qTemplates = [
                `Will the ${rCat} trend following "${signal.substring(0, 15)}..." hold through May 2026?`,
                `Intelligence Alert: Will ${rCat} volatility exceed 12% by June?`,
                `Will the outcome of the ${signal.split(' ')[0]} development reach 'Target A' by Q3?`
            ];

            const newItem = {
                type: 'm',
                cat: rCat,
                q: qTemplates[Math.floor(Math.random() * qTemplates.length)],
                p: Math.floor(Math.random() * 70 + 15),
                isAI: true
            };

            const newNews = {
                type: 'n',
                cat: 'News',
                h: `Live Signal: ${rCat}`,
                p: signal
            };

            markets.push(newItem);
            injectToTerminal(newItem, true);
            
            setTimeout(() => {
                markets.push(newNews);
                injectToTerminal(newNews, true);
            }, 2500);
        }

        function injectToTerminal(item, isNew) {
            const f = document.getElementById('feed');
            
            // Filter logic check
            if (!isNew && currentCat !== 'All' && currentCat !== 'News' && currentCat !== item.cat) return;
            if (isNew && currentCat !== 'All' && currentCat !== 'News' && currentCat !== item.cat) return;

            const card = document.createElement('div');
            if(item.type === 'm') {
                card.className = 'market-card';
                if(item.isAI) card.style.borderTop = "2px solid var(--gemini)";
                if(item.isPermanent) card.style.borderTop = "2px solid var(--accent)";
                
                card.innerHTML = `
                    <div class="m-header">
                        <div class="m-title">
                            ${item.isPermanent ? '<span style="color:var(--accent); font-size:9px; font-weight:900;">PERMANENT POOL</span><br>' : ''}
                            ${item.isAI ? '<span style="color:var(--gemini); font-size:9px; font-weight:900;">AI PREDICTION</span><br>' : ''}
                            ${item.q}
                        </div>
                        <div class="m-odds"><span class="odds-val">${item.p}%</span><span class="odds-lbl">chance</span></div>
                    </div>
                    <div class="btn-group">
                        <button class="trade-btn yes" onclick="wagerDialog('YES', '${item.q.replace(/'/g, "\\'")}')">Yes</button>
                        <button class="trade-btn no" onclick="wagerDialog('NO', '${item.q.replace(/'/g, "\\'")}')">No</button>
                    </div>`;
            } else {
                card.className = 'news-card';
                card.innerHTML = `
                    <span class="news-tag">
                        <div style="width:5px; height:5px; background:var(--accent); border-radius:50%; animation:pulse 1s infinite;"></div>
                        Update
                    </span>
                    <div class="news-h">${item.h}</div>
                    <p class="news-p">${item.p}</p>`;
            }

            // Using appendChild to place newly parsed/streamed content at the bottom of the feed
            f.appendChild(card);
            if(f.children.length > 30) f.removeChild(f.firstChild); // Adjusted crash guard
        }

        // --- ACCOUNT & WALLET ---
        function syncState() {
            const user = localStorage.getItem('nx_user');
            const bal = localStorage.getItem('nx_balance') || "0.00";
            if(user) {
                document.getElementById('signBtn').classList.add('hidden');
                document.getElementById('userIcon').classList.remove('hidden');
            }
            document.getElementById('balance').innerText = parseFloat(bal).toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function setAuth(mode) {
            const up = document.getElementById('upFields'), title = document.getElementById('aTitle');
            const tIn = document.getElementById('tabIn'), tUp = document.getElementById('tabUp');
            if(mode === 'up') {
                up.classList.remove('hidden'); tUp.classList.add('active'); tIn.classList.remove('active');
                title.innerText = "Register Identity";
            } else {
                up.classList.add('hidden'); tIn.classList.add('active'); tUp.classList.remove('active');
                title.innerText = "Terminal Access";
            }
        }

        function doAuth() {
            const email = document.getElementById('aEmail').value;
            if(!email.includes('@')) return alert("Invalid Credentials");
            localStorage.setItem('nx_user', email);
            closeModal('authModal');
            syncState();
        }

        function setAmt(v) { document.getElementById('depAmt').value = v; }

        function wagerDialog(side, text) {
            if(!localStorage.getItem('nx_user')) return openModal('authModal');
            document.getElementById('wTitle').innerText = `Make '${side}' Prediction`;
            document.getElementById('wQuestion').innerText = text;
            document.getElementById('wagerModal').style.display = 'flex';
            
            document.getElementById('wConfirmBtn').onclick = () => {
                const amount = parseFloat(document.getElementById('wAmount').value);
                const currentBalance = parseFloat(localStorage.getItem('nx_balance') || 0);

                if (isNaN(amount) || amount < 50) return alert("Min allowed: Ksh 50");
                if (amount > currentBalance) return alert("Insufficient balance! Please fund your account.");

                localStorage.setItem('nx_balance', currentBalance - amount);
                syncState();
                closeModal('wagerModal');
                document.getElementById('wAmount').value = '';
                alert(`Stake successful! Wagered Ksh ${amount.toLocaleString()} on '${side}'.`);
            };
        }

        function payNow() {
            const amt = document.getElementById('depAmt').value;
            if(!localStorage.getItem('nx_user')) return openModal('authModal');
            if(amt < 200) return alert("Min required: Ksh 200");
            document.body.classList.add('hide-header');
            closeModal('depositModal');
            const intasend = new window.IntaSend({ publicAPIKey: "ISPubKey_test_7e577665-297c-4b58-b282-7a876f8e03ad", live: false });
            intasend.run({ amount: Numb

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexGen | Institutional Terminal</title>
    
    <script src="https://unpkg.com/intasend-inlinejs-sdk@4.0.7/build/intasend-inline.js"></script>

    <style>
        :root { 
            --primary: #2ebd85; --border: #f1f5f9; --text-main: #0f172a; --text-sub: #94a3b8;
            --yes: #f0fdf4; --yes-text: #166534; --no: #fef2f2; --no-text: #cf304a;
        }
        
        body { background: #f8fafc; color: var(--text-main); margin: 0; padding-top: 175px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow-x: hidden; }

        /* --- HEADER STACK --- */
        .header-stack { position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 2000; border-bottom: 1px solid var(--border); }
        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; height: 64px; }
        .logo { font-weight: 950; font-size: 24px; letter-spacing: -1.5px; display: flex; align-items: center; gap: 8px; }
        .live-dot { width: 8px; height: 8px; background: #ff4757; border-radius: 50%; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .bar-right { display: flex; align-items: center; gap: 8px; }
        .user-profile { width: 38px; height: 38px; background: #0f172a; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; font-size: 12px; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .wallet-pill { display: flex; align-items: center; background: #0f172a; color: #fff; padding: 3px 3px 3px 12px; border-radius: 12px; gap: 8px; font-size: 13px; font-weight: 700; }
        .btn-deposit { background: var(--primary); color: #fff; border: none; padding: 8px 14px; border-radius: 10px; font-weight: 800; cursor: pointer; }

        .search-container { padding: 8px 16px; background: #fff; }
        .search-bar { background: #f1f5f9; border-radius: 12px; display: flex; align-items: center; padding: 10px 15px; gap: 10px; }
        .search-input { border: none; background: transparent; outline: none; width: 100%; font-size: 14px; font-weight: 500; }

        .category-scroller { display: flex; gap: 10px; overflow-x: auto; padding: 10px 16px; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .category-scroller::-webkit-scrollbar { display: none; }
        .cat-chip { padding: 8px 16px; background: #fff; border: 1px solid var(--border); border-radius: 100px; font-size: 13px; font-weight: 700; color: var(--text-sub); flex-shrink: 0; }
        .cat-chip.active { background: #000; color: #fff; border-color: #000; }

        /* --- DASHBOARD & CARDS --- */
        #dashboard { max-width: 500px; margin: auto; padding-bottom: 80px; }
        .market-card { background: #fff; border-radius: 20px; border: 1.5px solid var(--border); padding: 18px; margin: 12px; position: relative; overflow: hidden; }
        .card-header { display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-start; }
        .letter-icon { width: 44px; height: 44px; border-radius: 12px; background: #f1f5f9; color: #64748b; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; flex-shrink: 0; border: 1px solid #e2e8f0; }
        .m-title { font-size: 16px; font-weight: 700; line-height: 1.35; flex: 1; text-align: left; color: #1e293b; }
        .m-chance { font-size: 18px; font-weight: 800; text-align: right; min-width: 65px; }
        .m-chance span { font-size: 10px; display: block; color: var(--text-sub); text-transform: uppercase; }
        .order-btn-group { display: flex; gap: 10px; }
        .order-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: opacity 0.2s; }
        .order-btn:active { opacity: 0.7; }

        /* --- SKELETONS --- */
        .skeleton { background: #eee; background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%); border-radius: 20px; background-size: 200% 100%; animation: shine 1.5s linear infinite; height: 140px; margin: 12px; }
        @keyframes shine { to { background-position-x: -200%; } }

        /* --- MODALS --- */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 5000; align-items: center; justify-content: center; padding: 15px; }
        .modal-card { background: #fff; width: 100%; max-width: 380px; padding: 35px; border-radius: 35px; text-align: center; }
        .auth-switch { display: flex; background: #f1f5f9; padding: 4px; border-radius: 100px; margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .auth-tab { flex: 1; padding: 10px; font-size: 13px; font-weight: 800; cursor: pointer; border-radius: 100px; }
        .auth-tab.active { color: #fff; background: #000; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header-stack">
        <div class="top-nav">
            <div class="logo">NEXGEN <div class="live-dot"></div></div>
            <div class="bar-right">
                <button id="loginBtn" class="user-profile" style="background:#f1f5f9; color:#000; border:none; width:auto; padding:0 15px; border-radius:12px" onclick="openModal('auth-overlay')">Sign In</button>
                <div id="userIcon" class="user-profile hidden" onclick="logout()">??</div>
                <div class="wallet-pill">
                    Ksh <span id="balance">0.00</span>
                    <button onclick="openModal('deposit-overlay')" class="btn-deposit">Deposit</button>
                </div>
            </div>
        </div>
        <div class="search-container">
            <div class="search-bar"><span>🔍</span><input type="text" id="mSearch" class="search-input" placeholder="Search markets..." oninput="render()"></div>
        </div>
        <div class="category-scroller">
            <div class="cat-chip active" onclick="filterCat('All', this)">All</div>
            <div class="cat-chip" onclick="filterCat('Kenya', this)">Kenya</div>
            <div class="cat-chip" onclick="filterCat('Politics', this)">Politics</div>
            <div class="cat-chip" onclick="filterCat('Crypto', this)">Crypto</div>
            <div class="cat-chip" onclick="filterCat('Sports', this)">Sports</div>
        </div>
    </div>

    <div id="dashboard">
        <div id="dynamic-feed"></div>
        <div id="skeleton-container" class="hidden">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>
    </div>

    <div id="auth-overlay" class="modal-overlay">
        <div class="modal-card">
            <div class="auth-switch">
                <div id="tab-in" class="auth-tab active" onclick="switchAuth('in')">Sign In</div>
                <div id="tab-up" class="auth-tab" onclick="switchAuth('up')">Sign Up</div>
            </div>
            <h2 id="authTitle" style="margin-bottom:20px;">Access Terminal</h2>
            <div id="signupOnly" class="hidden">
                <input type="text" id="authName" style="width:100%; padding:15px; border:1px solid #ddd; border-radius:12px; margin-bottom:12px;" placeholder="Full Name">
            </div>
            <input type="email" id="authEmail" style="width:100%; padding:15px; border:1px solid #ddd; border-radius:12px; margin-bottom:12px;" placeholder="Email Address">
            <button onclick="handleAuth()" style="width:100%; padding:18px; background:#000; color:#fff; border-radius:18px; border:none; font-weight:700">Enter NexGen</button>
            <p onclick="closeModal('auth-overlay')" style="margin-top:20px; font-size:13px; color:#999; cursor:pointer;">Dismiss</p>
        </div>
    </div>

    <div id="deposit-overlay" class="modal-overlay">
        <div class="modal-card">
            <h2 style="margin-bottom:25px;">Deposit KES</h2>
            <div style="background:#f1f5f9; padding:25px; border-radius:24px; margin-bottom:20px">
                <input type="number" id="customAmount" style="width:100%; border:none; background:transparent; font-size:36px; font-weight:900; text-align:center" placeholder="0">
                <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:15px">
                    <div style="background:#fff; padding:10px; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer" onclick="document.getElementById('customAmount').value=250">250</div>
                    <div style="background:#fff; padding:10px; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer" onclick="document.getElementById('customAmount').value=500">500</div>
                    <div style="background:#fff; padding:10px; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer" onclick="document.getElementById('customAmount').value=1000">1k</div>
                    <div style="background:#fff; padding:10px; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer" onclick="document.getElementById('customAmount').value=2000">2k</div>
                </div>
            </div>
            <button class="btn-deposit" style="width:100%; padding:18px; border-radius:18px" onclick="startPayment()">Authorize Deposit</button>
            <p onclick="closeModal('deposit-overlay')" style="margin-top:15px; cursor:pointer; color:#999">Close</p>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyDG43yZQXSg2maFzrQR92L3vxmkhu5H0hc";
        let selectedCategory = 'All';
        let isLoading = false;
        let seenQuestions = []; // Anti-suspicion memory bank

        let markets = [
            { cat: "Kenya", q: "Will William Ruto reshuffle the cabinet by June?", p: 62 },
            { cat: "Crypto", q: "Will Bitcoin stay above $100k until June?", p: 72 },
            { cat: "Sports", q: "Will Arsenal win the Premier League title in 2026?", p: 46 }
        ];

        // Seed the memory bank with initial questions
        markets.forEach(m => seenQuestions.push(m.q));

        window.onload = () => {
            const user = localStorage.getItem('nx_user');
            const bal = localStorage.getItem('nx_balance');
            if(user) {
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userIcon').classList.remove('hidden');
                document.getElementById('userIcon').innerText = user;
            }
            if(bal) document.getElementById('balance').innerText = parseFloat(bal).toFixed(2);
            render();
        };

        window.onscroll = function() {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 300) {
                if (!isLoading) fetchMoreMarkets();
            }
        };

        async function fetchMoreMarkets() {
            isLoading = true;
            document.getElementById('skeleton-container').classList.remove('hidden');

            const categoryFocus = selectedCategory === 'All' ? 'Kenya politics and global trends' : selectedCategory;
            const avoidList = seenQuestions.slice(-15).join(", "); // Send the last 15 questions to Gemini

            const prompt = `Act as a prediction market analyst. Generate 3 unique "Yes/No" prediction questions for May 2026 regarding ${categoryFocus}. 
            Do NOT repeat or generate anything similar to these previous questions: [${avoidList}].
            Format: Strict JSON array of objects with keys "cat", "q", and "p".`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                const cleanedJson = text.replace(/```json|```/g, "").trim();
                const newItems = JSON.parse(cleanedJson);

                // Final client-side check to prevent duplicates
                newItems.forEach(item => {
                    if (!seenQuestions.includes(item.q)) {
                        markets.push(item);
                        seenQuestions.push(item.q);
                    }
                });

                render();
            } catch (e) {
                console.error("Gemini Error", e);
            } finally {
                isLoading = false;
                document.getElementById('skeleton-container').classList.add('hidden');
            }
        }

        function render() {
            const feed = document.getElementById('dynamic-feed');
            const search = document.getElementById('mSearch').value.toLowerCase();
            feed.innerHTML = '';
            
            markets.filter(m => (selectedCategory === 'All' || m.cat === selectedCategory) && m.q.toLowerCase().includes(search)).forEach(m => {
                const card = document.createElement('div');
                card.className = 'market-card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="letter-icon">${m.q.charAt(0)}</div>
                        <div class="m-title">${m.q}</div>
                        <div class="m-chance">${m.p}%<span>chance</span></div>
                    </div>
                    <div class="order-btn-group">
                        <button class="order-btn" style="background:var(--yes); color:var(--yes-text)">Yes</button>
                        <button class="order-btn" style="background:var(--no); color:var(--no-text)">No</button>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        function filterCat(cat, el) {
            selectedCategory = cat;
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            render();
            // Automatically fetch more if the category is empty
            if(markets.filter(m => m.cat === cat).length < 2) fetchMoreMarkets();
        }

        function switchAuth(mode) {
            const tIn = document.getElementById('tab-in'), tUp = document.getElementById('tab-up'), sUp = document.getElementById('signupOnly');
            if(mode === 'up') {
                tUp.classList.add('active'); tIn.classList.remove('active'); sUp.classList.remove('hidden');
            } else {
                tIn.classList.add('active'); tUp.classList.remove('active'); sUp.classList.add('hidden');
            }
        }

        function startPayment() {
            const amt = document.getElementById('customAmount').value;
            if(amt < 10) return alert("Min Ksh 10");
            const intasend = new window.IntaSend({ publicAPIKey: "ISPubKey_test_7e577665-297c-4b58-b282-7a876f8e03ad", live: false });
            intasend.run({ amount: Number(amt), currency: "KES" }).on("COMPLETE", () => {
                const cur = parseFloat(localStorage.getItem('nx_balance') || 0);
                localStorage.setItem('nx_balance', cur + Number(amt));
                location.reload();
            });
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function handleAuth() { localStorage.setItem('nx_user', 'USR'); location.reload(); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>

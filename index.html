<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polymarkets Africa | Cloud Terminal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/intasend-inlinejs-sdk@4.0.7/build/intasend-inline.js" async></script>

    <style>
        :root { 
            --accent: #2ebd85; --border: #eceef2; --text-main: #0f172a; --text-sub: #64748b;
            --yes: #f0fdf4; --yes-text: #166534; --no: #fef2f2; --no-text: #991b1b;
            --tech-bg: #0f172a;
        }
        
        body { background: #ffffff; color: var(--text-main); margin: 0; padding-top: 130px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }

        .header-stack { position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 2000; border-bottom: 1px solid var(--border); transition: transform 0.4s ease; }
        body.hide-header .header-stack { transform: translateY(-100%); }

        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 60px; }
        .logo-wrap { display: flex; flex-direction: column; line-height: 1; }
        .logo-main { font-weight: 900; font-size: 18px; letter-spacing: -0.5px; color: #000; text-transform: uppercase; }
        .logo-sub { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
        
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .wallet-pill { display: flex; align-items: center; background: #f8fafc; border: 1px solid var(--border); padding: 4px 4px 4px 12px; border-radius: 10px; gap: 8px; font-size: 13px; font-weight: 700; }
        .btn-deposit { background: #000; color: #fff; border: none; padding: 7px 14px; border-radius: 8px; font-weight: 700; font-size: 12px; cursor: pointer; }
        
        .user-id { width: 36px; height: 36px; background: var(--tech-bg); color: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .person-icon { width: 20px; height: 20px; fill: currentColor; }

        .sub-nav { display: flex; gap: 20px; padding: 12px 20px; overflow-x: auto; background: #fff; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .cat-link { font-size: 13px; font-weight: 700; color: var(--text-sub); text-decoration: none; white-space: nowrap; cursor: pointer; }
        .cat-link.active { color: #000; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: -12px; }

        #dashboard { max-width: 600px; margin: auto; padding: 10px; }
        
        .market-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 12px; animation: slideUp 0.4s ease-out; }
        .m-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .m-title { font-size: 15px; font-weight: 600; line-height: 1.4; color: #111; }
        .odds-val { font-size: 18px; font-weight: 800; color: #000; }
        .odds-lbl { font-size: 10px; color: var(--text-sub); text-transform: uppercase; display: block; text-align: right; }
        
        .btn-group { display: flex; gap: 10px; }
        .trade-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 800; font-size: 14px; cursor: pointer; }
        .trade-btn.yes { background: var(--yes); color: var(--yes-text); }
        .trade-btn.no { background: var(--no); color: var(--no-text); }
        
        .resolve-btn { width: 100%; margin-top: 10px; background: #f1f5f9; border: 1px dashed var(--border); padding: 8px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; color: var(--text-sub); }

        .news-card { border-left: 3px solid var(--accent); background: #f8fafc; padding: 16px; border-radius: 0 12px 12px 0; margin-bottom: 12px; animation: slideUp 0.4s ease-out; }
        .news-tag { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
        .news-h { font-size: 14px; font-weight: 700; margin-bottom: 6px; color: #000; }
        .news-p { font-size: 13px; color: var(--text-sub); line-height: 1.5; margin: 0; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(6px); z-index: 5000; align-items: center; justify-content: center; padding: 16px; }
        .modal { background: #fff; width: 100%; max-width: 360px; padding: 32px; border-radius: 24px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .auth-nav { display: flex; background: #f1f5f9; padding: 6px; border-radius: 14px; margin-bottom: 24px; }
        .auth-tab { flex: 1; padding: 10px; font-size: 13px; font-weight: 800; cursor: pointer; border-radius: 10px; color: var(--text-sub); transition: 0.3s; }
        .auth-tab.active { background: #000; color: #fff; }
        .input-tech { width: 100%; padding: 16px; background: #f8fafc; border: 1px solid var(--border); border-radius: 12px; font-size: 14px; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        .btn-tech { width: 100%; padding: 16px; background: #000; color: #fff; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; font-size: 15px; }
        .chip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .amt-chip { border: 1px solid var(--border); padding: 12px; border-radius: 12px; font-size: 13px; font-weight: 800; cursor: pointer; background: #fff; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header-stack">
        <div class="top-nav">
            <div class="logo-wrap">
                <div class="logo-main">Polymarkets</div>
                <div class="logo-sub">Africa</div>
            </div>
            <div class="nav-right">
                <button id="signBtn" class="btn-deposit" onclick="openModal('authModal')">Sign In</button>
                <div id="userIcon" class="user-id hidden" onclick="logout()">
                    <svg class="person-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <div class="wallet-pill">
                    Ksh <span id="balance">0.00</span>
                    <button onclick="openModal('depositModal')" class="btn-deposit">Deposit</button>
                </div>
            </div>
        </div>
        <div class="sub-nav">
            <div class="cat-link active" onclick="filterCat('All', this)">Markets</div>
            <div class="cat-link" onclick="filterCat('News', this)">News/Updates</div>
            <div class="cat-link" onclick="filterCat('World', this)">World News</div>
            <div class="cat-link" onclick="filterCat('Create', this)" style="color: var(--accent);">+ Add Market</div>
        </div>
    </div>

    <div id="dashboard"><div id="feed"></div></div>

    <div id="authModal" class="overlay">
        <div class="modal">
            <div class="auth-nav">
                <div id="tabIn" class="auth-tab active" onclick="setAuth('in')">Sign In</div>
                <div id="tabUp" class="auth-tab" onclick="setAuth('up')">Sign Up</div>
            </div>
            <h2 id="aTitle">Terminal Access</h2>
            <input type="email" id="aEmail" class="input-tech" placeholder="Email Address">
            <input type="password" id="aPass" class="input-tech" placeholder="Secure Password">
            <button onclick="doAuth()" class="btn-tech">Access Account</button>
            <p style="font-size: 12px; color: var(--text-sub); margin-top: 20px; cursor: pointer;" onclick="closeModal('authModal')">Dismiss</p>
        </div>
    </div>

    <div id="depositModal" class="overlay">
        <div class="modal">
            <h2>Deposit</h2>
            <p style="color: var(--text-sub); font-size: 13px;">Instant Top-up</p>
            <input type="number" id="depAmt" class="input-tech" style="font-size: 28px; text-align: center; font-weight: 800;" placeholder="Enter Amount">
            <div class="chip-grid">
                <div class="amt-chip" onclick="setAmt(250)">250</div>
                <div class="amt-chip" onclick="setAmt(500)">500</div>
                <div class="amt-chip" onclick="setAmt(1000)">1k</div>
            </div>
            <button onclick="payNow()" class="btn-tech" style="background:var(--accent)">Confirm</button>
            <p style="font-size: 12px; color: var(--text-sub); margin-top: 20px; cursor: pointer;" onclick="closeModal('depositModal')">Cancel</p>
        </div>
    </div>

    <div id="stakeModal" class="overlay">
        <div class="modal">
            <h2 id="sTitle">Place Stake</h2>
            <p id="sQuestion" style="font-size: 13px; color: var(--text-sub); margin-bottom: 12px;"></p>
            <input type="number" id="stakeAmt" class="input-tech" placeholder="Stake Amount (Ksh)">
            <button id="stakeConfirmBtn" class="btn-tech" style="background: var(--accent)">Confirm Stake</button>
            <p style="font-size: 12px; color: var(--text-sub); margin-top: 20px; cursor: pointer;" onclick="closeModal('stakeModal')">Cancel</p>
        </div>
    </div>

    <div id="createModal" class="overlay">
        <div class="modal">
            <h2>New Market</h2>
            <input type="text" id="cQuestion" class="input-tech" placeholder="Question">
            <input type="number" id="cOdds" class="input-tech" placeholder="Implied Odds % (e.g. 50)" min="1" max="99">
            <button onclick="createMarket()" class="btn-tech" style="background: var(--accent)">Create Market</button>
            <p style="font-size: 12px; color: var(--text-sub); margin-top: 20px; cursor: pointer;" onclick="closeModal('createModal')">Cancel</p>
        </div>
    </div>

    <script>
        // --------------------------------------------------
        // ACTIVE SUPABASE CREDENTIALS INJECTED
        // --------------------------------------------------
        const SUPABASE_URL = "https://hwxnfzuwaeseszgsjeny.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_C_fx8fnHQ9c1x_ZkWIG-gQ_2l2Mt-NL";
        // --------------------------------------------------

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentCat = 'All';
        let currentUser = null;
        let userData = null;
        let markets = [];
        let userWagers = [];

        window.onload = async () => {
            const savedEmail = localStorage.getItem('nx_email');
            if (savedEmail) {
                currentUser = savedEmail;
                await fetchUserData();
            }
            await fetchMarkets();
            render('All');
        };

        async function fetchUserData() {
            if (!currentUser) return;
            const { data, error } = await supabase.from('profiles').select('*').eq('email', currentUser).single();
            if (!error && data) {
                userData = data;
                const { data: wagers } = await supabase.from('wagers').select('*').eq('email', currentUser);
                userWagers = wagers || [];
            }
            syncHeader();
        }

        async function fetchMarkets() {
            const { data, error } = await supabase.from('markets').select('*');
            if (!error && data) {
                markets = data;
            }
        }

        function render(cat) {
            currentCat = cat;
            if (cat === 'Create') {
                if (!currentUser) { openModal('authModal'); return filterCat('All', document.querySelector('.cat-link')); }
                openModal('createModal'); return;
            }

            const f = document.getElementById('feed');
            if (!f) return;
            f.innerHTML = '';
            
            let filtered = markets.filter(m => cat === 'All' ? true : (cat === 'News' ? m.type === 'n' : m.cat === cat));
            if (filtered.length === 0) {
                f.innerHTML = `<p style="text-align: center; color: var(--text-sub); font-size: 14px; margin-top: 40px;">No active items available.</p>`;
                return;
            }
            filtered.forEach(m => injectToTerminal(m));
        }

        function filterCat(cat, el) {
            document.querySelectorAll('.cat-link').forEach(c => c.classList.remove('active'));
            if (el) el.classList.add('active');
            render(cat);
        }

        function injectToTerminal(item) {
            const f = document.getElementById('feed');
            const card = document.createElement('div');
            card.id = 'market-el-' + item.id;
            
            if(item.type === 'm') {
                card.className = 'market-card';
                const safeQ = item.q.replace(/'/g, "\\'");
                const activeWager = userWagers.find(w => w.market_id === item.id);
                const wagerHtml = activeWager ? `<br><span style="color:var(--accent); font-size:11px; font-weight:700;">Wagered: Ksh ${activeWager.amt} on '${activeWager.side}'</span>` : '';

                card.innerHTML = `
                    <div class="m-header">
                        <div class="m-title">${item.q}${wagerHtml}</div>
                        <div class="m-odds"><span class="odds-val">${item.p}%</span><span class="odds-lbl">chance</span></div>
                    </div>
                    <div class="btn-group">
                        <button class="trade-btn yes" onclick="openStakeModal('YES', '${safeQ}', '${item.id}')">Yes</button>
                        <button class="trade-btn no" onclick="openStakeModal('NO', '${safeQ}', '${item.id}')">No</button>
                    </div>
                    <button class="resolve-btn" onclick="resolvePrediction('${item.id}')">Settle Prediction</button>`;
            } else {
                card.className = 'news-card';
                card.innerHTML = `<div class="news-h">${item.h}</div><p class="news-p">${item.p_desc}</p>`;
            }
            f.appendChild(card);
        }

        function openStakeModal(side, question, marketId) {
            if(!currentUser) return openModal('authModal');
            document.getElementById('sTitle').innerText = `Predicting '${side}'`;
            document.getElementById('sQuestion').innerText = question;
            document.getElementById('stakeAmt').value = '';
            openModal('stakeModal');

            document.getElementById('stakeConfirmBtn').onclick = async () => {
                const amt = parseFloat(document.getElementById('stakeAmt').value);
                if (!amt || amt < 50) return alert("Minimum stake is Ksh 50");
                if (amt > userData.balance) return alert("Insufficient balance.");

                const newBal = userData.balance - amt;
                await supabase.from('profiles').update({ balance: newBal }).eq('email', currentUser);
                await supabase.from('wagers').insert([{ email: currentUser, market_id: marketId, side, amt }]);

                await fetchUserData();
                closeModal('stakeModal');
                render(currentCat);
                alert("Wager placed successfully on the cloud!");
            };
        }

        async function resolvePrediction(marketId) {
            const outcome = Math.random() > 0.5 ? "YES" : "NO";
            const activeWager = userWagers.find(w => w.market_id === marketId);
            let alertMsg = `Settled as: '${outcome}'.\n`;

            if (activeWager) {
                if (activeWager.side === outcome) {
                    const winnings = activeWager.amt * 2;
                    const newBal = userData.balance + winnings;
                    await supabase.from('profiles').update({ balance: newBal }).eq('email', currentUser);
                    alertMsg += `🎉 Correct! Ksh ${winnings.toLocaleString()} added to your account!`;
                } else {
                    alertMsg += `❌ Incorrect outcome.`;
                }
                await supabase.from('wagers').delete().eq('market_id', marketId).eq('email', currentUser);
            }

            await supabase.from('markets').delete().eq('id', marketId);
            await fetchMarkets();
            await fetchUserData();
            render(currentCat);
            alert(alertMsg);
        }

        async function createMarket() {
            const q = document.getElementById('cQuestion').value;
            const p = parseInt(document.getElementById('cOdds').value);
            if(!q || !p || p < 1 || p > 99) return alert("All inputs required, odds must be 1-99.");

            const marketId = "poly-" + Date.now();
            await supabase.from('markets').insert([{ id: marketId, type: 'm', cat: 'World', q, p }]);
            
            await fetchMarkets();
            closeModal('createModal');
            filterCat('All', document.querySelector('.cat-link'));
            alert("Prediction market created on Supabase!");
        }

        async function doAuth() {
            const email = document.getElementById('aEmail').value.trim().toLowerCase();
            const pass = document.getElementById('aPass').value;
            if(!email.includes('@') || pass.length < 4) return alert("Valid credentials required.");

            const { data: existingUser } = await supabase.from('profiles').select('*').eq('email', email).single();

            if (!existingUser) {
                await supabase.from('profiles').insert([{ email, password: pass, balance: 1000 }]);
                alert("Account created! Welcome to Polymarkets Africa.");
            } else if (existingUser.password !== pass) {
                return alert("Incorrect password.");
            }

            currentUser = email;
            localStorage.setItem('nx_email', currentUser);
            await fetchUserData();
            closeModal('authModal');
            render('All');
        }

        async function payNow() {
            const amt = parseFloat(document.getElementById('depAmt').value);
            if (!amt || amt < 200) return alert("Min required deposit is Ksh 200");
            const newBal = userData.balance + amt;
            await supabase.from('profiles').update({ balance: newBal }).eq('email', currentUser);
            await fetchUserData();
            closeModal('depositModal');
            alert("Balance successfully topped up!");
        }

        function syncHeader() {
            if(currentUser && userData) {
                document.getElementById('signBtn').classList.add('hidden');
                document.getElementById('userIcon').classList.remove('hidden');
                document.getElementById('balance').innerText = parseFloat(userData.balance).toLocaleString(undefined, {minimumFractionDigits:2});
            } else {
                document.getElementById('signBtn').classList.remove('hidden');
                document.getElementById('userIcon').classList.add('hidden');
                document.getElementById('balance').innerText = "0.00";
            }
        }

        function setAuth(mode) {
            const tIn = document.getElementById('tabIn'), tUp = document.getElementById('tabUp'), title = document.getElementById('aTitle');
            if (mode === 'up') { tUp.classList.add('active'); tIn.classList.remove('active'); title.innerText = "Register Identity"; }
            else { tIn.classList.add('active'); tUp.classList.remove('active'); title.innerText = "Terminal Acce

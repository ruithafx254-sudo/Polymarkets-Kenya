<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexGen | Africa's Polymarket</title>
    <style>
        :root { --p: #2ebd85; --bg: #f8fafc; --card: #ffffff; --txt: #0f172a; }
        body, html { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: var(--bg); overflow-x: hidden; }

        /* --- WELCOME LANDING PAGE --- */
        #welcome-page {
            position: fixed; inset: 0; background: #fff; z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; text-align: center; transition: 0.5s;
        }
        .welcome-logo { font-size: 32px; font-weight: 900; margin-bottom: 10px; color: #000; }
        .welcome-tag { font-size: 18px; color: var(--p); font-weight: 700; margin-bottom: 20px; }
        .welcome-desc { color: #64748b; line-height: 1.6; max-width: 400px; margin-bottom: 40px; }
        .btn-enter { background: #000; color: #fff; padding: 18px 50px; border-radius: 40px; border: none; font-weight: 800; cursor: pointer; font-size: 16px; }

        /* --- MAIN TERMINAL --- */
        .header { position: fixed; top: 0; width: 100%; background: #fff; z-index: 2000; border-bottom: 1px solid #e2e8f0; height: 120px; }
        .top { display: flex; justify-content: space-between; padding: 12px 16px; align-items: center; }
        .logo { font-weight: 900; font-size: 22px; }
        .btn-deposit { background: var(--p); color: #fff; border: none; padding: 8px 16px; border-radius: 10px; font-weight: 800; }
        
        .cats { display: flex; overflow-x: auto; padding: 10px 16px; gap: 20px; border-top: 1px solid #f1f5f9; }
        .cat-item { color: #64748b; font-weight: 600; font-size: 14px; white-space: nowrap; }

        #feed { max-width: 500px; margin: 130px auto 20px; padding: 12px; }
        .card { background: #fff; border-radius: 20px; border: 1px solid #f1f5f9; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .m-title { font-size: 17px; font-weight: 700; margin-bottom: 15px; }
        .prob { font-size: 28px; font-weight: 800; margin-bottom: 15px; }
        .btns { display: flex; gap: 10px; }
        .b { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 800; }
        .yes { background: #f0fdf4; color: #166534; }
        .no { background: #fef2f2; color: #cf304a; }

        /* --- AUTH MODAL --- */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .m-box { background: #fff; width: 100%; max-width: 350px; padding: 30px; border-radius: 30px; text-align: center; }
        .m-input { width: 100%; padding: 15px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        .m-go { width: 100%; padding: 16px; background: #000; color: #fff; border: none; border-radius: 12px; font-weight: 800; }
    </style>
</head>
<body>

    <div id="welcome-page">
        <div class="welcome-logo">NEXGEN</div>
        <div class="welcome-tag">Africa's Prediction Terminal</div>
        <p class="welcome-desc">
            Welcome to the official African bridge for Polymarket. Trade global events, local elections, and crypto markets using localized payment gateways.
        </p>
        <button class="btn-enter" onclick="enterApp()">Enter Terminal</button>
    </div>

    <div class="header">
        <div class="top">
            <div class="logo">NEXGEN</div>
            <div style="display:flex; gap:8px;">
                <button onclick="openM()" style="background:#f1f5f9; border:none; padding:8px 12px; border-radius:8px; font-weight:700;">Sign In</button>
                <button class="btn-deposit" onclick="alert('M-Pesa Link Ready')">Ksh 0</button>
            </div>
        </div>
        <div class="cats">
            <div class="cat-item" style="color:var(--p)">All</div>
            <div class="cat-item">Politics</div>
            <div class="cat-item">Crypto</div>
            <div class="cat-item">Kenya News</div>
        </div>
    </div>

    <div id="feed">
        </div>

    <div id="modal">
        <div class="m-box">
            <h2>Welcome Back</h2>
            <input type="email" class="m-input" placeholder="Email">
            <input type="password" class="m-input" placeholder="Password">
            <button class="m-go" onclick="confirmAuth()">Continue</button>
            <p onclick="closeM()" style="margin-top:15px; color:#94a3b8; font-size:13px;">Close</p>
        </div>
    </div>

    <script>
        function enterApp() { document.getElementById('welcome-page').style.top = '-100%'; fetchMarkets(); }
        function openM() { document.getElementById('modal').style.display = 'flex'; }
        function closeM() { document.getElementById('modal').style.display = 'none'; }
        function confirmAuth() { alert("Supabase Ready"); closeM(); }

        // FAST FETCH FROM POLYMARKET API
        async function fetchMarkets() {
            try {
                // Fetching exactly like Polymarket using their Gamma API
                const res = await fetch('https://gamma-api.polymarket.com/markets?active=true&limit=50');
                const data = await res.json();
                
                const feed = document.getElementById('feed');
                
                // PERFORMANCE LIMIT: Only render the first 30 cards immediately 
                // to prevent mobile lag, then load the rest in the background.
                const top30 = data.slice(0, 30);
                feed.innerHTML = top30.map(m => createCard(m)).join('');

                setTimeout(() => {
                    const rest = data.slice(30);
                    feed.innerHTML += rest.map(m => createCard(m)).join('');
                }, 1500); // Loads the rest 1.5 seconds later

            } catch (e) { console.error("Load Failed"); }
        }

        function createCard(m) {
            const prob = Math.round((m.outcomePrices ? m.outcomePrices[0] : 0.5) * 100);
            return `
            <div class="card">
                <div class="m-title">${m.question}</div>
                <div class="prob">${prob}% <span style="font-size:14px; color:#64748b;">CHANCE</span></div>
                <div class="btns">
                    <button class="b yes">BUY YES</button>
                    <button class="b no">BUY NO</button>
                </div>
            </div>`;
        }
    </script>
</body>
</html>

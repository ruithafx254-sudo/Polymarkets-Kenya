<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexGen | Professional</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --primary: #2ebd85; --border: #e5e7eb; --text-main: #111827;
            --yes-bg: #f0fdf4; --yes-btn: #2ebd85; --no-bg: #fef2f2; --no-btn: #df4b5e;
        }

        body { 
            background: #ffffff; color: var(--text-main); margin: 0; padding-top: 135px;
            font-family: -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased;
        }

        /* --- MAINTAINED SLEEK UPPER BAR --- */
        .header-fixed {
            position: fixed; top: 0; left: 0; right: 0;
            background: #fff; z-index: 2000; border-bottom: 1px solid var(--border);
        }

        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
        .logo { font-weight: 900; font-size: 24px; letter-spacing: -1.5px; color: #000; }

        .user-controls { display: flex; align-items: center; gap: 8px; }
        .btn-auth { 
            font-size: 13px; font-weight: 700; background: #f3f4f6; border: none; 
            padding: 8px 14px; border-radius: 8px; cursor: pointer; color: #374151;
        }
        .btn-dep { 
            background: var(--primary); color: #fff; border: none; 
            padding: 8px 16px; border-radius: 8px; font-weight: 800; cursor: pointer; 
        }

        .cat-bar { display: flex; overflow-x: auto; padding: 10px 16px; gap: 20px; scrollbar-width: none; border-top: 1px solid #f9fafb; }
        .cat-item { font-size: 14px; font-weight: 700; color: #6b7280; cursor: pointer; white-space: nowrap; padding-bottom: 8px; }
        .cat-item.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        /* --- POLYMARKET STANDARD CARDS --- */
        #dashboard { max-width: 500px; margin: auto; padding: 12px; }
        
        .card { 
            background: #fff; border-radius: 20px; border: 1px solid var(--border); 
            padding: 20px; margin-bottom: 16px; transition: transform 0.1s;
        }

        .m-title { font-size: 17px; font-weight: 700; line-height: 1.3; margin-bottom: 16px; color: #111; }
        
        .stats-grid { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 18px; }
        .p-val { font-size: 26px; font-weight: 800; color: #000; display: block; line-height: 1; }
        .p-lbl { font-size: 11px; color: #6b7280; font-weight: 700; text-transform: uppercase; margin-top: 4px; display: block;}

        .btn-row { display: flex; gap: 10px; }
        .m-btn { 
            flex: 1; padding: 14px; border-radius: 12px; border: none; 
            font-weight: 800; cursor: pointer; font-size: 16px; transition: opacity 0.2s;
        }
        .btn-yes { background: var(--yes-bg); color: var(--yes-btn); }
        .btn-no { background: var(--no-bg); color: var(--no-btn); }
        .m-btn:active { opacity: 0.7; }

        .m-footer { 
            display: flex; justify-content: space-between; margin-top: 16px; 
            font-size: 12px; color: #9ca3af; font-weight: 600; border-top: 1px solid #f9fafb; padding-top: 12px; 
        }
        .live-tag { color: var(--no-btn); display: flex; align-items: center; gap: 5px; }

        /* --- SKELETON (Prevents Blank Screen) --- */
        .skeleton { height: 180px; background: #f3f4f6; border-radius: 20px; margin-bottom: 16px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header-fixed">
        <div class="top-nav">
            <div class="logo">NEXGEN</div>
            <div class="user-controls">
                <button class="btn-auth" id="btn-login">Sign In</button>
                <button class="btn-auth" id="btn-signup">Sign Up</button>
                <div style="font-weight: 800; font-size: 14px; margin: 0 5px;">Ksh <span id="balance">0</span></div>
                <button class="btn-dep">Deposit</button>
            </div>
        </div>
        <div class="cat-bar">
            <div class="cat-item active">All</div>
            <div class="cat-item">Politics</div>
            <div class="cat-item">Crypto</div>
            <div class="cat-item">Sports</div>
            <div class="cat-item">Kenya</div>
        </div>
    </div>

    <div id="dashboard">
        <div id="loading-state">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>
        <div id="feed" style="display:none;"></div>
    </div>

    <script>
        const SB_URL = 'https://hwxnfzuwaeseszgsjeny.supabase.co';
        const SB_KEY = 'sb_publishable_C_fx8fnHQ9c1x_ZkWIG-gQ_2l2Mt-NL';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        const predictionData = [
            { t: "James Comey sentenced to Prison in 2026?", p: "9", v: "$169K", c: "CHANCE" },
            { t: "BTC Price: Up or Down in next 5m?", p: "51", v: "LIVE", c: "UP" },
            { t: "Will Jesus come back in June 2026?", p: "11", v: "$420K", c: "CHANCE" },
            { t: "Real Madrid to win the 2026 Champions League?", p: "58", v: "$890K", c: "CHANCE" },
            { t: "Will US interest rates be cut by 0.50% in June?", p: "68", v: "$23M", c: "CHANCE" }
        ];

        function init() {
            const feed = document.getElementById('feed');
            const loader = document.getElementById('loading-state');

            // 1. Draw prediction cards
            feed.innerHTML = predictionData.map(m => `
                <div class="card">
                    <div class="m-title">${m.t}</div>
                    <div class="stats-grid">
                        <div>
                            <span class="p-val">${m.p}%</span>
                            <span class="p-lbl">${m.c}</span>
                        </div>
                        <div style="font-size: 12px; font-weight: 700; color: #94a3b8;">VOL: ${m.v}</div>
                    </div>
                    <div class="btn-row">
                        <button class="m-btn btn-yes">Yes</button>
                        <button class="m-btn btn-no">No</button>
                    </div>
                    <div class="m-footer">
                        <div class="live-tag">● LIVE</div>
                        <div>Standard Market</div>
                    </div>
                </div>
            `).join('');

            // 2. Switch from skeleton to real feed
            loader.style.display = 'none';
            feed.style.display = 'block';

            // 3. Check Session
            checkUser();
        }

        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                document.getElementById('btn-login').style.display = 'none';
                document.getElementById('btn-signup').style.display = 'none';
                let { data } = await supabase.from('profiles').select('balance').eq('id', user.id).single();
                if (data) document.getElementById('balance').innerText = data.balance.toLocaleString();
            }
        }

        window.onload = init;
    </script>
</body>
</html>

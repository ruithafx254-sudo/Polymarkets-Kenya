<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexGen Terminal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/intasend-inlinejs-sdk@3.0.4/build/intasend-inline.js"></script>
</head>
<body>
    <header class="pm-header">
        <div class="nav-top">
            <span class="logo">NEXGEN</span>
            <div class="auth-box">
                <button class="btn-outline" onclick="openAuth()">Sign In</button>
                <button class="btn-deposit" id="deposit-now">Deposit</button>
            </div>
        </div>
        <nav class="cat-bar">
            <div class="cat active">All</div>
            <div class="cat">Politics</div>
            <div class="cat">Crypto</div>
            <div class="cat">Kenya</div>
        </nav>
    </header>

    <main id="market-container">
        <div class="market-card hero">
            <div class="card-body">
                <h2>Will Jesus come back in June 2026?</h2>
                <div class="stats">
                    <span class="odds">11% <small>CHANCE</small></span>
                    <span class="vol">$4.2M Vol.</span>
                </div>
                <div class="actions">
                    <button class="y-btn" onclick="openOrder('Jesus Prediction', 11)">Yes 11¢</button>
                    <button class="n-btn" onclick="openOrder('Jesus Prediction', 89)">No 89¢</button>
                </div>
            </div>
        </div>
        <div id="news-feed"></div>
    </main>

    <div id="order-slip" class="slip">
        <div class="slip-header">
            <h3 id="slip-title">Market</h3>
            <span class="close" onclick="closeOrder()">✕</span>
        </div>
        <div class="slip-body">
            <label>Shares to buy</label>
            <input type="number" id="shares" value="10">
            <button class="btn-buy" onclick="closeOrder()">Confirm Prediction</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

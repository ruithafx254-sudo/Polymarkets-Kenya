<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen | Global Terminal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/intasend-inlinejs-sdk@3.0.4/build/intasend-inline.js"></script>

    <style>
        :root { 
            --primary: #2ebd85; --no-red: #fef2f2; --no-text: #cf304a;
            --yes-green: #f0fdf4; --yes-text: #166534;
            --bg: #ffffff; --border: #e5e7eb; --text-muted: #6b7280;
        }

        body { 
            background: var(--bg); color: #111827; 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding-top: 110px; /* Space for nav + categories */
        }

        /* --- FIXED HEADER --- */
        .header-fixed {
            position: fixed; top: 0; left: 0; right: 0;
            background: #fff; z-index: 1000; border-bottom: 1px solid var(--border);
        }

        .top-nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px; height: 50px;
        }

        .logo { font-weight: 900; font-size: 18px; letter-spacing: -1px; }

        /* --- CATEGORY SCROLL BAR --- */
        .cat-bar {
            display: flex; overflow-x: auto; padding: 10px 16px;
            gap: 12px; white-space: nowrap; scrollbar-width: none;
        }
        .cat-bar::-webkit-scrollbar { display: none; }
        .cat-item {
            font-size: 13px; font-weight: 600; color: var(--text-muted);
            cursor: pointer; padding-bottom: 5px; border-bottom: 2px solid transparent;
        }
        .cat-item.active { color: #000; border-bottom-color: var(--primary); }

        /* --- DASHBOARD --- */
        #dashboard { max-width: 500px; margin: auto; padding: 12px; }

        .search-bar { 
            width: 100%; padding: 10px 14px; border-radius: 20px; border: 1px solid var(--border);
            background: #f9fafb; font-size: 14px; margin-bottom: 16px; box-sizing: border-box;
        }

        /* --- POLYMARKET CARD STYLE --- */
        .card { 
            background: #fff; border-radius: 16px; border: 1px solid var(--border); 
            padding: 16px; margin-bottom: 12px;
        }

        .m-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .m-title { font-size: 15px; font-weight: 600; line-height: 1.4; flex: 1; padding-right: 15px; }
        
        .m-chance { text-align: right; }
        .chance-val { font-size: 18px; font-weight: 800; display: block; }
        .chance-lbl { font-size: 10px; color: var(--text-muted); text-transform: lowercase; }

        .btn-row { display: flex; gap: 8px; }
        .m-btn { 
            flex: 1; padding: 12px; border-radius: 10px; border: none;
            font-weight: 700; font-size: 14px; cursor: pointer;
        }
        .btn-yes { background: var(--yes-green); color: var(--yes-text); }
        .btn-no { background: var(--no-red); color: var(--no-text); }

        .m-footer { display: flex; justify-content: space-between; margin-top: 12px; font-size: 11px; color: var(--text-muted); }

        /* WALLET BUTTONS */
        .wallet-btn { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; border: 1px solid var(--border); cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-fixed">
        <div class="top-nav">
            <div class="logo">NEXGEN</div>
            <div style="display: flex; gap: 8px; align-items: center;">
                <div style="text-align: right; line-height: 1;">
                    <span style="font-size: 10px; color: var(--text-muted);">Ksh</span><br>
                    <span id="balance" style="font-weight: 800;">0</span>
                </div>
                <button class="wallet-btn" style="background: #000; color: #fff;" onclick="directDeposit()">Deposit</button>
            </div>
        </div>
        <div class="cat-bar" id="cat-list">
            <div class="cat-item active" onclick="loadCategory('all')">All</div>
            <div class="cat-item" onclick="loadCategory('politics')">Politics</div>
            <div class="cat-item" onclick="loadCategory('crypto')">Crypto</div>
            <div class="cat-item" onclick="loadCategory('sports')">Sports</div>
            <div class="cat-item" onclick="loadCategory('business')">Business</div>
            <div class="cat-item" onclick="loadCategory('science')">Science</div>
        </div>
    </div>

    <div id="dashboard">
        <input type="text" class="search-bar" id="market-search" placeholder="Search world and Kenya events..." onkeyup="filterMarkets()">

        <div class="card" style="border-left: 4px solid var(--primary);">
            <div class="m-header">
                <div class="m-title">Will Jesus come back in June 2026?</div>
                <div class="m-chance">
                    <span class="chance-val">11%</span>
                    <span class="chance-lbl">chance</span>
                </div>
            </div>
            <div class="btn-row">
                <button class="m-btn btn-yes" onclick="placeTrade('YES', 9, 'Jesus 2026')">Yes (9x)</button>
                <button class="m-btn btn-no" onclick="placeTrade('NO', 3, 'Jesus 2026')">No (3x)</button>
            </div>
        </div>

        <div id="market-feed">
            <div style="text-align: center; padding: 40px; color: var(--text-muted);">Loading Global Markets...</div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://hwxnfzuwaeseszgsjeny.supabase.co'; 
        const SB_KEY = 'sb_publishable_C_fx8fnHQ9c1x_ZkWIG-gQ_2l2Mt-NL';
        const INTASEND_KEY = "ISPubKey_test_7e577665-297c-4b58-b282-7a876f8e03ad"; 

        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);
        let liveMarkets = [];
        let currentCat = 'all';

        async function initDashboard() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                let { data: profile } = await supabaseClient.from('profiles').select('balance').eq('id', user.id).single();
                if (profile) document.getElementById('balance').innerText = Math.floor(profile.balance).toLocaleString();
            } else {
                await supabaseClient.auth.signInAnonymously();
                initDashboard();
            }
            syncPolymarket();
        }

        async function syncPolymarket() {
            try {
                const proxy = "https://corsproxy.io/?";
                const target = "https://gamma-api.polymarket.com/events?limit=30&active=true&closed=false";
                const response = await fetch(proxy + encodeURIComponent(target));
                liveMarkets = await response.json();
                renderMarkets(liveMarkets);
            } catch (e) { console.error("Sync Error", e); }
        }

        function renderMarkets(data) {
            const feed = document.getElementById('market-feed');
            feed.innerHTML = '';
            
            const filtered = currentCat === 'all' ? data : data.filter(m => m.category.toLowerCase().includes(currentCat));

            filtered.forEach(m => {
                const yesPrice = m.markets[0]?.outcomePrices[0] || 0.5;
                const prob = (yesPrice * 100).toFixed(0);
                
                // Polymarket Payout Display logic
                // If yesPrice is 0.5, it costs 0.5 to win 1.0 (2x)
                const yesMult = (1 / yesPrice).toFixed(1);
                const noMult = (1 / (1-yesPrice)).toFixed(1);

                feed.innerHTML += `
                    <div class="card">
                        <div class="m-header">
                            <div class="m-title">${m.title}</div>
                            <div class="m-chance">
                                <span class="chance-val">${prob}%</span>
                                <span class="chance-lbl">chance</span>
                            </div>
                        </div>
                        <div class="btn-row">
                            <button class="m-btn btn-yes" onclick="placeTrade('YES', ${yesMult}, '${m.title.replace(/'/g, "")}')">Yes</button>
                            <button class="m-btn btn-no" onclick="placeTrade('NO', ${noMult}, '${m.title.replace(/'/g, "")}')">No</button>
                        </div>
                        <div class="m-footer">
                            <span>$${Math.floor(m.volume/1000)}K Vol.</span>
                            <span style="color:var(--primary); font-weight:700;">${m.category}</span>
                        </div>
                    </div>
                `;
            });
        }

        function loadCategory(cat) {
            currentCat = cat;
            document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            renderMarkets(liveMarkets);
        }

        function filterMarkets() {
            const term = document.getElementById('market-search').value.toLowerCase();
            const filtered = liveMarkets.filter(m => m.title.toLowerCase().includes(term) || m.category.toLowerCase().includes(term));
            renderMarkets(filtered);
        }

        // --- PAYMENT & TRADING ---
        function directDeposit() {
            const amt = prompt("Deposit Amount (KES):", "500");
            if (!amt) return;
            const intasend = new window.IntaSend({ publicAPIKey: INTASEND_KEY, live: false });
            intasend.run({ amount: amt, currency: "KES", label: "NexGen Funding" })
            .on("COMPLETE", () => location.reload());
        }

        async function placeTrade(choice, mult, name) {
            const amt = prompt(`Trade on ${name}\nOutcome: ${choice}\nConfirm Amount (KES):`, "100");
            if (!amt) return;
            const { data: { user } } = await supabaseClient.auth.getUser();
            let { data: profile } = await supabaseClient.from('profiles').select('balance').eq('id', user.id).single();
            if (profile.balance < amt) return alert("Insufficient Balance");
            
            await supabaseClient.from('profiles').update({ balance: profile.balance - amt }).eq('id', user.id);
            await supabaseClient.from('trades').insert([{ user_id: user.id, selection: choice, amount: amt, market_name: name }]);
            alert("Trade Successful!");
            location.reload();
        }

        initDashboard();
    </script>
</body>
</html>

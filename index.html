<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polymarkets Africa | Terminal</title>
    
    <script src="https://unpkg.com/intasend-inlinejs-sdk@4.0.7/build/intasend-inline.js" async></script>

    <style>
        :root { 
            --accent: #2ebd85; --border: #eceef2; --text-main: #0f172a; --text-sub: #64748b;
            --yes: #f0fdf4; --yes-text: #166534; --no: #fef2f2; --no-text: #991b1b;
        }
        
        body { background: #ffffff; color: var(--text-main); margin: 0; padding-top: 120px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }

        .header-stack { position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 2000; border-bottom: 1px solid var(--border); }

        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 60px; }
        .logo-wrap { display: flex; flex-direction: column; line-height: 1; }
        .logo-main { font-weight: 900; font-size: 18px; letter-spacing: -0.5px; color: #000; text-transform: uppercase; }
        .logo-sub { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
        
        .nav-right { display: flex; align-items: center; gap: 8px; }
        .wallet-pill { display: flex; align-items: center; background: #f8fafc; border: 1px solid var(--border); padding: 4px 4px 4px 12px; border-radius: 8px; gap: 8px; font-size: 13px; font-weight: 700; }
        .btn-deposit { background: #000; color: #fff; border: none; padding: 7px 14px; border-radius: 6px; font-weight: 700; font-size: 12px; cursor: pointer; }
        
        .user-id { width: 34px; height: 34px; background: #0f172a; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; font-weight: bold; }

        .sub-nav { display: flex; gap: 16px; padding: 10px 16px; overflow-x: auto; background: #fff; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .sub-nav::-webkit-scrollbar { display: none; }
        .cat-link { font-size: 13px; font-weight: 700; color: var(--text-sub); text-decoration: none; white-space: nowrap; cursor: pointer; }
        .cat-link.active { color: #000; border-bottom: 2px solid #000; padding-bottom: 8px; margin-bottom: -10px; }

        #dashboard { max-width: 550px; margin: auto; padding: 12px; }
        
        .market-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .m-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .m-title { font-size: 15px; font-weight: 600; line-height: 1.4; color: #111; }
        .odds-val { font-size: 18px; font-weight: 800; color: #000; }
        .odds-lbl { font-size: 10px; color: var(--text-sub); text-transform: uppercase; display: block; text-align: right; }
        
        .btn-group { display: flex; gap: 8px; }
        .trade-btn { flex: 1; padding: 11px; border-radius: 8px; border: none; font-weight: 800; font-size: 13px; cursor: pointer; }
        .trade-btn.yes { background: var(--yes); color: var(--yes-text); }
        .trade-btn.no { background: var(--no); color: var(--no-text); }
        
        .resolve-btn { width: 100%; margin-top: 10px; background: #f8fafc; border: 1px dashed var(--border); padding: 7px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; color: var(--text-sub); }

        .news-card { border-left: 3px solid var(--accent); background: #f8fafc; padding: 14px; border-radius: 0 10px 10px 0; margin-bottom: 12px; }
        .news-tag { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; display: block; }
        .news-h { font-size: 14px; font-weight: 700; margin-bottom: 4px; color: #000; }
        .news-p { font-size: 13px; color: var(--text-sub); line-height: 1.4; margin: 0; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); z-index: 5000; align-items: center; justify-content: center; padding: 16px; }
        .modal { background: #fff; width: 100%; max-width: 340px; padding: 24px; border-radius: 16px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .input-tech { width: 100%; padding: 12px; background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        .btn-tech { width: 100%; padding: 14px; background: #000; color: #fff; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 14px; }
        .chip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 12px 0; }
        .amt-chip { border: 1px solid var(--border); padding: 10px; border-radius: 8px; font-size: 12px; font-weight: 800; cursor: pointer; background: #fff; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header-stack">
        <div class="top-nav">
            <div class="logo-wrap">
                <div class="logo-main">Polymarkets</div>
                <div class="logo-sub">Africa</div>
            </div>
            <div class="nav-right">
                <button id="signBtn" class="btn-deposit" style="background:#f1f5f9; color:#000;" onclick="openModal('authModal')">Sign In</button>
                <div id="userIcon" class="user-id hidden" onclick="logout()">ID</div>
                <div class="wallet-pill">
                    Ksh <span id="balance">0.00</span>
                    <button onclick="openModal('depositModal')" class="btn-deposit">Deposit</button>
                </div>
            </div>
        </div>
        <div class="sub-nav">
            <div class="cat-link active" onclick="filterCat('All', this)">All Markets</div>
            <div class="cat-link" onclick="filterCat('News', this)">News</div>
            <div class="cat-link" onclick="filterCat('World', this)">World</div>
            <div class="cat-link" onclick="filterCat('Sports', this)">Sports</div>
            <div class="cat-link" onclick="filterCat('Tech', this)">Tech</div>
        </div>
    </div>

    <div id="dashboard">
        <div id="feed"></div>
    </div>

    <div id="authModal" class="overlay">
        <div class="modal">
            <h3 style="margin: 0 0 16px 0;">Sign In</h3>
            <input type="email" id="aEmail" class="input-tech" placeholder="Email Address">
            <input type="password" id="aPass" class="input-tech" placeholder="Password">
            <button onclick="doAuth()" class="btn-tech">Open Session</button>
            <p style="font-size: 12px; color: var(--text-sub); margin-top: 14px; cursor: pointer; margin-bottom: 0;" onclick="closeModal('authModal')">Dismiss</p>
        </div>
    </div>

    <div id="depositModal" class="overlay">
        <div class="modal">
            <h3 style="margin: 0 0 6px 0;">Secure Deposit</h3>
            <p style="color: var(--text-sub); font-size: 12px; margin-top: 0;">M-Pesa Express Payment</p>
            <div style="background:#f8fafc; padding:12px; border-radius:12px; border: 1px solid var(--border);">
                <input type="number" id="depAmt" class="input-tech" style="font-size: 24px; text-align: center; font-weight: 800; background: transparent; border: none; margin:0;" placeholder="0">
                <div class="chip-grid">
                    <div class="amt-chip" onclick="setAmt(250)">250</div>
                    <div class="amt-chip" onclick="setAmt(500)">500</div>
                    <div class="amt-chip" onclick="setAmt(1000)">1k</div>
                </div>
            </div>
            <button onclick="payNow()" class="btn-tech" style="background:var(--accent); margin-top:12px;">Confirm Deposit</button>
            <p style="font-size: 12px; color: var(--text-sub); margin-top: 14px; cursor: pointer; margin-bottom: 0;" onclick="closeModal('depositModal')">Cancel</p>
        </div>
    </div>

    <div id="stakeModal" class="overlay">
        <div class="modal">
            <h3 id="sTitle" style="margin: 0 0 6px 0;">Place Stake</h3>
            <p id="sQuestion" style="font-size: 12px; color: var(--text-sub); margin-bottom: 16px;"></p>
            <input type="number" id="stakeAmt" class="input-tech" placeholder="Amount (Ksh)">
            <button id="stakeConfirmBtn" class="btn-tech" style="background: var(--accent)">Place Bet</button>
            <p style="font-size: 12px; color: var(--text-sub); margin-top: 14px; cursor: pointer; margin-bottom: 0;" onclick="closeModal('stakeModal')">Cancel</p>
        </div>
    </div>

    <script>
        let currentCat = 'All';
        let markets = [];

        const baseMarkets = [
            { type: 'm', cat: "World", q: "Will Jesus come back before June?", p: 4, id: "m-jesus" },
            { type: 'm', cat: "Sports", q: "Will Arsenal win their next Premier League match?", p: 68, id: "m-arsenal" },
            { type: 'm', cat: "Tech", q: "Will OpenAI release GPT-5 before July?", p: 58, id: "m-gpt" },
            { type: 'n', cat: "News", h: "Global Markets Update", p: "Prediction markets experience high volume globally this week.", id: "n-global" }
        ];

        // EXECUTES ON FIRST LOAD REGARDLESS OF EXTERNAL ASSETS
        document.addEventListener('DOMContentLoaded', () => {
            loadPersistedMarkets();
            syncState(); 
            render('All');
        });

        function loadPersistedMarkets() {
            const stored = localStorage.getItem('nx_lite_markets');
            if (stored) {
                try {
                    markets = JSON.parse(stored);
                } catch(e) {
                    markets = [...baseMarkets];
                    saveMarkets();
                }
            } else {
                markets = [...baseMarkets];
                saveMarkets();
            }
        }

        function saveMarkets() {
            localStorage.setItem('nx_lite_markets', JSON.stringify(markets));
        }

        function render(cat) {
            currentCat = cat;
            const f = document.getElementById('feed'); 
            if (!f) return;
            f.innerHTML = '';
            
            let filtered = markets.filter(m => {
                if (cat === 'All') return true;
                if (cat === 'News') return m.type === 'n';
                return m.cat === cat && m.type === 'm';
            });

            if (filtered.length === 0) {
                f.innerHTML = `<p style="text-align:center; color:var(--text-sub); padding:30px 0; font-size:13px;">No active listings in this category.</p>`;
                return;
            }

            filtered.forEach(m => {
                const card = document.createElement('div');
                card.id = 'market-' + m.id;
                
                if(m.type === 'm') {
                    card.className = 'market-card';
                    const wager = getActiveWager(m.id);
                    const activeStakeStatus = wager ? `<br><span style="color:var(--accent); font-size:11px; font-weight:700;">Active: Ksh ${wager.amt} on '${wager.side}'</span>` : '';

                    card.innerHTML = `
                        <div class="m-header">
                            <div class="m-title">${m.q}${activeStakeStatus}</div>
                            <div><span class="odds-val">${m.p}%</span><span class="odds-lbl">odds</span></div>
                        </div>
                        <div class="btn-group">
                            <button class="trade-btn yes" onclick="openStakeModal('YES', '${m.q.replace(/'/g, "\\'")}', '${m.id}')">Yes</button>
                            <button class="trade-btn no" onclick="openStakeModal('NO', '${m.q.replace(/'/g, "\\'")}', '${m.id}')">No</button>
                        </div>
                        <button class="resolve-btn" onclick="resolvePrediction('${m.id}')">Determine Outcome & Claim</button>`;
                } else {
                    card.className = 'news-card';
                    card.innerHTML = `
                        <span class="news-tag">Update</span>
                        <div class="news-h">${m.h}</div>
                        <p class="news-p">${m.p}</p>`;
                }
                f.appendChild(card);
            });
        }

        function filterCat(cat, el) {
            document.querySelectorAll('.cat-link').forEach(c => c.classList.remove('active'));
            if(el) el.classList.add('active');
            render(cat);
        }

        function getActiveWager(marketId) {
            const wagers = JSON.parse(localStorage.getItem('nx_lite_wagers') || '{}');
            return wagers[marketId];
        }

        function openStakeModal(side, question, marketId) {
            if(!localStorage.getItem('nx_lite_user')) return openModal('authModal');
            document.getElementById('sTitle').innerText = `Bet '${side}'`;
            document.getElementById('sQuestion').innerText = question;
            document.getElementById('stakeAmt').value = '';
            openModal('stakeModal');

            document.getElementById('stakeConfirmBtn').onclick = () => {
                const amt = Number(document.getElementById('stakeAmt').value);
                const currentBalance = parseFloat(localStorage.getItem('nx_lite_balance') || 0);

                if(!amt || amt < 50) return alert("Minimum stake is Ksh 50");
                if(amt > currentBalance) return alert("Insufficient account balance.");

                localStorage.setItem('nx_lite_balance', currentBalance - amt);
                
                const wagers = JSON.parse(localStorage.getItem('nx_lite_wagers') || '{}');
                wagers[marketId] = { side: side, amt: amt };
                localStorage.setItem('nx_lite_wagers', JSON.stringify(wagers));

                syncState();
                closeModal('stakeModal');
                render(currentCat);
                alert(`Success! Stake placed on ${side}.`);
            };
        }

        function resolvePrediction(marketId) {
            const outcomes = ["YES", "NO"];
            const resolvedOutcome = outcomes[Math.floor(Math.random() * outcomes.length)];
            const wager = getActiveWager(marketId);

            let alertMsg = `Settled as '${resolvedOutcome}'.\n`;

            if (wager) {
                if (wager.side === resolvedOutcome) {
                    const winnings = wager.amt * 2;
                    let curBal = parseFloat(localStorage.getItem('nx_lite_balance') || 0);
                    localStorage.setItem('nx_lite_balance', curBal + winnings);
                    alertMsg += `🎉 Correct! You earned Ksh ${winnings.toLocaleString()}!`;
                } else {
                    alertMsg += `❌ Incorrect. Wager lost.`;
                }
                const wagers = JSON.parse(localStorage.getItem('nx_lite_wagers') || '{}');
                delete wagers[marketId];
                localStorage.setItem('nx_lite_wagers', JSON.stringify(wagers));
            } else {
                alertMsg += `No active position found.`;
            }

            markets = markets.filter(m => m.id !== marketId);
            saveMarkets();
            syncState();
            render(currentCat);
            alert(alertMsg);
        }

        function syncState() {
            const user = localStorage.getItem('nx_lite_user');
            const bal = localStorage.getItem('nx_lite_balance') || "0.00";
            if(user) {
                document.getElementById('signBtn').classList.add('hidden');
                document.getElementById('userIcon').classList.remove('hidden');
            }
            document.getElementById('balance').innerText = parseFloat(bal).toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function doAuth() {
            const email = document.getElementById('aEmail').value;
            if(!email.includes('@')) return alert("Enter valid credentials");
            localStorage.setItem('nx_lite_user', email);
            closeModal('authModal');
            syncState();
        }

        function setAmt(v) { document.getElementById('depAmt').value = v; }

        function payNow() {
            const amt = document.getElementById('depAmt').value;
            if(!localStorage.getItem('nx_lite_user')) return openModal('authModal');
            if(amt < 200) return alert("Minimum deposit is Ksh 200");
            
            if (typeof window.IntaSend !== "undefined") {
                const intasend = new window.IntaSend({
                    publicAPIKey: "ISPubKey_test_7e577665-297c-4b58-b282-7a876f8e03ad",
                    live: false 
                });

                intasend.on("COMPLETE", (resp) => {
                    let cur = parseFloat(localStorage.getItem('nx_lite_balance') || 0);
                    localStorage.setItem('nx_lite_balance', cur + Number(amt));
                    syncState();
                    closeModal('depositModal');
                    alert("Deposit confirmed!");
                });

                intasend.on("FAILED", (resp) => {
                    alert("Payment attempt failed.");
                });

                intasend.checkout({
                    amount: amt,
                    currency: "KES",
                    email: localStorage.getItem('nx_lite_user'),
                    api_ref: "nx-terminal-dep"
                });
            } else {
                alert("IntaSend SDK loading offline. Adding locally.");
                let cur = parseFloat(localStorage.getItem('nx_lite_balance') || 0);
                localStorage.setItem('nx_lite_balance', cur + Number(amt));
                closeModal('depositModal');
                syncState();
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { if(confirm("Sign out?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexGen | Professional Terminal</title>
    
    <script src="https://unpkg.com/intasend-inlinejs-sdk@4.0.7/build/intasend-inline.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --primary: #2ebd85; 
            --bg: #0b0f1a; 
            --card: #161b2c; 
            --border: #2d334a;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); margin: 0; padding-top: 80px; font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }

        /* --- STICKY PROFESSIONAL HEADER --- */
        .header { position: fixed; top: 0; left: 0; right: 0; background: rgba(11, 15, 26, 0.8); backdrop-filter: blur(12px); z-index: 2000; border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; font-size: 20px; color: var(--primary); letter-spacing: -1px; }
        
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .auth-trigger { color: var(--text-dim); font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; border: 1px solid var(--border); padding: 6px 12px; border-radius: 8px; }
        
        .wallet-pill { display: flex; align-items: center; background: #1e293b; border-radius: 10px; padding: 2px 2px 2px 10px; border: 1px solid var(--border); gap: 8px; }
        .bal-txt { font-weight: 800; font-size: 13px; color: var(--primary); }

        /* PAYMENT BUTTON - DO NOT CHANGE */
        .intaSendPayButton { 
            background: var(--primary); color: #fff; border: none; padding: 7px 14px; 
            border-radius: 7px; font-weight: 800; cursor: pointer; font-size: 12px;
        }

        /* --- AUTH MODAL (Sign In/Up) --- */
        #auth-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); border: 1px solid var(--border); width: 100%; max-width: 360px; border-radius: 24px; padding: 30px; text-align: center; }
        .auth-tabs { display: flex; background: #0b0f1a; padding: 4px; border-radius: 12px; margin-bottom: 25px; }
        .tab { flex: 1; padding: 10px; font-size: 13px; font-weight: 700; color: var(--text-dim); border-radius: 10px; cursor: pointer; }
        .tab.active { background: var(--card); color: var(--text-main); border: 1px solid var(--border); }
        
        .auth-input { width: 100%; background: #0b0f1a; border: 1px solid var(--border); padding: 16px; border-radius: 12px; color: #fff; margin-bottom: 12px; font-size: 15px; outline: none; }
        .auth-btn { width: 100%; background: var(--primary); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; }

        /* --- MARKET FEED --- */
        #feed { max-width: 500px; margin: auto; padding: 12px; }
        .card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
        .m-title { font-size: 17px; font-weight: 600; line-height: 1.4; margin-bottom: 15px; }
        .p-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
        .p-large { font-size: 30px; font-weight: 900; letter-spacing: -1px; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-trade { flex: 1; padding: 15px; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; font-size: 14px; }
        .btn-yes { background: #064e3b; color: #4ade80; }
        .btn-no { background: #450a0a; color: #f87171; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">NEXGEN</div>
        <div class="nav-right">
            <div class="auth-trigger" id="user-status" onclick="toggleAuth()">Sign In</div>
            <div class="wallet-pill">
                <span class="bal-txt">Ksh <span id="balance">0.00</span></span>
                <button id="deposit-btn" class="intaSendPayButton" data-amount="50" data-currency="KES">Deposit</button>
            </div>
        </div>
    </header>

    <div id="feed"></div>

    <div id="auth-overlay">
        <div class="auth-card">
            <div class="auth-tabs">
                <div class="tab active" onclick="switchAuth('in')">Sign In</div>
                <div class="tab" onclick="switchAuth('up')">Sign Up</div>
            </div>
            <h2 id="auth-title" style="margin-top:0;">Welcome Back</h2>
            <input type="email" id="email" class="auth-input" placeholder="Email Address">
            <input type="password" id="pass" class="auth-input" placeholder="Password">
            <button class="auth-btn" onclick="handleAuth()">Continue</button>
            <p onclick="toggleAuth()" style="color:var(--text-dim); font-size:12px; margin-top:20px; cursor:pointer;">Cancel</p>
        </div>
    </div>

    <script>
        // --- PAYMENT SYSTEM (STRICTLY UNTOUCHED) ---
        window.onload = function() {
            if (window.IntaSend) {
                const intasend = new window.IntaSend({
                    publicAPIKey: "ISPubKey_test_7e577665-297c-4b58-b282-7a876f8e03ad",
                    live: false 
                });
                intasend.buttons("#deposit-btn").on("COMPLETE", (res) => {
                    document.getElementById('balance').innerText = res.amount;
                });
            }
            renderMarkets(15);
        };

        // --- AUTH SYSTEM ---
        let currentMode = 'in';
        function toggleAuth() {
            const el = document.getElementById('auth-overlay');
            el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
        }
        function switchAuth(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('auth-title').innerText = mode === 'in' ? 'Welcome Back' : 'Create Account';
        }
        function handleAuth() {
            const email = document.getElementById('email').value;
            if(!email) return alert("Enter email");
            document.getElementById('user-status').innerText = email.split('@')[0];
            toggleAuth();
        }

        // --- MARKET RENDERER (Optimized) ---
        const titles = ["Will BTC hit $100k?", "Arsenal to win league?", "Kenya GDP Growth > 5%?", "Solana to $300?"];
        function renderMarkets(num) {
            const feed = document.getElementById('feed');
            for(let i=0; i<num; i++) {
                const prob = Math.floor(Math.random() * 80) + 10;
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="m-title">${titles[Math.floor(Math.random()*titles.length)]}</div>
                    <div class="p-row">
                        <span class="p-large">${prob}%</span>
                        <span style="color:var(--text-dim); font-size:11px; font-weight:700;">VOL: $${(Math.random()*2).toFixed(1)}M</span>
                    </div>
                    <div class="btn-group">
                        <button class="btn-trade btn-yes">YES</button>
                        <button class="btn-trade btn-no">NO</button>
                    </div>
                `;
                feed.appendChild(card);
            }
        }

        // Infinite Scroll for Android
        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                renderMarkets(10);
            }
        };
    </script>
</body>
</html>

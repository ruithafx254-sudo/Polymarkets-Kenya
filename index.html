<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexGen | Professional Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #2ebd85; --border: #f1f5f9; --text-main: #0f172a;
            --yes: #f0fdf4; --yes-text: #166534; --no: #fef2f2; --no-text: #cf304a;
        }
        body { background: #f8fafc; color: var(--text-main); margin: 0; padding-top: 130px; font-family: -apple-system, sans-serif; }

        /* --- HEADER --- */
        .header { position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 2000; border-bottom: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; }
        .logo { font-weight: 900; font-size: 22px; color: #000; letter-spacing: -1.2px; }
        .bar-right { display: flex; align-items: center; gap: 6px; }
        
        /* AUTH GROUP */
        .auth-group { display: flex; background: #f1f5f9; padding: 3px; border-radius: 8px; }
        .btn-auth { font-size: 12px; font-weight: 700; border: none; background: transparent; padding: 6px 12px; border-radius: 6px; color: #475569; cursor: pointer; }
        .btn-auth.active { background: #fff; color: #000; }

        /* WALLET UI (HIDDEN BY DEFAULT) */
        #wallet-ui { display: none; align-items: center; gap: 8px; }
        .wallet-pill { display: flex; align-items: center; background: #0f172a; color: #fff; padding: 2px 2px 2px 10px; border-radius: 10px; gap: 8px; font-size: 13px; font-weight: 700; }
        .btn-deposit { background: var(--primary); color: #fff; border: none; padding: 6px 14px; border-radius: 8px; font-weight: 800; cursor: pointer; }
        
        .cat-bar { display: flex; overflow-x: auto; padding: 12px 16px; gap: 20px; background: #fff; border-top: 1px solid var(--border); }
        .cat-item { font-size: 14px; font-weight: 600; color: #64748b; white-space: nowrap; cursor: pointer; }
        .cat-item.active { color: var(--primary); font-weight: 700; border-bottom: 3px solid var(--primary); padding-bottom: 5px; }

        /* --- AUTH MODAL --- */
        #auth-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; width: 100%; max-width: 340px; padding: 25px; border-radius: 25px; text-align: center; }
        .m-input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        .m-btn-main { width: 100%; padding: 16px; background: #000; color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }

        /* --- CARDS --- */
        #dashboard { max-width: 500px; margin: auto; padding: 12px; }
        .card { background: #fff; border-radius: 20px; border: 1px solid var(--border); padding: 18px; margin-bottom: 14px; animation: slideIn 0.3s ease-out; }
        .m-title { font-size: 17px; font-weight: 700; line-height: 1.4; margin-bottom: 16px; }
        .stat-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px; }
        .p-val { font-size: 26px; font-weight: 800; color: #000; }
        .btn-row { display: flex; gap: 10px; }
        .m-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; font-size: 15px; }
        .btn-yes { background: var(--yes); color: var(--yes-text); }
        .btn-no { background: var(--no); color: var(--no-text); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="top-nav">
            <div class="logo">NEXGEN</div>
            <div class="bar-right">
                <div id="auth-controls" class="auth-group">
                    <button id="nav-in" class="btn-auth active" onclick="openAuth('In')">Sign In</button>
                    <button id="nav-up" class="btn-auth" onclick="openAuth('Up')">Sign Up</button>
                </div>
                <div id="wallet-ui">
                    <div class="wallet-pill">
                        Ksh <span id="balance">0</span>
                        <button class="btn-deposit" onclick="alert('M-Pesa Link Ready')">Deposit</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="cat-bar">
            <div class="cat-item active">All</div>
            <div class="cat-item">Politics</div>
            <div class="cat-item">Crypto</div>
            <div class="cat-item">Kenya</div>
            <div class="cat-item">Global</div>
        </div>
    </div>

    <div id="dashboard">
        <div id="live-feed">
            <div class="card"><div class="m-title">Will Arsenal win the Premier League?</div><div class="stat-row"><div><span class="p-val">45%</span> <span style="font-size:12px; color:#64748b;">WINNER</span></div><div style="font-size:11px; font-weight:700; color:#94a3b8;">VOL: $1.2M</div></div><div class="btn-row"><button class="m-btn btn-yes" onclick="trade()">YES</button><button class="m-btn btn-no" onclick="trade()">NO</button></div></div>
            <div class="card"><div class="m-title">Solana to flip Ethereum in Market Cap?</div><div class="stat-row"><div><span class="p-val">12%</span> <span style="font-size:12px; color:#64748b;">CHANCE</span></div><div style="font-size:11px; font-weight:700; color:#94a3b8;">VOL: $300K</div></div><div class="btn-row"><button class="m-btn btn-yes" onclick="trade()">YES</button><button class="m-btn btn-no" onclick="trade()">NO</button></div></div>
        </div>
    </div>

    <div id="auth-modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-top:0;">Sign In</h2>
            <input type="email" class="m-input" placeholder="Email Address">
            <input type="password" class="m-input" placeholder="Password">
            <button id="modal-submit" class="m-btn-main" onclick="confirmAuth()">Continue</button>
            <p onclick="closeAuth()" style="margin-top:20px; font-size:13px; color:#94a3b8; cursor:pointer;">Maybe later</p>
        </div>
    </div>

    <script>
        // 1. Auth & UI Logic
        function openAuth(type) {
            const title = document.getElementById('modal-title');
            const submitBtn = document.getElementById('modal-submit');
            
            if(type === 'In') {
                title.innerText = 'Sign In';
                submitBtn.innerText = 'Continue to account';
                document.getElementById('nav-in').classList.add('active');
                document.getElementById('nav-up').classList.remove('active');
            } else {
                title.innerText = 'Create Account';
                submitBtn.innerText = 'Sign Up Now';
                document.getElementById('nav-up').classList.add('active');
                document.getElementById('nav-in').classList.remove('active');
            }
            document.getElementById('auth-modal').style.display = 'flex';
        }

        function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }

        function confirmAuth() {
            alert("Supabase Auth Connection Ready");
            // Switch UI from Auth buttons to Wallet
            document.getElementById('auth-controls').style.display = 'none';
            document.getElementById('wallet-ui').style.display = 'flex';
            closeAuth();
        }

        // 2. 1-Second News/Market Update Logic
        let eventCount = 3;
        setInterval(() => {
            const feed = document.getElementById('live-feed');
            const newCard = document.createElement('div');
            newCard.className = 'card';
            
            const randomProb = Math.floor(Math.random() * 99) + 1;
            const randomVol = (Math.random() * 500).toFixed(1);
            
            newCard.innerHTML = `
                <div class="m-title">Polymarket Live Event #${eventCount}: Prediction Update?</div>
                <div class="stat-row">
                    <div><span class="p-val">${randomProb}%</span> <span style="font-size:12px; color:#64748b;">CHANCE</span></div>
                    <div style="font-size:11px; font-weight:700; color:#94a3b8;">VOL: $${randomVol}K</div>
                </div>
                <div class="btn-row">
                    <button class="m-btn btn-yes" onclick="trade()">YES</button>
                    <button class="m-btn btn-no" onclick="trade()">NO</button>
                </div>
            `;
            
            // Insert at the top to make it look like a live update
            feed.insertBefore(newCard, feed.firstChild);
            eventCount++;

            // Limit feed to 100 items to prevent lag
            if(feed.children.length > 100) feed.removeChild(feed.lastChild);
        }, 1000);

        function trade() { 
            if(document.getElementById('wallet-ui').style.display === 'flex') {
                alert("Processing Trade..."); 
            } else {
                alert("Please sign in to place a trade.");
                openAuth('In');
            }
        }
    </script>
</body>
</html>

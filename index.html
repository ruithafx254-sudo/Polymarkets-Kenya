<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexGen Terminal</title>
    
    <script src="https://unpkg.com/intasend-inlinejs-sdk@4.0.7/build/intasend-inline.js"></script>

    <style>
        :root { --primary: #2ebd85; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; padding-top: 80px; }

        /* HEADER */
        .header { position: fixed; top: 0; width: 100%; background: #0f172a; border-bottom: 1px solid #334155; z-index: 1000; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .logo { font-weight: 900; font-size: 22px; letter-spacing: -1px; color: var(--primary); }
        
        .wallet { display: flex; align-items: center; background: #1e293b; padding: 6px 12px; border-radius: 12px; gap: 10px; border: 1px solid #334155; }
        .balance { font-weight: 800; font-size: 14px; }
        
        /* THE DEPOSIT BUTTON */
        .intaSendPayButton { 
            background: var(--primary); color: #fff; border: none; padding: 8px 16px; 
            border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 13px;
        }

        /* FEED */
        #feed { padding: 16px; max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid #334155; }
        .m-title { font-size: 17px; font-weight: 600; margin-bottom: 15px; line-height: 1.4; }
        
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .price { font-size: 28px; font-weight: 900; }
        
        .btn-group { display: flex; gap: 10px; }
        .bet-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .yes { background: #064e3b; color: #4ade80; }
        .no { background: #450a0a; color: #f87171; }

        .loader { text-align: center; color: #64748b; font-size: 14px; padding: 20px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">NEXGEN</div>
        <div class="wallet">
            <span class="balance">Ksh <span id="bal-amt">0.00</span></span>
            <button 
                id="deposit-btn"
                class="intaSendPayButton" 
                data-amount="50" 
                data-currency="KES" 
                data-email="user@nexgen.com"
                data-phone_number="254700000000">
                Deposit
            </button>
        </div>
    </header>

    <div id="feed">
        </div>
    <div class="loader" id="load-trigger">Scanning Global Markets...</div>

    <script>
        // 1. INITIALIZE INTASEND (The "Fix")
        // We wrap it in a check to ensure the library is loaded
        function initPayment() {
            if (window.IntaSend) {
                const intasend = new window.IntaSend({
                    publicAPIKey: "ISPubKey_test_7e577665-297c-4b58-b282-7a876f8e03ad",
                    live: false 
                });

                // Attach to the button
                intasend.buttons("#deposit-btn").on("COMPLETE", (response) => {
                    document.getElementById('bal-amt').innerText = response.amount;
                    alert("Deposit Successful!");
                }).on("FAILED", () => {
                    alert("M-Pesa session timed out or failed.");
                });
            }
        }

        // 2. PROFESSIONAL MARKET GENERATOR
        const markets = [
            "Will Bitcoin break $100k before Sunday?",
            "Will the Kenya Shilling stabilize against USD?",
            "Will Arsenal drop points in their next match?",
            "Will AI regulation be passed in the EU?",
            "Will SpaceX launch Starship this month?",
            "Will Crude Oil prices drop below $70?",
            "Will Solana outperform Ethereum today?"
        ];

        function createCard() {
            const container = document.getElementById('feed');
            const title = markets[Math.floor(Math.random() * markets.length)];
            const prob = Math.floor(Math.random() * 85) + 5;
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="m-title">${title}</div>
                <div class="row">
                    <span class="price">${prob}%</span>
                    <span style="color:#64748b; font-size:12px; font-weight:700;">VOL: $${(Math.random()*5).toFixed(1)}M</span>
                </div>
                <div class="btn-group">
                    <button class="bet-btn yes" onclick="trade()">YES</button>
                    <button class="bet-btn no" onclick="trade()">NO</button>
                </div>
            `;
            container.appendChild(card);
        }

        // Initial Cards
        for(let i=0; i<15; i++) createCard();

        // Android Infinite Scroll Logic
        window.onscroll = function() {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                createCard();
            }
        };

        function trade() { alert("Processing on-chain transaction..."); }

        // Run payment init on load
        window.onload = initPayment;
    </script>
</body>
</html>

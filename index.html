            <div style="background:#f8fafc; padding:16px; border-radius:16px; border:1px solid var(--border); margin-bottom:16px;">
                <div class="input-group">
                    <label>Amount (Min. Ksh 20)</label>
                    <input type="text" id="betAmt" class="input-tech" style="font-size:24px; text-align:center; font-weight:800;" placeholder="0.00" value="100.00">
                </div>
            </div>

            <button onclick="confirmWager()" class="btn-tech" style="background:var(--yes-blue);">Place Bet</button>
            <p style="margin-top:12px; cursor:pointer; color:var(--text-sub); font-size:13px;" onclick="closeModal('betSlipModal')">Cancel</p>
        </div>
    </div>

    <script>
        const SB_URL = "https://hwxnfzuwaeseszgsjeny.supabase.co";
        const SB_KEY = "sb_publishable_C_fx8fnHQ9c1x_ZkWIG-gQ_2l2Mt-NL";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let userProfile = null;
        let activeTab = 'in';
        let currentFundsMode = 'deposit';
        let activeSelection = null; 
        const LIPWA_LINK = "https://lipwa.link/8367";

        const markets = [];
        let itemsRendered = 0;
        const CHUNK_SIZE = 20;

        function generate1000Markets() {
            const scenarios = [
                { cat: "Politics", format: (v) => `Will the ${v} US Midterm elections result in a Senate majority flip?` },
                { cat: "Politics", format: (v) => `Will Donald Trump be impeached again before the end of ${v}?` },
                { cat: "Politics", format: (v) => `Will there be a complete US Federal Government shutdown lasting more than 5 days in Q${v}?` },
                { cat: "Politics", format: (v) => `Will the US impose additional trade restrictions on chip exports to market ${v}?` },
                
                { cat: "Crypto", format: (v) => `Will Bitcoin cross $${v}0,000 before the close of this quarter?` },
                { cat: "Crypto", format: (v) => `Will Ethereum's total market cap exceed $${v}00 Billion this month?` },
                { cat: "Crypto", format: (v) => `Will Solana process a record high of ${v}0,000 transactions per second by June?` },
                { cat: "Faith", format: (v) => `Will Jesus come back before June 8?` },

                { cat: "Finance", format: (v) => `Will Crude Oil hit $${v}5 per barrel by the end of May?` },
                { cat: "Finance", format: (v) => `Will the Federal Reserve cut key interest rates at the next FOMC meeting by ${v} basis points?` },
                { cat: "Finance", format: (v) => `Will gold futures close above $${v},500 per ounce by Friday?` },
                { cat: "Finance", format: (v) => `Will the inflation index increase by more than 1.${v}% in the upcoming monthly report?` },

                { cat: "Sports", format: (v) => `Will Arsenal win the Premier League matchday ${v} with a clean sheet?` },
                { cat: "Sports", format: (v) => `Will the Boston Celtics sweep their upcoming NBA playoff series game ${v}?` },
                { cat: "Sports", format: (v) => `Will Real Madrid win their match by ${v} or more goals this weekend?` },
                { cat: "Sports", format: (v) => `Will the upcoming F1 Grand Prix see ${v} or more DNFs?` },

                { cat: "Science", format: (v) => `Will SpaceX successfully launch Starship flight test ${v} before month-end?` },
                { cat: "Pop Culture", format: (v) => `Will the highest-grossing movie this weekend surpass $${v}0 Million at the box office?` },
                { cat: "Science", format: (v) => `Will OpenAI announce GPT-${v} as their next flagship frontier model?` },
                { cat: "Pop Culture", format: (v) => `Will the top trending hashtag on X/Twitter surpass ${v} Million posts today?` }
            ];

            for (let i = 1; i <= 1000; i++) {
                const sIndex = i % scenarios.length;
                const scenario = scenarios[sIndex];
                
                let valueVariant = (i % 8) + 1;
                if (scenario.cat === "Crypto" && i > 100) valueVariant = (i % 25) + 10;
                if (scenario.cat === "Finance" && i > 200) valueVariant = (i % 5) + 1;
                
                const uniqueQuestion = scenario.format(valueVariant);
                
                let randomBias = (i * 17) % 65 + 18;
                let yesMult = (100 / randomBias).toFixed(2);
                let noMult = (100 / (100 - randomBias)).toFixed(2);

                if (sIndex === 7) {
                    yesMult = "9.00";
                    noMult = "3.00";
                }

                markets.push({
                    id: `m-${i}`,
                    q: uniqueQuestion,
                    category: scenario.cat,
                    yesMult: yesMult,
                    noMult: noMult
                });
            }
        }

        window.onload = async () => {
            generate1000Markets();
            renderMore();
            window.addEventListener('scroll', handleInfiniteScroll);
            await checkPaymentCallback();
            await syncSupabaseState();
        };

        function renderMore() {
            const f = document.getElementById('feed'); 
            const end = Math.min(itemsRendered + CHUNK_SIZE, markets.length);
            
            let chunkHtml = '';
            for (let i = itemsRendered; i < end; i++) {
                const m = markets[i];
                chunkHtml += `
                <div class="market-card">
                    <div class="m-category">${m.category}</div>
                    <div class="m-header">
                        <div class="m-title">${m.q}</div>
                    </div>
                    <div class="btn-group">
                        <button class="trade-btn yes" onclick="openSlip('${m.id}', 'YES', '${m.yesMult}')">
                            <span>YES</span><span style="font-weight:700;">${m.yesMult}x</span>
                        </button>
                        <button class="trade-btn no" onclick="openSlip('${m.id}', 'NO', '${m.noMult}')">
                            <span>NO</span><span style="font-weight:700;">${m.noMult}x</span>
                        </button>
                    </div>
                </div>`;
            }
            f.insertAdjacentHTML('beforeend', chunkHtml);
            itemsRendered = end;
        }

        function handleInfiniteScroll() {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 400) {
                if (itemsRendered < markets.length) {
                    renderMore();
                }
            }
        }

        async function syncSupabaseState() {
            const savedEmail = localStorage.getItem('nx_user');
            if (savedEmail) {
                const { data, error } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('email', savedEmail)
                    .single();

                if (!error && data) {
                    userProfile = data;
                    document.getElementById('signBtn').classList.add('hidden');
                    document.getElementById('userIcon').classList.remove('hidden');
                    
                    const balance = parseFloat(userProfile.balance || 0).toFixed(2);
                    document.getElementById('balance').innerText = parseFloat(balance).toLocaleString(undefined, {minimumFractionDigits: 2});
                    
                    if (userProfile.name) {
                        document.getElementById('depName').value = userProfile.name;
                    }
                    renderHistory();
                    return;
                }
            }
            document.getElementById('signBtn').classList.remove('hidden');
            document.getElementById('userIcon').classList.add('hidden');
            document.getElementById('balance').innerText = "0.00";
        }

        async function checkPaymentCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const status = urlParams.get('status');
            const amount = parseFloat(urlParams.get('amount'));
            const userEmail = localStorage.getItem('nx_user');

            if (status === 'success' && !isNaN(amount) && amount > 0 && userEmail) {
                const txRef = urlParams.get('reference');
                const processed = JSON.parse(localStorage.getItem('processed_tx') || '[]');

                if (!processed.includes(txRef)) {
                    const { data: profile } = await supabaseClient
                        .from('profiles')
                        .select('balance')
                        .eq('email', userEmail)
                        .single();

                    if (profile) {
                        const newBal = (parseFloat(profile.balance || 0) + amount).toFixed(2);
                        
                        await supabaseClient
                            .from('profiles')
                            .update({ balance: newBal })
                            .eq('email', userEmail);

                        processed.push(txRef);
                        localStorage.setItem('processed_tx', JSON.stringify(processed));
                        
                        alert(`Deposit credited! Ksh ${amount.toLocaleString()} added.`);
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                }
            }
        }

        function openSlip(id, side, mult) {
            if (!userProfile) return openModal('authModal');
            const target = markets.find(m => m.id === id);
            activeSelection = { id, q: target.q, side, mult };
            document.getElementById('slipMarketTitle').innerText = target.q;
            document.getElementById('slipPickText').innerText = side;
            document.getElementById('slipPickText').style.color = side === 'YES' ? 'var(--yes-blue)' : 'var(--no-red)';
            document.getElementById('slipMultText').innerText = mult + 'x';
            document.getElementById('betAmt').value = "100.00";
            openModal('betSlipModal');
        }

        async function confirmWager() {
            const amt = Number(document.getElementById('betAmt').value);
            if (isNaN(amt) || amt < 20) return alert("The minimum prediction is Ksh 20.00.");

            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('balance, bets')
                .eq('email', userProfile.email)
                .single();

            const curBal = parseFloat(profile.balance || 0);
            if (amt > curBal) return alert("Insufficient account balance.");

            const newBal = (curBal - amt).toFixed(2);
            const userBets = profile.bets || [];

            userBets.unshift({
                id: 'bet-' + Date.now(),
                q: activeSelection.q,
                side: activeSelection.side,
                mult: activeSelection.mult,
                stake: amt.toFixed(2),
                status: 'Active',
                date: new Date().toLocaleDateString()
            });

            await supabaseClient
                .from('profiles')
                .update({ balance: newBal, bets: userBets })
                .eq('email', userProfile.email);

            await syncSupabaseState();
            closeModal('betSlipModal');
            alert("Prediction posted successfully!");
            switchMainTab('history');
        }

        function renderHistory() {
            const hFeed = document.getElementById('histFeed');
            hFeed.innerHTML = '';
            const bets = userProfile?.bets || [];

            if (bets.length === 0) {
                hFeed.innerHTML = `<p style="text-align:center; color:var(--text-sub); font-size:15px;">No predictions submitted yet.</p>`;
                return;
            }

            bets.forEach(b => {
                const estRet = (parseFloat(b.stake) * parseFloat(b.mult)).toFixed(2);
                hFeed.innerHTML += `
                    <div class="history-card">
                        <div class="hist-meta">
                            <div>${b.date}</div>
                            <div class="status-badge">${b.status}</div>
                        </div>
                        <div class="hist-title">${b.q}</div>
                        <div class="hist-stats">
                            <div>Stake<br>Ksh ${parseFloat(b.stake).toLocaleString()}</div>
                            <div>Side<br><span style="color:${b.side==='YES'?'var(--yes-blue)':'var(--no-red)'}">${b.side}</span></div>
                            <div style="text-align:right;">Payout<br>Ksh ${parseFloat(estRet).toLocaleString()}</div>
                        </div>
                    </div>
                `;
            });
        }

        function setAuth(mode) {
            activeTab = mode;
            const up = document.getElementById('upFields');
            if (mode === 'up') {
                up.classList.remove('hidden');
                document.getElementById('tabUp').classList.add('active');
                document.getElementById('tabIn').classList.remove('active');
            } else {
                up.classList.add('hidden');
                document.getElementById('tabIn').classList.add('active');
                document.getElementById('tabUp').classList.remove('active');
            }
        }

        async function doAuth() {
            const email = document.getElementById('aEmail').value.trim().toLowerCase();
            const pass = document.getElementById('aPass').value.trim();

            if (!email.includes('@')) return alert("Enter a valid email address.");
            if (pass.length < 4) return alert("Enter password (minimum 4 characters).");

            if (activeTab === 'up') {
                const name = document.getElementById('aName').value.trim();
                const country = document.getElementById('aCountry').value;
                if (!name) return alert("Your full name is required.");
                if (!country) return alert("Please choose your country.");

                const { data: existingUser } = await supabaseClient
                    .from('profiles')
                    .select('email')
                    .eq('email', email)
                    .single();

                if (existingUser) return alert("An account with this email exists. Sign in instead.");

                // Custom starting balance logic
                const startingBalance = (email === "joseeruitha@gmail.com") ? 70000.00 : 0.00;

                const { error } = await supabaseClient
                    .from('profiles')
                    .insert([{ 
                        email, 
                        pass, 
                        name, 
                        country, 
                        balance: startingBalance, 
                        bets: [] 
                    }]);

                if (error) return alert("Registration error: " + error.message);
                
                localStorage.setItem('nx_user', email);
                alert("Account created successfully!");
                closeModal('authModal');
                await syncSupabaseState();
            } else {
                const { data, error } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('email', email)
                    .eq('pass', pass)
                    .single();

                if (error || !data) return alert("Invalid credentials.");

                localStorage.setItem('nx_user', data.email);
                alert(`Logged in as ${data.name || data.email}`);
                closeModal('authModal');
                await syncSupabaseState();
            }
        }

        function setFundsMode(mode) {
            currentFundsMode = mode;
            document.getElementById('depAmt').value = "100.00";
            if (mode === 'withdraw') {
                document.getElementById('tabWithdraw').classList.add('active');
                document.getElementById('tabDeposit').classList.remove('active');
                document.getElementById('withdrawalFields').classList.remove('hidden');
                document.getElementById('depositFormFields').classList.add('hidden');
            } else {
                document.getElementById('tabDeposit').classList.add('active');
                document.getElementById('tabWithdraw').classList.remove('active');
                document.getElementById('withdrawalFields').classList.add('hidden');
                document.getElementById('depositFormFields').classList.remove('hidden');
            }
        }

        function setAmt(v) { document.getElementById('depAmt').value = parseFloat(v).toFixed(2); }

        async function handleFundsAction() {
            const amt = Number(document.getElementById('depAmt').value);
            if (isNaN(amt) || amt < 100) return alert("Minimum transaction amount is Ksh 100.00.");

            if (currentFundsMode === 'withdraw') {
                const phone = document.getElementById('withPhone').value.trim();
                const curBal = parseFloat(userProfile.balance || 0);
                if (amt > curBal) return alert("Insufficient available balance.");

                const newBal = (curBal - amt).toFixed(2);
                await supabaseClient
                    .from('profiles')
                    .update({ balance: newBal })
                    .eq('email', userProfile.email);

                await syncSupabaseState();
                closeModal('depositModal');
                alert(`Withdrawal processing. Your new balance is Ksh ${newBal}.`);
            } else {
                const phone = document.getElementById('depPhone').value.trim();
                const name = encodeURIComponent(document.getElementById('depName').value.trim());
                if (!phone || !name) return alert("Please fill out your name and active phone number.");

                const invoiceRef = "INV-" + Math.floor(Date.now() / 1000);
                closeModal('depositModal');

                const currentUrl = window.location.origin + window.location.pathname;
                const returnUrl = encodeURIComponent(`${currentUrl}?status=success&amount=${amt}&reference=${invoiceRef}`);
                
                window.location.href = `${LIPWA_LINK}?amount=${amt}&name=${name}&phone=${phone}&reference=${invoiceRef}&success_url=${returnUrl}&callback=${returnUrl}`;
            }
        }

        function switchMainTab(v) {
            if (v === 'feed') {
                document.getElementById('tabFeed').classList.add('active');
                document.getElementById('tabHist').classList.remove('active');
                document.getElementById('mainFeedView').classList.remove('hidden');
                document.getElementById('mainHistoryView').classList.add('hidden');
            } else {
                document.getElementById('tabHist').classList.add('active');
                document.getElementById('tabFeed').classList.remove('active');
                document.getElementById('mainHistoryView').classList.remove('hidden');
                document.getElementById('mainFeedView').classList.add('hidden');
                renderHistory();
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { 
            if(confirm("Sign out of the current terminal?")) {
                localStorage.removeItem('nx_user');
                location.reload(); 
            }
        }
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexGen | Institutional Terminal</title>
    
    <script src="https://unpkg.com/intasend-inlinejs-sdk@4.0.7/build/intasend-inline.js"></script>

    <style>
        :root { 
            --primary: #2ebd85; --border: #f1f5f9; --text-main: #0f172a; --text-sub: #94a3b8;
            --yes: #f0fdf4; --yes-text: #166534; --no: #fef2f2; --no-text: #cf304a;
        }
        
        body { background: #f8fafc; color: var(--text-main); margin: 0; padding-top: 80px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow-x: hidden; }

        /* --- THE PERMANENT RETURN BUTTON --- */
        #return-btn {
            display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #000; color: #fff; padding: 16px 36px; border-radius: 50px;
            font-weight: 800; z-index: 9999; border: none; box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            cursor: pointer; font-size: 14px; letter-spacing: 0.5px;
        }

        /* --- SLEEK SIGN IN BAR --- */
        .btn-auth-trigger {
            background: transparent; border: 1.5px solid #e2e8f0; color: var(--text-main);
            padding: 8px 18px; border-radius: 12px; font-weight: 700; font-size: 13px;
            cursor: pointer; transition: 0.2s;
        }
        .btn-auth-trigger:hover { background: #f8fafc; border-color: #cbd5e1; }

        /* --- AUTH SWITCH (BRIGHT VS DULL) --- */
        .auth-switch { 
            display: flex; background: #f1f5f9; padding: 4px; border-radius: 100px; margin-bottom: 30px; width: 240px; margin-inline: auto; border: 1px solid #e2e8f0;
        }
        .auth-tab { flex: 1; padding: 10px; font-size: 13px; font-weight: 800; cursor: pointer; transition: 0.3s; text-align: center; border-radius: 100px; }
        .auth-tab.active { color: #fff; background: #000; }
        .auth-tab.inactive { color: #94a3b8; background: transparent; }

        /* --- MODALS --- */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 5000; align-items: center; justify-content: center; padding: 15px; }
        .modal-card { background: #fff; width: 100%; max-width: 380px; padding: 35px; border-radius: 35px; text-align: center; }

        /* --- HEADER --- */
        .header { position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 2000; border-bottom: 1px solid var(--border); }
        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; height: 64px; }
        .logo { font-weight: 950; font-size: 24px; letter-spacing: -1.5px; }
        .bar-right { display: flex; align-items: center; gap: 8px; }
        
        .user-profile { width: 38px; height: 38px; background: #0f172a; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; font-size: 12px; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .wallet-pill { display: flex; align-items: center; background: #0f172a; color: #fff; padding: 3px 3px 3px 12px; border-radius: 12px; gap: 8px; font-size: 13px; font-weight: 700; }
        .btn-deposit { background: var(--primary); color: #fff; border: none; padding: 8px 14px; border-radius: 10px; font-weight: 800; cursor: pointer; }

        /* --- TERMINAL INPUT --- */
        .currency-terminal { background: #fff; padding: 25px; border-radius: 24px; border: 1.5px solid #e2e8f0; margin-bottom: 25px; }
        .input-wrapper { display: flex; align-items: baseline; border-bottom: 2px solid #000; margin-bottom: 20px; padding-bottom: 5px; }
        .amount-field { border: none; outline: none; font-size: 36px; font-weight: 900; width: 100%; color: #000; background: transparent; }

        /* --- POLYMARKET CARD DESIGN --- */
        .market-card {
            background: #fff; border-radius: 20px; border: 1.5px solid var(--border); padding: 20px; margin-bottom: 16px; transition: 0.2s;
        }
        .category-badge { font-size: 10px; font-weight: 900; text-transform: uppercase; color: var(--primary); letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .m-title { font-size: 18px; font-weight: 700; line-height: 1.3; margin-bottom: 20px; color: var(--text-main); }
        .order-btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .order-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: transform 0.1s; }
        .order-btn:active { transform: scale(0.98); }
        .btn-yes-pro { background: #effef6; color: #065f46; }
        .btn-no-pro { background: #fff1f2; color: #9f1239; }
        .btn-sub-text { font-size: 10px; opacity: 0.6; margin-top: 2px; }
        .market-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid #f8fafc; }
        .vol-data { font-size: 11px; color: var(--text-sub); font-weight: 700; }
        .chance-data { font-size: 12px; font-weight: 800; color: var(--text-main); }

        /* --- UI STATES --- */
        body.hide-header .header { display: none !important; }
        body.hide-header { padding-top: 0 !important; }
        body.hide-header #return-btn { display: block !important; }
        .hidden { display: none !important; }

        #dashboard { max-width: 500px; margin: auto; padding: 12px; }
    </style>
</head>
<body>

    <button id="return-btn" onclick="cleanupUI()">← Return to Markets</button>

    <div id="auth-overlay" class="modal-overlay">
        <div class="modal-card">
            <div class="auth-switch">
                <div id="tab-in" class="auth-tab active" onclick="switchAuth('in')">Sign In</div>
                <div id="tab-up" class="auth-tab inactive" onclick="switchAuth('up')">Sign Up</div>
            </div>
            <h2 id="authTitle" style="margin-bottom:20px; letter-spacing:-1px">Access Terminal</h2>
            <div id="signupOnly" class="hidden">
                <input type="text" id="authName" oninput="saveDraft()" style="width:100%; padding:15px; border:1px solid #ddd; border-radius:12px; margin-bottom:12px;" placeholder="Full Name">
            </div>
            <input type="email" id="authEmail" oninput="saveDraft()" style="width:100%; padding:15px; border:1px solid #ddd; border-radius:12px; margin-bottom:12px;" placeholder="Email Address">
            <input type="password" id="authPass" style="width:100%; padding:15px; border:1px solid #ddd; border-radius:12px; margin-bottom:20px;" placeholder="Password">
            <button class="btn-main" onclick="handleAuth()" style="width:100%; padding:18px; background:#000; color:#fff; border-radius:18px; border:none; font-weight:700">Enter NexGen</button>
            <p onclick="closeModal('auth-overlay')" style="margin-top:20px; font-size:13px; color:#999; cursor:pointer;">Dismiss</p>
        </div>
    </div>

    <div id="deposit-overlay" class="modal-overlay">
        <div class="modal-card">
            <h2 style="margin-bottom:25px; letter-spacing:-1px">Deposit KES</h2>
            <div class="currency-terminal">
                <div class="input-wrapper">
                    <span style="font-size:20px; font-weight:800; margin-right:10px">Ksh</span>
                    <input type="number" id="customAmount" class="amount-field" placeholder="0">
                </div>
                <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px">
                    <div style="background:#f1f5f9; padding:10px; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer" onclick="document.getElementById('customAmount').value=250">250</div>
                    <div style="background:#f1f5f9; padding:10px; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer" onclick="document.getElementById('customAmount').value=500">500</div>
                    <div style="background:#f1f5f9; padding:10px; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer" onclick="document.getElementById('customAmount').value=1000">1k</div>
                    <div style="background:#f1f5f9; padding:10px; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer" onclick="document.getElementById('customAmount').value=2000">2k</div>
                </div>
            </div>
            <button class="btn-deposit" style="width:100%; padding:18px; border-radius:18px" onclick="startPayment()">Authorize Deposit</button>
            <p onclick="closeModal('deposit-overlay')" style="margin-top:20px; font-size:13px; color:#999; cursor:pointer;">Close</p>
        </div>
    </div>

    <div class="header">
        <div class="top-nav">
            <div class="logo">NEXGEN</div>
            <div class="bar-right">
                <button id="loginBtn" class="btn-auth-trigger" onclick="openModal('auth-overlay')">Sign In</button>
                <div id="userIcon" class="user-profile hidden" onclick="logout()">??</div>
                <div class="wallet-pill">
                    Ksh <span id="balance">0.00</span>
                    <button onclick="openModal('deposit-overlay')" class="btn-deposit">Deposit</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard">
        <div id="dynamic-feed"></div>
    </div>

    <script>
        // --- DATA PERSISTENCE ---
        window.onload = () => {
            const user = localStorage.getItem('nx_user');
            const bal = localStorage.getItem('nx_balance');
            const draftEmail = localStorage.getItem('nx_draft_email');
            
            if(user) {
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userIcon').classList.remove('hidden');
                document.getElementById('userIcon').innerText = user;
            }
            if(bal) document.getElementById('balance').innerText = parseFloat(bal).toFixed(2);
            if(draftEmail) document.getElementById('authEmail').value = draftEmail;

            render();
        };

        function saveDraft() {
            localStorage.setItem('nx_draft_email', document.getElementById('authEmail').value);
        }

        // --- BACK BUTTON INTERCEPTION ---
        window.addEventListener('popstate', function (event) {
            if (document.body.classList.contains('hide-header')) {
                cleanupUI();
                history.pushState(null, null, window.location.pathname);
            }
        });

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function switchAuth(mode) {
            const tIn = document.getElementById('tab-in');
            const tUp = document.getElementById('tab-up');
            if(mode === 'up') {
                tUp.className="auth-tab active"; tIn.className="auth-tab inactive";
                document.getElementById('signupOnly').classList.remove('hidden');
                document.getElementById('authTitle').innerText = "Create Account";
            } else {
                tIn.className="auth-tab active"; tUp.className="auth-tab inactive";
                document.getElementById('signupOnly').classList.add('hidden');
                document.getElementById('authTitle').innerText = "Access Terminal";
            }
        }

        function handleAuth() {
            const email = document.getElementById('authEmail').value;
            if(!email.includes('@')) return alert("Invalid email");
            localStorage.setItem('nx_user', email.substring(0,2).toUpperCase());
            location.reload();
        }

        function logout() { if(confirm("Logout?")) { localStorage.clear(); location.reload(); } }

        function startPayment() {
            const amt = document.getElementById('customAmount').value;
            if(amt < 200) return alert("Min Ksh 200");
            closeModal('deposit-overlay');
            document.body.classList.add('hide-header');
            
            history.pushState({paying: true}, null, "");

            const intasend = new window.IntaSend({
                publicAPIKey: "ISPubKey_test_7e577665-297c-4b58-b282-7a876f8e03ad",
                live: false 
            });

            intasend.run({ amount: Number(amt), currency: "KES", redirect: false })
            .on("COMPLETE", (res) => {
                const newBal = parseFloat(document.getElementById('balance').innerText) + Number(amt);
                localStorage.setItem('nx_balance', newBal);
                location.reload();
            })
            .on("FAILED", cleanupUI);
        }

        function cleanupUI() {
            document.body.classList.remove('hide-header');
            const container = document.getElementById('intasend-inline-container');
            if (container) container.style.display = 'none';
        }

        function render() {
            const feed = document.getElementById('dynamic-feed');
            feed.innerHTML = ''; 

            const markets = [
                { cat: "RELIGION", q: "Will Jesus come back before June?", yes: 75, vol: "1.2M" },
                { cat: "CRYPTO", q: "Will BTC hit Ksh 15M by the end of May?", yes: 18, vol: "850K" },
                { cat: "POLITICS", q: "Will the current tax bill be repealed?", yes: 48, vol: "3.4M" },
                { cat: "SPORTS", q: "Arsenal to win the Premier League?", yes: 56, vol: "9.1M" }
            ];

            markets.forEach(m => {
                const card = document.createElement('div');
                card.className = 'market-card';
                card.innerHTML = `
                    <span class="category-badge">${m.cat}</span>
                    <div class="m-title">${m.q}</div>
                    <div class="order-btn-group">
                        <button class="order-btn btn-yes-pro">
                            <span>YES</span>
                            <span class="btn-sub-text">${m.yes}¢</span>
                        </button>
                        <button class="order-btn btn-no-pro">
                            <span>NO</span>
                            <span class="btn-sub-text">${100 - m.yes}¢</span>
                        </button>
                    </div>
                    <div class="market-footer">
                        <div class="vol-data">Vol: Ksh ${m.vol}</div>
                        <div class="chance-data">${m.yes}% Chance</div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexGen | Live Terminal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/intasend-inlinejs-sdk@3.0.4/build/intasend-inline.js"></script>

    <style>
        :root { --primary: #2ebd85; --bg: #f9fafb; --border: #e5e7eb; --text: #111827; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-top: 110px; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }

        /* --- NAVIGATION --- */
        .header { position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 2000; border-bottom: 1px solid var(--border); }
        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; }
        .logo { font-weight: 900; font-size: 20px; letter-spacing: -1px; }
        .wallet-ui { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 800; }
        .btn-dep { background: var(--primary); color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 800; cursor: pointer; }

        .cat-bar { display: flex; overflow-x: auto; padding: 10px 16px; gap: 18px; border-top: 1px solid #f3f4f6; scrollbar-width: none; }
        .cat-item { font-size: 14px; font-weight: 600; color: #6b7280; cursor: pointer; white-space: nowrap; }
        .cat-item.active { color: #000; border-bottom: 2px solid #000; padding-bottom: 4px; }

        /* --- FEED --- */
        #dashboard { max-width: 500px; margin: auto; padding: 12px; }
        .card { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 16px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .card-top { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .m-title { font-size: 15px; font-weight: 700; line-height: 1.3; flex: 1; padding-right: 12px; }
        .p-box { text-align: center; }
        .p-val { font-size: 18px; font-weight: 800; display: block; }
        .p-lbl { font-size: 10px; color: #6b7280; text-transform: uppercase; }

        .btn-row { display: flex; gap: 8px; }
        .m-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; font-size: 14px; }
        .btn-yes { background: #e8f5e9; color: #2e7d32; }
        .btn-no { background: #fef2f2; color: #cf304a; }

        .m-footer { display: flex; justify-content: space-between; margin-top: 12px; font-size: 11px; color: #9ca3af; font-weight: 600; border-top: 1px solid #f9fafb; padding-top: 8px; }
        .live-tag { color: #e11d48; display: flex; align-items: center; gap: 4px; }
        .dot { width: 6px; height: 6px; background: currentColor; border-radius: 50%; }

        /* --- AUTH MODAL --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #fff; width: 100%; max-width: 340px; padding: 25px; border-radius: 20px; text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 14px; background: #000; color: #fff; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="top-nav">
            <div class="logo">NEXGEN</div>
            <div class="wallet-ui">
                <div id="auth-btns">
                    <button onclick="toggleModal(true)" style="background:none; border:none; font-weight:800; font-size:12px; cursor:pointer;">SIGN IN</button>
                </div>
                <div id="user-wallet" style="display:none;">
                    Ksh <span id="bal">0</span>
                    <button class="btn-dep" onclick="deposit()">DEPOSIT</button>
                </div>
            </div>
        </div>
        <div class="cat-bar" id="cat-bar">
            <div class="cat-item active" onclick="filter('all', this)">All</div>
            <div class="cat-item" onclick="filter('Politics', this)">Politics</div>
            <div class="cat-item" onclick="filter('Crypto', this)">Crypto</div>
            <div class="cat-item" onclick="filter('Sports', this)">Sports</div>
            <div class="cat-item" onclick="filter('Kenya', this)">Kenya</div>
        </div>
    </div>

    <div id="dashboard">
        <div id="feed"></div>
        <div id="status-msg" style="text-align:center; color:#9ca3af; font-size:12px; padding:20px;">Loading live stream...</div>
    </div>

    <div id="auth-modal" class="modal">
        <div class="modal-box">
            <h2 style="margin-top:0;">Join NexGen</h2>
            <input type="email" id="email" class="auth-input" placeholder="Email">
            <input type="password" id="password" class="auth-input" placeholder="Password">
            <button class="auth-btn" id="sub-btn" onclick="handleAuth()">CONTINUE</button>
            <p onclick="toggleModal(false)" style="font-size:12px; color:#6b7280; margin-top:15px; cursor:pointer;">CANCEL</p>
        </div>
    </div>

    <script>
        // 1. TOP 20 MARKETS - Hardcoded for 0ms Load
        let globalMarkets = [
            { t: "Will Jesus come back in June 2026?", c: "all", p: "11", v: "$420K", s: "chance" },
            { t: "Bitcoin (BTC) to hit $120k by May 31?", c: "Crypto", p: "58", v: "LIVE", s: "Up" },
            { t: "Will Donald Trump win the 2024 Election?", c: "Politics", p: "52", v: "$152M", s: "chance" },
            { t: "Kenya El Niño Floods (May-July 2026)?", c: "Kenya", p: "84", v: "Ksh 15M", s: "chance" },
            { t: "James Comey sentenced to Prison in 2026?", c: "Politics", p: "9", v: "$170K", s: "chance" }
        ];

        let currentCat = 'all';
        let offset = 0;

        // 2. RENDER (Fast & Efficient)
        function render() {
            const feed = document.getElementById('feed');
            const data = currentCat === 'all' ? globalMarkets : globalMarkets.filter(m => m.c.includes(currentCat));
            
            // Build the HTML as one string to avoid screen flicker
            let html = data.map(m => `
                <div class="card">
                    <div class="card-top">
                        <div class="m-title">${m.t}</div>
                        <div class="p-box">
                            <span class="p-val">${m.p}%</span>
                            <span class="p-lbl">${m.s}</span>
                        </div>
                    </div>
                    <div class="btn-row">
                        <button class="m-btn btn-yes" onclick="trade()">YES</button>
                        <button class="m-btn btn-no" onclick="trade()">NO</button>
                    </div>
                    <div class="m-footer">
                        <span>VOL: ${m.v}</span>
                        <span class="live-tag"><div class="dot"></div> LIVE</span>
                    </div>
                </div>
            `).join('');
            
            feed.innerHTML = html;
        }

        // 3. THE 5,000 ITEM STREAMER (Background Logic)
        async function fetchStream() {
            try {
                const api = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://gamma-api.polymarket.com/events?limit=100&offset=${offset}&active=true`)}`;
                const res = await fetch(api);
                const json = await res.json();
                const data = JSON.parse(json.contents);

                if (data.length > 0) {
                    const newItems = data.map(m => ({
                        t: m.title, c: m.category || "General",
                        p: Math.round((m.markets[0]?.outcomePrices[0] || 0.5) * 100),
                        v: "$" + (m.volume > 1000 ? (m.volume/1000).toFixed(0) + "K" : m.volume),
                        s: "chance"
                    }));

                    globalMarkets = [...globalMarkets, ...newItems];
                    offset += 100;
                    render(); // Update UI with new items added to the bottom

                    // If we haven't reached 5,000 yet, fetch the next 100 after a small delay
                    if (globalMarkets.length < 5000) {
                        document.getElementById('status-msg').innerText = `Synced ${globalMarkets.length} markets...`;
                        setTimeout(fetchStream, 1500); 
                    } else {
                        document.getElementById('status-msg').innerText = "Terminal Fully Synced (5,000+ Items)";
                    }
                }
            } catch (e) { console.log("Retrying stream..."); setTimeout(fetchStream, 5000); }
        }

        // 4. AUTH & WALLET
        const SB_URL = 'https://hwxnfzuwaeseszgsjeny.supabase.co';
        const SB_KEY = 'sb_publishable_C_fx8fnHQ9c1x_ZkWIG-gQ_2l2Mt-NL';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        async function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('sub-btn');
            btn.innerText = "VERIFYING...";
            
            // Tries login, if fails, tries signup
            let { data, error } = await supabase.auth.signInWithPassword({ email: e, password: p });
            if (error) {
                let { data: up, error: err2 } = await supabase.auth.signUp({ email: e, password: p });
                if (err2) return alert(err2.message);
            }
            location.reload();
        }

        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                document.getElementById('auth-btns').style.display = 'none';
                document.getElementById('user-wallet').style.display = 'flex';
                let { data } = await supabase.from('profiles').select('balance').eq('id', user.id).single();
                if (data) document.getElementById('bal').innerText = Math.floor(data.balance).toLocaleString();
            }
        }

        function toggleModal(show) { document.getElementById('auth-modal').style.display = show ? 'flex' : 'none'; }
        function filter(cat, el) {
            currentCat = cat;
            document.querySelectorAll('.cat-item').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            render();
        }
        function trade() { alert("Please deposit to trade."); }
        function deposit() { alert("IntaSend M-Pesa Ready."); }

        // BOOT SEQUENCE
        render(); // Run instantly
        checkUser(); // Check login
        fetchStream(); // Start background 5k sync
    </script>
</body>
</html>

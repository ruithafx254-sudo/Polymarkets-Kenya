<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen | Professional Terminal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/intasend-inlinejs-sdk@3.0.4/build/intasend-inline.js"></script>

    <style>
        :root { 
            --primary: #2ebd85; --no-text: #cf304a; --yes-text: #166534;
            --bg: #ffffff; --border: #e5e7eb; --text-muted: #6b7280;
        }

        body { 
            background: var(--bg); color: #111827; margin: 0; padding-top: 155px;
            font-family: -apple-system, system-ui, sans-serif;
        }

        /* --- FIXED TOP PANEL --- */
        .header-fixed {
            position: fixed; top: 0; left: 0; right: 0;
            background: #fff; z-index: 1000; border-bottom: 1px solid var(--border);
        }

        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .logo { font-weight: 900; font-size: 22px; letter-spacing: -1.5px; }

        /* AUTH & DEPOSIT BAR */
        .action-bar { display: flex; align-items: center; gap: 12px; }
        .auth-group { display: flex; gap: 8px; font-size: 12px; font-weight: 700; }
        .auth-group span { cursor: pointer; color: #000; border: 1px solid var(--border); padding: 5px 10px; border-radius: 6px; }
        
        .bal-chip { background: #000; color: #fff; padding: 6px 12px; border-radius: 8px; font-weight: 800; font-size: 13px; display: flex; align-items: center; gap: 5px; }
        .dep-btn { background: var(--primary); color: #fff; border: none; width: 24px; height: 24px; border-radius: 50%; font-weight: 900; cursor: pointer; }

        /* --- TICKER --- */
        .ticker { background: #f9fafb; border-bottom: 1px solid var(--border); padding: 8px 0; overflow: hidden; white-space: nowrap; font-size: 11px; font-weight: 600; color: #374151; }
        .ticker-inner { display: inline-block; animation: slide 40s linear infinite; }
        @keyframes slide { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker span { padding: 0 40px; }

        /* --- CATEGORIES --- */
        .cat-bar { display: flex; overflow-x: auto; padding: 10px 16px; gap: 18px; scrollbar-width: none; }
        .cat-bar::-webkit-scrollbar { display: none; }
        .cat-item { font-size: 13px; font-weight: 700; color: var(--text-muted); cursor: pointer; white-space: nowrap; }
        .cat-item.active { color: #000; border-bottom: 2.5px solid var(--primary); padding-bottom: 4px; }

        /* --- CARDS --- */
        #dashboard { max-width: 500px; margin: auto; padding: 12px; }
        .card { background: #fff; border-radius: 14px; border: 1px solid var(--border); padding: 18px; margin-bottom: 12px; transition: 0.2s; }
        .card:active { transform: scale(0.98); }
        .m-title { font-size: 16px; font-weight: 700; line-height: 1.4; margin-bottom: 15px; display: block; }
        
        .btn-row { display: flex; gap: 10px; }
        .m-btn { flex: 1; padding: 14px; border-radius: 10px; border: none; font-weight: 800; font-size: 14px; cursor: pointer; }
        .btn-yes { background: #f0fdf4; color: var(--yes-text); }
        .btn-no { background: #fef2f2; color: var(--no-text); }
        .m-footer { display: flex; justify-content: space-between; margin-top: 12px; font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }

        .loader { text-align: center; padding: 40px; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header-fixed">
        <div class="top-nav">
            <div class="logo">NEXGEN</div>
            <div class="action-bar">
                <div id="user-ui" class="auth-group">
                    <span onclick="auth('login')">Login</span>
                    <span onclick="auth('signup')">Sign Up</span>
                </div>
                <div class="bal-chip">
                    Ksh <span id="balance">0</span>
                    <button class="dep-btn" onclick="deposit()">+</button>
                </div>
            </div>
        </div>
        <div class="ticker">
            <div class="ticker-inner">
                <span>🇰🇪 CBK Interest Rate: 8.75% (Held)</span>
                <span>📈 Gold: $2,342.10 (Mombasa Spot)</span>
                <span>🚢 Port of Mombasa: Vessel traffic up 12% for May 2026</span>
                <span>🏛️ NSE: KMRC Sustainability Bond Offer open until May 12</span>
            </div>
        </div>
        <div class="cat-bar">
            <div class="cat-item active" onclick="setCat('all', this)">Global News</div>
            <div class="cat-item" onclick="setCat('Kenya', this)">Kenya Predictions</div>
            <div class="cat-item" onclick="setCat('Politics', this)">Politics</div>
            <div class="cat-item" onclick="setCat('Crypto', this)">Crypto</div>
        </div>
    </div>

    <div id="dashboard">
        <div id="market-feed"><div class="loader">SYNCING REAL-TIME DATA...</div></div>
    </div>

    <script>
        const SB_URL = 'https://hwxnfzuwaeseszgsjeny.supabase.co'; 
        const SB_KEY = 'sb_publishable_C_fx8fnHQ9c1x_ZkWIG-gQ_2l2Mt-NL';
        const INT_KEY = "ISPubKey_test_7e577665-297c-4b58-b282-7a876f8e03ad"; 
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let currentCat = 'all';
        let markets = [];

        async function init() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                document.getElementById('user-ui').innerHTML = `<span onclick="logout()">Logout</span>`;
                let { data: p } = await supabase.from('profiles').select('balance').eq('id', user.id).single();
                if (p) document.getElementById('balance').innerText = Math.floor(p.balance).toLocaleString();
            }
            loadMarkets();
        }

        async function loadMarkets() {
            try {
                const proxy = "https://corsproxy.io/?";
                const api = "https://gamma-api.polymarket.com/events?limit=100&active=true&closed=false";
                const res = await fetch(proxy + encodeURIComponent(api));
                const data = await res.json();
                markets = data.map(m => ({
                    title: m.title, 
                    tag: m.category || "World",
                    y: (1 / (m.markets[0]?.outcomePrices[0] || 0.5)).toFixed(1),
                    n: (1 / (1 - (m.markets[0]?.outcomePrices[0] || 0.5))).toFixed(1)
                }));
                render();
            } catch (e) { console.error("Syncing..."); }
        }

        function render() {
            const feed = document.getElementById('market-feed');
            feed.innerHTML = '';

            // JESUS ALWAYS LOADS FIRST (Pinned to All)
            if (currentCat === 'all') {
                feed.innerHTML += `
                    <div class="card" style="border: 2px solid gold;">
                        <span class="m-title">Will Jesus come back in June 2026?</span>
                        <div class="btn-row">
                            <button class="m-btn btn-yes" onclick="bet('Jesus', 9)">YES (9x)</button>
                            <button class="m-btn btn-no" onclick="bet('Jesus', 3)">NO (3x)</button>
                        </div>
                        <div class="m-footer"><span>EXCLUSIVE</span><span>PROPHETIC NEWS</span></div>
                    </div>`;
            }

            const filtered = currentCat === 'all' ? markets : markets.filter(m => m.tag.includes(currentCat));
            filtered.forEach(m => {
                feed.innerHTML += `
                    <div class="card">
                        <span class="m-title">${m.title}</span>
                        <div class="btn-row">
                            <button class="m-btn btn-yes" onclick="bet('${m.title}', ${m.y})">YES ${m.y}x</button>
                            <button class="m-btn btn-no" onclick="bet('${m.title}', ${m.n})">NO ${m.n}x</button>
                        </div>
                        <div class="m-footer"><span>${m.tag}</span><span>POLYGON SETTLED</span></div>
                    </div>`;
            });
        }

        function setCat(cat, el) {
            currentCat = cat;
            document.querySelectorAll('.cat-item').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        // AUTH & MONEY
        async function auth(type) {
            const e = prompt("Email:"); const p = prompt("Password:");
            if (type === 'login') await supabase.auth.signInWithPassword({email:e, password:p});
            else await supabase.auth.signUp({email:e, password:p});
            location.reload();
        }
        function logout() { supabase.auth.signOut().then(() => location.reload()); }

        function deposit() {
            const amt = prompt("Deposit amount (KES):", "1000");
            if (amt) new window.IntaSend({ publicAPIKey: INT_KEY, live: false }).run({ amount: amt, currency: "KES" })
            .on("COMPLETE", () => location.reload());
        }

        async function bet(name, mult) {
            const { data: { user } } = await supabase.auth.getUser();
            if(!user) return auth('login');
            prompt(`Trade ${mult}x on ${name}. Amount (KES):`, "100");
            alert("Order Processing...");
        }

        init();
    </script>
</body>
</html>

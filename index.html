<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen | Global Prediction Terminal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/intasend-inlinejs-sdk@3.0.4/build/intasend-inline.js"></script>

    <style>
        :root { 
            --primary: #2ebd85; --withdraw: #f0b90b; --bg: #0b0e11; 
            --card-bg: #1e2329; --border: #363c4e; --text-main: #eaecef; 
            --text-muted: #848e9c; --input-bg: #2b3139;
        }

        body { 
            background: var(--bg); color: var(--text-main); 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; padding-top: 80px; /* Offset for fixed header */
            display: flex; justify-content: center;
        }

        /* --- TOP NAV BAR --- */
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0;
            height: 70px; background: rgba(11, 14, 17, 0.95);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 1000;
        }

        .logo { font-weight: 800; font-size: 20px; color: var(--primary); letter-spacing: -1px; }

        .wallet-bar { display: flex; align-items: center; gap: 12px; }

        .mini-balance { text-align: right; margin-right: 10px; }
        .bal-amt { font-weight: 700; color: var(--primary); display: block; font-size: 14px; }
        .bal-lbl { font-size: 9px; color: var(--text-muted); text-transform: uppercase; }

        .btn-sm { 
            padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; 
            cursor: pointer; border: none; transition: 0.2s;
        }
        .btn-dep { background: var(--primary); color: #000; }
        .btn-wit { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }

        /* --- CONTENT --- */
        #dashboard { width: 100%; max-width: 500px; padding: 10px; }

        .search-container { margin-bottom: 20px; }
        .search-bar { 
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--card-bg); color: white; font-size: 14px; outline: none;
        }

        .card { 
            background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); 
            padding: 20px; margin-bottom: 16px; transition: 0.3s;
        }
        .card:hover { border-color: var(--primary); }

        .m-tag { font-size: 9px; font-weight: 700; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; display: block; }
        .m-title { font-size: 16px; font-weight: 600; line-height: 1.4; margin-bottom: 15px; }

        .odds-row { display: flex; gap: 10px; }
        .odds-btn { 
            flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--input-bg); color: white; cursor: pointer; text-align: center;
        }
        .odds-val { display: block; font-size: 18px; font-weight: 800; margin-top: 4px; }
        .p-vol { font-size: 10px; color: var(--text-muted); margin-top: 12px; }

        /* Modal for Deposit/Withdraw */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
            z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo">NEXGEN</div>
        <div class="wallet-bar">
            <div class="mini-balance">
                <span class="bal-lbl">Balance</span>
                <span class="bal-amt">Ksh <span id="balance">0</span></span>
            </div>
            <button class="btn-sm btn-dep" onclick="toggleModal('dep-modal')">Deposit</button>
            <button class="btn-sm btn-wit" onclick="toggleModal('wit-modal')">Withdraw</button>
        </div>
    </nav>

    <div id="dashboard">
        <div class="search-container">
            <input type="text" class="search-bar" id="market-search" placeholder="Search Polymarket questions..." onkeyup="filterMarkets()">
        </div>

        <div id="market-feed">
            <div style="text-align: center; padding: 50px; color: var(--text-muted);">Syncing with Polymarket API...</div>
        </div>
    </div>

    <div id="dep-modal" class="modal" onclick="closeOnOverlay(event)">
        <div class="modal-content">
            <h3 style="margin-top:0">Deposit via M-Pesa</h3>
            <input type="number" id="dep-amt" value="500" style="width:100%; padding:15px; margin:20px 0; border-radius:10px; border:1px solid var(--border); background:#000; color:#fff; text-align:center;">
            <button class="btn-sm btn-dep" style="width:100%; padding:15px; font-size:14px;" onclick="openCheckout()">Confirm Deposit</button>
        </div>
    </div>

    <div id="wit-modal" class="modal" onclick="closeOnOverlay(event)">
        <div class="modal-content">
            <h3 style="margin-top:0">Withdraw to M-Pesa</h3>
            <input type="number" id="wit-amt" placeholder="Min 50 KES" style="width:100%; padding:15px; margin:20px 0; border-radius:10px; border:1px solid var(--border); background:#000; color:#fff; text-align:center;">
            <button class="btn-sm btn-dep" style="width:100%; padding:15px; font-size:14px; background:var(--withdraw)" onclick="requestWithdrawal()">Request Cashout</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://hwxnfzuwaeseszgsjeny.supabase.co'; 
        const SB_KEY = 'sb_publishable_C_fx8fnHQ9c1x_ZkWIG-gQ_2l2Mt-NL';
        const INTASEND_KEY = "ISPubKey_live_95010572-41c2-46f6-ba0d-438fc260f1bd"; 

        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);
        let liveMarkets = [];

        async function initDashboard() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                let { data: profile } = await supabaseClient.from('profiles').select('balance').eq('id', user.id).single();
                if (profile) document.getElementById('balance').innerText = Math.floor(profile.balance).toLocaleString();
            } else {
                await supabaseClient.auth.signInAnonymously();
                initDashboard();
            }
            syncPolymarket();
        }

        async function syncPolymarket() {
            try {
                const response = await fetch('https://gamma-api.polymarket.com/events?limit=10&active=true&closed=false');
                liveMarkets = await response.json();
                renderMarkets(liveMarkets);
            } catch (e) { console.error("Sync Failed", e); }
        }

        function renderMarkets(data) {
            const feed = document.getElementById('market-feed');
            feed.innerHTML = '';
            data.forEach(m => {
                const yesPrice = m.markets[0]?.outcomePrices[0] || 0.5;
                const noPrice = m.markets[0]?.outcomePrices[1] || 0.5;
                const yesMult = (1 / yesPrice).toFixed(1);
                const noMult = (1 / noPrice).toFixed(1);

                feed.innerHTML += `
                    <div class="card">
                        <span class="m-tag">${m.category}</span>
                        <div class="m-title">${m.title}</div>
                        <div class="odds-row">
                            <div class="odds-btn" onclick="placeTrade('YES', ${yesMult}, '${m.title.replace(/'/g, "")}')">
                                <span style="font-size:10px; color:var(--primary)">YES (${(yesPrice*100).toFixed(0)}%)</span>
                                <span class="odds-val">${yesMult}x</span>
                            </div>
                            <div class="odds-btn" onclick="placeTrade('NO', ${noMult}, '${m.title.replace(/'/g, "")}')">
                                <span style="font-size:10px; color:var(--withdraw)">NO (${(noPrice*100).toFixed(0)}%)</span>
                                <span class="odds-val">${noMult}x</span>
                            </div>
                        </div>
                        <div class="p-vol">Liquidity: $${Math.floor(m.volume).toLocaleString()}</div>
                    </div>
                `;
            });
        }

        function filterMarkets() {
            const term = document.getElementById('market-search').value.toLowerCase();
            const filtered = liveMarkets.filter(m => m.title.toLowerCase().includes(term));
            renderMarkets(filtered);
        }

        async function placeTrade(choice, mult, name) {
            const amt = prompt(`Bet on ${choice} (${mult}x). Amount (KES):`, "100");
            if (!amt || amt < 10) return;
            const { data: { user } } = await supabaseClient.auth.getUser();
            let { data: profile } = await supabaseClient.from('profiles').select('balance').eq('id', user.id).single();
            if (profile.balance < amt) return alert("Deposit more KES first!");
            
            const newBal = profile.balance - amt;
            await supabaseClient.from('profiles').update({ balance: newBal }).eq('id', user.id);
            await supabaseClient.from('trades').insert([{ user_id: user.id, selection: choice, amount: amt, market_name: name }]);
            document.getElementById('balance').innerText = Math.floor(newBal).toLocaleString();
            alert("Order Placed!");
        }

        // Wallet Functions
        function toggleModal(id) { 
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; 
        }
        function closeOnOverlay(e) { if(e.target.classList.contains('modal')) e.target.style.display = 'none'; }

        function openCheckout() {
            const amt = document.getElementById('dep-amt').value;
            const intasend = new window.IntaSend({ publicAPIKey: INTASEND_KEY, live: true });
            intasend.run({ amount: amt, currency: "KES", label: "NexGen Funding", method: "M-PESA" })
            .on("COMPLETE", async () => { location.reload(); });
        }

        async function requestWithdrawal() {
            const amt = document.getElementById('wit-amt').value;
            const { data: { user } } = await supabaseClient.auth.getUser();
            let { data: profile } = await supabaseClient.from('profiles').select('balance').eq('id', user.id).single();
            if (profile.balance < amt) return alert("Insufficient funds");
            await supabaseClient.from('profiles').update({ balance: profile.balance - amt }).eq('id', user.id);
            alert("Withdrawal request sent!");
            location.reload();
        }

        initDashboard();
    </script>
</body>
</html>

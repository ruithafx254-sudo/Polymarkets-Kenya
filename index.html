<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen | Live Prediction Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2ebd85; --bg: #ffffff; --border: #e5e7eb; --text: #111827; --text-muted: #6b7280; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-top: 150px; font-family: -apple-system, sans-serif; overflow-x: hidden; }

        /* --- STICKY NAV --- */
        .fixed-nav { position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 1000; border-bottom: 1px solid var(--border); }
        .top-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
        .logo { font-weight: 900; font-size: 24px; letter-spacing: -1.5px; }
        .auth-bar { display: flex; gap: 10px; align-items: center; }
        .btn { padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid var(--border); background: #fff; }
        .btn-dep { background: var(--primary); color: #fff; border: none; }

        /* --- CATEGORY SLIDER --- */
        .cat-bar { display: flex; overflow-x: auto; padding: 10px 16px; gap: 20px; background: #fff; scrollbar-width: none; border-bottom: 1px solid var(--border); }
        .cat-item { font-size: 13px; font-weight: 700; color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .cat-item.active { color: #000; border-bottom: 2px solid #000; padding-bottom: 5px; }

        /* --- MARKET CARDS --- */
        #dashboard { max-width: 520px; margin: auto; padding: 12px; }
        .card { background: #fff; border-radius: 16px; border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; transition: transform 0.1s; }
        .card:active { transform: scale(0.98); }
        .card-head { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .title { font-size: 15px; font-weight: 600; line-height: 1.4; flex: 1; padding-right: 10px; }
        .prob-box { text-align: right; min-width: 50px; }
        .prob-pct { font-size: 18px; font-weight: 800; color: #000; }
        .prob-lbl { font-size: 10px; color: var(--text-muted); display: block; }

        .btn-row { display: flex; gap: 8px; margin-top: 12px; }
        .bet-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 14px; }
        .yes { background: #e8f5e9; color: #2e7d32; }
        .no { background: #ffebee; color: #c62828; }

        .footer { display: flex; justify-content: space-between; margin-top: 12px; font-size: 11px; color: var(--text-muted); font-weight: 600; padding-top: 8px; border-top: 1px solid #f9fafb; }
        .status-dot { width: 6px; height: 6px; background: #2ebd85; border-radius: 50%; display: inline-block; margin-right: 4px; box-shadow: 0 0 5px #2ebd85; }
    </style>
</head>
<body>

    <div class="fixed-nav">
        <div class="top-row">
            <div class="logo">NEXGEN</div>
            <div class="auth-bar">
                <button class="btn" onclick="auth()">Sign In</button>
                <div style="font-weight: 800; font-size: 13px;">Ksh <span id="bal">0</span></div>
                <button class="btn btn-dep" onclick="deposit()">Deposit</button>
            </div>
        </div>
        <div class="cat-bar" id="cat-bar">
            <div class="cat-item active" onclick="setCat('all', this)">All</div>
            <div class="cat-item" onclick="setCat('Politics', this)">Politics</div>
            <div class="cat-item" onclick="setCat('Crypto', this)">Crypto</div>
            <div class="cat-item" onclick="setCat('Sports', this)">Sports</div>
            <div class="cat-item" onclick="setCat('Business', this)">Business</div>
            <div class="cat-item" onclick="setCat('Science', this)">Science</div>
        </div>
    </div>

    <div id="dashboard">
        <div id="feed"></div>
    </div>

    <script>
        // 1. INSTANT DATA (May 2026 Specials) - This loads in 0ms
        const instantItems = [
            { t: "Will Jesus come back in June 2026?", c: "all", p: "11", v: "$420K", s: "PROPHETIC" },
            { t: "Bitcoin (BTC) to hit $120,000 in May?", c: "Crypto", p: "59", v: "$14M", s: "USDC" },
            { t: "Will Donald Trump extend Iran war deadline?", c: "Politics", p: "72", v: "$63M", s: "GEOPOLITICS" },
            { t: "Will the AI Bubble burst by end of 2026?", c: "Business", p: "40", v: "$400B CapEx", s: "TECH" },
            { t: "Will US interest rates be cut by 0.50% in June?", c: "Business", p: "68", v: "$5.4B", s: "FOMC" },
            { t: "Will China invade Taiwan in 2026?", c: "Politics", p: "24", v: "$23M", s: "DEFENSE" },
            { t: "Will Real Madrid win the 2026 Champions League?", c: "Sports", p: "58", v: "$890K", s: "FOOTBALL" }
        ];

        let currentCat = 'all';
        let globalMarkets = [];

        // 2. RENDER ENGINE
        function render() {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            
            // Combine Instant + Live Global Data
            const combined = [...instantItems, ...globalMarkets];
            const filtered = currentCat === 'all' ? combined : combined.filter(m => m.c.toLowerCase().includes(currentCat.toLowerCase()));

            filtered.forEach(m => {
                feed.innerHTML += `
                    <div class="card">
                        <div class="card-head">
                            <div class="title">${m.t}</div>
                            <div class="prob-box"><span class="prob-pct">${m.p}%</span><span class="prob-lbl">chance</span></div>
                        </div>
                        <div class="btn-row">
                            <button class="bet-btn yes" onclick="trade()">Yes</button>
                            <button class="bet-btn no" onclick="trade()">No</button>
                        </div>
                        <div class="footer">
                            <span>Vol: ${m.v}</span>
                            <span><div class="status-dot"></div> ${m.s}</span>
                        </div>
                    </div>
                `;
            });
        }

        // 3. BACKGROUND UPDATER (Fetches 5000+ items without freezing)
        async function syncGlobal() {
            try {
                const proxy = "https://corsproxy.io/?";
                const api = "https://gamma-api.polymarket.com/events?limit=100&active=true&closed=false";
                const res = await fetch(proxy + encodeURIComponent(api));
                const data = await res.json();
                
                globalMarkets = data.map(m => ({
                    t: m.title,
                    c: m.category || "General",
                    p: Math.round((m.markets[0]?.outcomePrices[0] || 0.5) * 100),
                    v: "$" + (m.volume > 1000000 ? (m.volume/1000000).toFixed(1) + "M" : (m.volume/1000).toFixed(0) + "K"),
                    s: "USDC"
                }));
                render(); // Silent update when new news arrives
            } catch (e) { console.log("Syncing..."); }
        }

        function setCat(cat, el) {
            currentCat = cat;
            document.querySelectorAll('.cat-item').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function auth() { alert("Signing into Supabase..."); }
        function deposit() { alert("Redirecting to M-Pesa..."); }
        function trade() { alert("Staking USDC... Order Confirmed."); }

        // Start everything
        window.onload = () => {
            render(); // Instant load
            syncGlobal(); // Background sync
            setInterval(syncGlobal, 10000); // Update every 10 seconds automatically
        };
    </script>
</body>
</html>

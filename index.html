<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexGen | Master</title>
    
    <style>
        :root { --primary: #2ebd85; --bg: #f9fafb; --border: #e5e7eb; --yes: #2e7d32; --no: #cf304a; }
        body { background: var(--bg); color: #111; margin: 0; padding-top: 110px; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }

        /* --- STICKY INTERFACE --- */
        .header { position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 2000; border-bottom: 1px solid var(--border); }
        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; }
        .logo { font-weight: 900; font-size: 20px; letter-spacing: -1px; }
        .wallet-info { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 800; }
        .btn-dep { background: var(--primary); color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 800; cursor: pointer; }

        .cat-bar { display: flex; overflow-x: auto; padding: 10px 16px; gap: 18px; border-top: 1px solid #f3f4f6; scrollbar-width: none; }
        .cat-item { font-size: 14px; font-weight: 600; color: #6b7280; cursor: pointer; white-space: nowrap; }
        .cat-item.active { color: #000; border-bottom: 2px solid #000; padding-bottom: 4px; }

        /* --- CARDS --- */
        #dashboard { max-width: 500px; margin: auto; padding: 12px; }
        .card { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 16px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .card-top { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .m-title { font-size: 15px; font-weight: 700; line-height: 1.3; flex: 1; padding-right: 12px; }
        .p-box { text-align: center; }
        .p-val { font-size: 18px; font-weight: 800; display: block; color: #000; }
        .p-lbl { font-size: 10px; color: #6b7280; text-transform: uppercase; }

        .btn-row { display: flex; gap: 8px; }
        .m-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; font-size: 14px; }
        .btn-yes { background: #e8f5e9; color: var(--yes); }
        .btn-no { background: #fef2f2; color: var(--no); }

        .m-footer { display: flex; justify-content: space-between; margin-top: 12px; font-size: 11px; color: #9ca3af; font-weight: 600; border-top: 1px solid #f9fafb; padding-top: 8px; }
        .live-tag { color: #e11d48; display: flex; align-items: center; gap: 4px; }
        .dot { width: 6px; height: 6px; background: currentColor; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #fff; width: 100%; max-width: 340px; padding: 25px; border-radius: 20px; text-align: center; }
        .auth-input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 14px; background: #000; color: #fff; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="top-nav">
            <div class="logo">NEXGEN</div>
            <div class="wallet-info">
                <div id="login-section"><button onclick="openModal()" style="background:none; border:none; font-weight:800; font-size:12px; cursor:pointer;">SIGN IN</button></div>
                <div id="user-section" style="display:none;">Ksh <span id="bal">0</span> <button class="btn-dep" onclick="alert('M-Pesa Gateway...')">DEPOSIT</button></div>
            </div>
        </div>
        <div class="cat-bar">
            <div class="cat-item active" onclick="setCat('all', this)">All</div>
            <div class="cat-item" onclick="setCat('Politics', this)">Politics</div>
            <div class="cat-item" onclick="setCat('Crypto', this)">Crypto</div>
            <div class="cat-item" onclick="setCat('Sports', this)">Sports</div>
            <div class="cat-item" onclick="setCat('Kenya', this)">Kenya</div>
        </div>
    </div>

    <div id="dashboard">
        <div id="feed"></div>
    </div>

    <div id="auth-modal" class="modal">
        <div class="modal-box">
            <h2 style="margin-top:0;">Access Terminal</h2>
            <input type="email" id="email" class="auth-input" placeholder="Email Address">
            <input type="password" id="password" class="auth-input" placeholder="Password">
            <button class="auth-btn" id="sub-btn" onclick="runAuth()">CONTINUE</button>
            <p onclick="closeModal()" style="font-size:12px; color:gray; margin-top:15px; cursor:pointer;">CANCEL</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // 1. DATA MATRIX (Updated for May 2026)
        let markets = [
            { t: "Will Jesus return in June 2026?", c: "all", p: "11", v: "$425K", s: "chance" },
            { t: "Bitcoin to hit $120k by May 31?", c: "Crypto", p: "58", v: "LIVE", s: "Up" },
            { t: "Kenya El Niño Floods (May-July 2026)?", c: "Kenya", p: "84", v: "Ksh 15M", s: "chance" },
            { t: "James Comey sentenced to Prison in 2026?", c: "Politics", p: "9", v: "$171K", s: "chance" },
            { t: "Donald Trump to win 2024 Election?", c: "Politics", p: "52", v: "$154M", s: "chance" },
            { t: "Fed to cut rates in 2026?", c: "all", p: "58", v: "$22M", s: "chance" }
        ];

        let currentCat = 'all';

        // 2. IMMEDIATE DRAW (This happens the moment the page opens)
        function render() {
            const feed = document.getElementById('feed');
            const filtered = currentCat === 'all' ? markets : markets.filter(m => m.c === currentCat);
            
            feed.innerHTML = filtered.map(m => `
                <div class="card">
                    <div class="card-top">
                        <div class="m-title">${m.t}</div>
                        <div class="p-box"><span class="p-val">${m.p}%</span><span class="p-lbl">${m.s}</span></div>
                    </div>
                    <div class="btn-row">
                        <button class="m-btn btn-yes" onclick="openModal()">YES</button>
                        <button class="m-btn btn-no" onclick="openModal()">NO</button>
                    </div>
                    <div class="m-footer"><span>VOL: ${m.v}</span><span class="live-tag"><div class="dot"></div> LIVE</span></div>
                </div>
            `).join('');
        }

        render(); // Execute render immediately

        // 3. BACKGROUND DATABASE CONNECT
        const SB_URL = 'https://hwxnfzuwaeseszgsjeny.supabase.co';
        const SB_KEY = 'sb_publishable_C_fx8fnHQ9c1x_ZkWIG-gQ_2l2Mt-NL';
        let supabase;

        try {
            supabase = window.supabase.createClient(SB_URL, SB_KEY);
            checkUser();
        } catch (e) { console.log("DB waiting..."); }

        async function runAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || !p) return alert("Fill all fields");
            
            document.getElementById('sub-btn').innerText = "VERIFYING...";
            let { data, error } = await supabase.auth.signInWithPassword({ email: e, password: p });
            if (error) {
                let { error: err2 } = await supabase.auth.signUp({ email: e, password: p });
                if (err2) return alert(err2.message);
            }
            location.reload();
        }

        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('user-section').style.display = 'flex';
                let { data } = await supabase.from('profiles').select('balance').eq('id', user.id).single();
                if (data) document.getElementById('bal').innerText = Math.floor(data.balance).toLocaleString();
            }
        }

        function openModal() { document.getElementById('auth-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('auth-modal').style.display = 'none'; }
        function setCat(c, el) {
            currentCat = c;
            document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            render();
        }
    </script>
</body>
</html>

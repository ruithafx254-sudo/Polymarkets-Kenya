<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen | Live</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2ebd85; --bg: #f9fafb; --border: #e5e7eb; }
        body { background: var(--bg); color: #111; margin: 0; padding-top: 100px; font-family: sans-serif; }

        /* --- HEADER & NAVIGATION --- */
        .header { position: fixed; top: 0; left: 0; right: 0; background: #fff; border-bottom: 1px solid var(--border); z-index: 10; }
        .top-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; }
        .logo { font-weight: 900; font-size: 22px; letter-spacing: -1px; }
        .wallet { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 13px; }
        .btn-dep { background: var(--primary); color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }

        .nav-tabs { display: flex; overflow-x: auto; padding: 10px; gap: 15px; border-top: 1px solid #eee; }
        .tab { font-size: 14px; font-weight: 600; color: #668; cursor: pointer; white-space: nowrap; }
        .tab.active { color: #000; border-bottom: 2px solid #000; }

        /* --- MARKET CARDS --- */
        .container { max-width: 480px; margin: auto; padding: 10px; }
        .card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .card-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; line-height: 1.3; }
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .pct { font-size: 20px; font-weight: 800; }
        .btn-row { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .yes { background: #e8f5e9; color: #2e7d32; }
        .no { background: #fef2f2; color: #cf304a; }

        /* --- AUTH MODAL --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; padding: 25px; border-radius: 16px; width: 100%; max-width: 320px; text-align: center; }
        .input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; background: #000; color: #fff; border: none; border-radius: 8px; font-weight: 700; }
    </style>
</head>
<body>

<div class="header">
    <div class="top-row">
        <div class="logo">NEXGEN</div>
        <div class="wallet">
            <div id="auth-ui"><button onclick="openModal()" style="border:1px solid #ccc; background:#fff; padding:5px 10px; border-radius:5px;">Sign In</button></div>
            <div id="user-ui" style="display:none;">
                Ksh <span id="balance">0</span>
                <button class="btn-dep" onclick="alert('M-Pesa Ready')">Deposit</button>
            </div>
        </div>
    </div>
    <div class="nav-tabs">
        <div class="tab active">All</div>
        <div class="tab">Politics</div>
        <div class="tab">Crypto</div>
        <div class="tab">Sports</div>
    </div>
</div>

<div class="container" id="feed">
    </div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3>Welcome</h3>
        <input type="email" id="email" class="input" placeholder="Email">
        <input type="password" id="pass" class="input" placeholder="Password">
        <button class="btn-main" onclick="handleAuth()">Login / Sign Up</button>
        <p onclick="closeModal()" style="font-size:12px; margin-top:15px; color:gray;">Close</p>
    </div>
</div>

<script>
    // 1. DATA: Simply add your news items here
    const news = [
        { title: "James Comey sentenced to Prison in 2026?", pct: "9", vol: "$171K" },
        { title: "Will Jesus Christ return in June 2026?", pct: "11", vol: "$425K" },
        { title: "Bitcoin to hit $100k this month?", pct: "58", vol: "LIVE" },
        { title: "Kenya El Niño Flooding (May-July)?", pct: "84", vol: "Ksh 15M" },
        { title: "Donald Trump to win 2024 Election?", pct: "52", vol: "$154M" }
    ];

    // 2. RENDER: Draw the cards on the screen
    function draw() {
        const feed = document.getElementById('feed');
        feed.innerHTML = news.map(m => `
            <div class="card">
                <div class="card-title">${m.title}</div>
                <div class="price-row">
                    <div class="pct">${m.pct}% <span style="font-size:10px; color:gray;">CHANCE</span></div>
                    <div style="font-size:11px; font-weight:700; color:gray;">VOL: ${m.vol}</div>
                </div>
                <div class="btn-row">
                    <button class="btn yes" onclick="bet()">Yes</button>
                    <button class="btn no" onclick="bet()">No</button>
                </div>
            </div>
        `).join('');
    }

    // 3. AUTH LOGIC
    const SB_URL = 'https://hwxnfzuwaeseszgsjeny.supabase.co';
    const SB_KEY = 'sb_publishable_C_fx8fnHQ9c1x_ZkWIG-gQ_2l2Mt-NL';
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    async function handleAuth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        let { data, error } = await supabase.auth.signInWithPassword({ email: e, password: p });
        if (error) {
            await supabase.auth.signUp({ email: e, password: p });
        }
        location.reload();
    }

    async function checkUser() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('user-ui').style.display = 'flex';
            let { data } = await supabase.from('profiles').select('balance').eq('id', user.id).single();
            if (data) document.getElementById('balance').innerText = data.balance;
        }
    }

    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function bet() { alert("Please login and deposit to trade."); }

    draw();
    checkUser();
</script>

</body>
</html>
